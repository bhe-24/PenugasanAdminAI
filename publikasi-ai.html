<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Tim Penilai - Cendekia Aksara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Pustaka PDFMake -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; flex-direction: column; min-height: 100vh;}
        .top-brand { background: linear-gradient(135deg, #001f3f 0%, #003366 100%); padding: 15px 20px; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 3px solid #10b981;}
        .top-brand img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #10b981; padding: 2px; background: white;}
        .top-brand h1 { font-family: 'Playfair Display', serif; color: white; font-size: 1.4rem; margin: 0; font-weight: 700; letter-spacing: 1px;}
        
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px 20px;}
        .system-box { width: 100%; max-width: 500px; background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; animation: fadeIn 0.8s ease;}
        
        .event-title { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 4vw, 1.8rem); color: #003366; font-weight: 900; margin-bottom: 5px; line-height: 1.3;}
        .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 40px; font-weight: 500;}
        
        .loader-icon { font-size: 3.5rem; color: #10b981; margin-bottom: 25px;}
        .status-text { font-weight: 700; font-size: 1.1rem; color: #0f172a;}
        .status-desc { font-size: 0.85rem; color: #64748b; margin-top: 8px;}
        
        .progress-bar-container { w-full; background: #e2e8f0; border-radius: 50px; height: 6px; margin-top: 25px; overflow: hidden;}
        .progress-bar { background: #003366; height: 100%; width: 0%; transition: width 0.4s ease;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-brand">
        <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia">
        <h1>Cendekia Aksara</h1>
    </div>

    <div class="main-content">
        <div class="system-box">
            <h2 class="event-title" id="event-title">Membaca Identitas Event...</h2>
            <p class="subtitle">Sistem Analisis & Pembahasan Tim Penilai</p>

            <i class="fa-solid fa-file-signature fa-bounce loader-icon" id="icon-status"></i>
            
            <div class="status-text" id="text-status">Menginisialisasi Sistem...</div>
            <div class="status-desc" id="desc-status">Harap biarkan halaman ini tetap terbuka.</div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
            authDomain: "mading-cf676.firebaseapp.com", 
            projectId: "mading-cf676", 
            storageBucket: "mading-cf676.firebasestorage.app", 
            messagingSenderId: "72175203671", 
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        const titleEl = document.getElementById('event-title');
        const textStatus = document.getElementById('text-status');
        const descStatus = document.getElementById('desc-status');
        const iconStatus = document.getElementById('icon-status');
        const progressBar = document.getElementById('progress-bar');

        async function processReportPDF() {
            if(!eventId) {
                showError("Link Akses Tidak Valid.");
                return;
            }

            try {
                // 1. Ambil Info Event dan Hasil Evaluasi dari Database
                progressBar.style.width = '40%';
                textStatus.innerText = "Mengambil Data Event...";
                const eventDoc = await getDoc(doc(db, 'weekly_events', eventId));
                
                if(!eventDoc.exists()) {
                    showError("Event tidak ditemukan atau sudah dihapus.");
                    return;
                }
                
                const eventData = eventDoc.data();
                titleEl.innerText = eventData.judul;

                // 2. Validasi apakah hasil analisis sudah dirilis oleh Manajemen
                progressBar.style.width = '70%';
                textStatus.innerText = "Memverifikasi Arsip Penilaian...";
                
                if (!eventData.hasil_analisis || !Array.isArray(eventData.hasil_analisis)) {
                    showError("Analisis belum dirilis oleh Tim Penilai. Silakan coba beberapa saat lagi.");
                    return;
                }

                // 3. Susun PDF
                progressBar.style.width = '90%';
                textStatus.innerText = "Menyusun Format Dokumen (PDF)...";
                descStatus.innerText = "Mengekstrak teks pembahasan.";

                const tableBody = [
                    [
                        {text: 'Peringkat', style: 'th'}, 
                        {text: 'Nama Penulis', style: 'th'}, 
                        {text: 'Judul Karya', style: 'th'}, 
                        {text: 'Hasil Analisis & Pembahasan', style: 'th'}
                    ]
                ];

                eventData.hasil_analisis.forEach((item) => {
                    tableBody.push([
                        {text: item.peringkat || '-', alignment: 'center', bold: true},
                        {text: item.nama_penulis || '-', bold: true, color: '#003366'},
                        {text: item.judul_karya || '-', italics: true},
                        {text: item.analisis || '-', alignment: 'justify'}
                    ]);
                });

                const docDefinition = {
                    pageSize: 'A4',
                    pageMargins: [40, 50, 40, 50],
                    content: [
                        { text: 'HASIL DAN PEMBAHASAN TIM PENILAI', style: 'header' },
                        { text: `Event: ${eventData.judul}`, style: 'subheader' },
                        { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 515, y2: 0, lineWidth: 2, lineColor: '#003366' }], margin: [0, 10, 0, 20] },
                        {
                            table: {
                                headerRows: 1,
                                widths: ['15%', '20%', '20%', '*'],
                                body: tableBody
                            },
                            layout: {
                                hLineWidth: function () { return 0.5; },
                                vLineWidth: function () { return 0.5; },
                                hLineColor: function () { return '#cbd5e1'; },
                                vLineColor: function () { return '#cbd5e1'; },
                                paddingTop: function() { return 8; },
                                paddingBottom: function() { return 8; },
                                paddingLeft: function() { return 8; },
                                paddingRight: function() { return 8; }
                            }
                        }
                    ],
                    styles: {
                        header: { fontSize: 16, bold: true, alignment: 'center', color: '#003366' },
                        subheader: { fontSize: 12, alignment: 'center', color: '#10b981', margin: [0, 5, 0, 0] },
                        th: { bold: true, fillColor: '#e2e8f0', alignment: 'center', margin: [0, 5, 0, 5], color: '#1e293b' }
                    },
                    defaultStyle: { font: 'Roboto', fontSize: 10, lineHeight: 1.4, color: '#334155' }
                };

                // 4. Unduh Otomatis
                pdfMake.createPdf(docDefinition).download(`Analisis_Penilaian_${eventData.judul.replace(/\s/g,'_')}.pdf`, () => {
                    progressBar.style.width = '100%';
                    progressBar.classList.replace('bg-[#003366]', 'bg-green-600');
                    iconStatus.className = "fa-solid fa-circle-check text-green-500 text-5xl mb-4";
                    textStatus.innerText = "Dokumen Penilaian Diunduh!";
                    descStatus.innerText = "Silakan periksa folder Download Anda.";
                });

            } catch (error) {
                console.error(error);
                showError("Terjadi kesalahan pada integrasi pangkalan data.");
            }
        }

        function showError(msg) {
            progressBar.style.width = '100%';
            progressBar.style.background = '#ef4444';
            iconStatus.className = "fa-solid fa-circle-exclamation text-red-500 text-5xl mb-4";
            textStatus.innerText = "Gagal Memproses";
            descStatus.innerText = msg;
        }

        window.onload = () => {
            setTimeout(processReportPDF, 800); 
        };
    </script>
</body>
</html>
