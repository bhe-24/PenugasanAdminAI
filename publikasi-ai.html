<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Juri AI - Cendekia Aksara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Pustaka PDFMake -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;}
        .card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,51,102,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 6px solid #6366f1; animation: slideUp 0.5s ease;}
        .logo { width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 0 auto 20px; border: 3px solid #6366f1; padding: 5px; background: white;}
        h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #312e81; font-weight: 900; margin-bottom: 5px; line-height: 1.3;}
        p.subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 30px;}
        
        .status-box { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px dashed #cbd5e1; margin-bottom: 20px;}
        .spinner { font-size: 2.5rem; color: #6366f1; margin-bottom: 15px;}
        .status-text { font-weight: 600; font-size: 0.95rem; color: #312e81;}
        .status-desc { font-size: 0.75rem; color: #64748b; margin-top: 8px;}
        
        .btn-home { display: none; background: #312e81; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-top: 20px; transition: 0.3s;}
        .btn-home:hover { background: #1e1b4b; box-shadow: 0 5px 15px rgba(49,46,129,0.3);}
        .btn-home.active { display: inline-flex; justify-content: center; align-items: center; gap: 8px;}

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.imgur.com/5Srjyo4.png" alt="Cendekia Aksara" class="logo">
        <h1 id="event-title">Memuat Event...</h1>
        <p class="subtitle">Analisis & Ulasan Eksekutif AI</p>

        <div class="status-box">
            <i class="fa-solid fa-robot fa-bounce spinner" id="icon-status"></i>
            <div class="status-text" id="text-status">Menginisialisasi Juri AI...</div>
            <div class="status-desc" id="desc-status">Mohon tetap di halaman ini. AI sedang membaca seluruh naskah yang masuk.</div>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-4 overflow-hidden">
                <div class="bg-indigo-500 h-2 rounded-full transition-all duration-300 w-1/4" id="progress-bar"></div>
            </div>
        </div>

        <a href="index.html" class="btn-home" id="btn-home"><i class="fa-solid fa-house"></i> Kembali ke Beranda</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Database Utama
        const firebaseConfig = { 
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
            authDomain: "mading-cf676.firebaseapp.com", 
            projectId: "mading-cf676", 
            storageBucket: "mading-cf676.firebasestorage.app", 
            messagingSenderId: "72175203671", 
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        const titleEl = document.getElementById('event-title');
        const textStatus = document.getElementById('text-status');
        const descStatus = document.getElementById('desc-status');
        const iconStatus = document.getElementById('icon-status');
        const progressBar = document.getElementById('progress-bar');
        const btnHome = document.getElementById('btn-home');

        async function processAIPDF() {
            if(!eventId) {
                showError("Link Tidak Valid. ID Event tidak ditemukan.");
                return;
            }

            try {
                // 1. Ambil Info Event
                progressBar.style.width = '30%';
                textStatus.innerText = "Mengambil Data Event...";
                const eventDoc = await getDoc(doc(db, 'weekly_events', eventId));
                
                if(!eventDoc.exists()) {
                    showError("Event tidak ditemukan atau sudah dihapus.");
                    return;
                }
                const eventData = eventDoc.data();
                titleEl.innerText = eventData.judul;

                // 2. Ambil Semua Karya
                progressBar.style.width = '50%';
                textStatus.innerText = "Menyiapkan Naskah Peserta...";
                const q = query(collection(db, 'weekly_submissions'), where('eventId', '==', eventId));
                const snap = await getDocs(q);

                if(snap.empty) {
                    showError("Belum ada karya yang terkumpul untuk dianalisis.");
                    return;
                }

                let submissions = [];
                snap.forEach(d => submissions.push(d.data()));
                
                // Siapkan Payload untuk AI
                const payloadData = submissions.map((s, i) => {
                    return `PESERTA ${i+1}:\nNama: ${s.studentName || 'Anonim'}\nJudul: ${s.title || '-'}\nIsi Karya:\n${s.content}\n---`;
                }).join('\n\n');

                // 3. Panggil API Vercel
                progressBar.style.width = '70%';
                textStatus.innerText = "Juri AI Sedang Menilai...";
                descStatus.innerText = "Proses ini membutuhkan waktu beberapa detik, jangan tutup halaman ini.";

                const response = await fetch('/api/ai-ranking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'ranking',
                        eventName: eventData.judul, 
                        karya: payloadData, 
                        total: submissions.length 
                    })
                });

                const resData = await response.json();
                if(!response.ok) throw new Error(resData.error || 'AksaBot (AI) sedang mengalami kendala server.');

                // 4. Susun PDF (Format A4 Standar Laporan)
                progressBar.style.width = '90%';
                textStatus.innerText = "Menyusun Tabel Hasil (PDF)...";
                descStatus.innerText = "Menyelesaikan dokumen...";

                const tableBody = [
                    [
                        {text: 'Peringkat', style: 'th'}, 
                        {text: 'Nama Penulis', style: 'th'}, 
                        {text: 'Judul Karya', style: 'th'}, 
                        {text: 'Hasil Analisis & Pembahasan', style: 'th'}
                    ]
                ];

                resData.analisis_data.forEach((item) => {
                    tableBody.push([
                        {text: item.peringkat || '-', alignment: 'center', bold: true},
                        {text: item.nama_penulis || '-', bold: true, color: '#312e81'},
                        {text: item.judul_karya || '-', italics: true},
                        {text: item.analisis || '-', alignment: 'justify'}
                    ]);
                });

                const docDefinition = {
                    pageSize: 'A4',
                    pageMargins: [40, 50, 40, 50],
                    content: [
                        { text: 'HASIL DAN PEMBAHASAN JURI AI', style: 'header' },
                        { text: `Event: ${eventData.judul}`, style: 'subheader' },
                        { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 515, y2: 0, lineWidth: 2, lineColor: '#312e81' }], margin: [0, 10, 0, 20] },
                        {
                            table: {
                                headerRows: 1,
                                widths: ['15%', '20%', '20%', '*'],
                                body: tableBody
                            },
                            layout: {
                                hLineWidth: function () { return 0.5; },
                                vLineWidth: function () { return 0.5; },
                                hLineColor: function () { return '#cbd5e1'; },
                                vLineColor: function () { return '#cbd5e1'; },
                                paddingTop: function() { return 8; },
                                paddingBottom: function() { return 8; },
                                paddingLeft: function() { return 8; },
                                paddingRight: function() { return 8; }
                            }
                        }
                    ],
                    styles: {
                        header: { fontSize: 16, bold: true, alignment: 'center', color: '#312e81' },
                        subheader: { fontSize: 12, alignment: 'center', color: '#6366f1', margin: [0, 5, 0, 0] },
                        th: { bold: true, fillColor: '#e2e8f0', alignment: 'center', margin: [0, 5, 0, 5], color: '#1e293b' }
                    },
                    defaultStyle: { font: 'Roboto', fontSize: 10, lineHeight: 1.4, color: '#334155' }
                };

                // 5. Unduh Otomatis
                pdfMake.createPdf(docDefinition).download(`Pembahasan_AI_${eventData.judul.replace(/\s/g,'_')}.pdf`, () => {
                    progressBar.style.width = '100%';
                    progressBar.classList.replace('bg-indigo-500', 'bg-green-500');
                    iconStatus.className = "fa-solid fa-circle-check text-green-500 text-4xl mb-4";
                    textStatus.innerText = "Pembahasan Berhasil Diunduh!";
                    descStatus.innerText = "Silakan periksa folder unduhan Anda.";
                    textStatus.classList.replace('text-[#312e81]', 'text-green-700');
                    btnHome.classList.add('active');
                });

            } catch (error) {
                console.error(error);
                showError(error.message || "Terjadi kesalahan sistem.");
            }
        }

        function showError(msg) {
            progressBar.style.width = '100%';
            progressBar.classList.replace('bg-indigo-500', 'bg-red-500');
            iconStatus.className = "fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-4";
            textStatus.innerText = "Gagal Memproses";
            descStatus.innerText = msg;
            textStatus.classList.replace('text-[#312e81]', 'text-red-700');
            btnHome.classList.add('active');
        }

        // Jalankan saat halaman dimuat
        window.onload = () => {
            setTimeout(processAIPDF, 800); // Jeda visual agar UI sempat me-render
        };
    </script>
</body>
</html>
