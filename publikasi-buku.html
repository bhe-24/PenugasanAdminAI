<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unduh Buku Karya - Cendekia Aksara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Pustaka PDFMake -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;}
        .card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,51,102,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 6px solid #d4af37; animation: slideUp 0.5s ease;}
        .logo { width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 0 auto 20px; border: 3px solid #003366; padding: 5px;}
        h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #003366; font-weight: 900; margin-bottom: 5px; line-height: 1.3;}
        p.subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 30px;}
        
        .status-box { background: #f1f5f9; padding: 20px; border-radius: 15px; border: 1px dashed #cbd5e1; margin-bottom: 20px;}
        .spinner { font-size: 2.5rem; color: #d4af37; margin-bottom: 15px;}
        .status-text { font-weight: 600; font-size: 0.95rem; color: #003366;}
        
        .btn-home { display: none; background: #003366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-top: 20px; transition: 0.3s;}
        .btn-home:hover { background: #001f3f; box-shadow: 0 5px 15px rgba(0,51,102,0.3);}
        .btn-home.active { display: inline-flex; justify-content: center; align-items: center; gap: 8px;}

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.imgur.com/5Srjyo4.png" alt="Cendekia Aksara" class="logo">
        <h1 id="event-title">Memuat Event...</h1>
        <p class="subtitle">Kompilasi Karya Cendekia Muda</p>

        <div class="status-box">
            <i class="fa-solid fa-book-journal-whills fa-bounce spinner" id="icon-status"></i>
            <div class="status-text" id="text-status">Menghubungkan ke Pangkalan Data...</div>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-4 overflow-hidden">
                <div class="bg-blue-600 h-2 rounded-full transition-all duration-300 w-1/4" id="progress-bar"></div>
            </div>
        </div>

        <a href="index.html" class="btn-home" id="btn-home"><i class="fa-solid fa-house"></i> Kembali ke Beranda</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Database Utama (Akses Publik Read-Only)
        const firebaseConfig = { 
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
            authDomain: "mading-cf676.firebaseapp.com", 
            projectId: "mading-cf676", 
            storageBucket: "mading-cf676.firebasestorage.app", 
            messagingSenderId: "72175203671", 
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        const titleEl = document.getElementById('event-title');
        const textStatus = document.getElementById('text-status');
        const iconStatus = document.getElementById('icon-status');
        const progressBar = document.getElementById('progress-bar');
        const btnHome = document.getElementById('btn-home');

        async function processPDF() {
            if(!eventId) {
                showError("Link Tidak Valid. ID Event tidak ditemukan.");
                return;
            }

            try {
                // 1. Ambil Info Event
                progressBar.style.width = '40%';
                textStatus.innerText = "Mengunduh Detail Event...";
                const eventDoc = await getDoc(doc(db, 'weekly_events', eventId));
                
                if(!eventDoc.exists()) {
                    showError("Event tidak ditemukan atau sudah dihapus.");
                    return;
                }
                const eventData = eventDoc.data();
                titleEl.innerText = eventData.judul;

                // 2. Ambil Semua Karya
                progressBar.style.width = '70%';
                textStatus.innerText = "Merakit Lembaran Buku...";
                const q = query(collection(db, 'weekly_submissions'), where('eventId', '==', eventId));
                const snap = await getDocs(q);

                if(snap.empty) {
                    showError("Belum ada karya yang terkumpul untuk event ini.");
                    return;
                }

                let submissions = [];
                snap.forEach(d => submissions.push(d.data()));
                submissions.sort((a,b) => b.createdAt?.toMillis() - a.createdAt?.toMillis());

                // 3. Susun PDF (Format A5 Standar Penerbitan)
                progressBar.style.width = '90%';
                textStatus.innerText = "Mengekspor ke PDF A5...";

                let pdfContent = [
                    // SAMPUL DALAM
                    { text: 'KOMPILASI KARYA TERPILIH', fontSize: 24, bold: true, alignment: 'center', margin: [0, 120, 0, 10] },
                    { text: eventData.judul.toUpperCase(), fontSize: 18, bold: true, alignment: 'center', color: '#003366', margin: [0, 0, 0, 30] },
                    { text: `Kategori: ${eventData.tipe}`, fontSize: 12, alignment: 'center', italics: true, margin: [0, 0, 0, 10] },
                    { text: eventData.deskripsi, fontSize: 10, alignment: 'center', margin: [40, 0, 40, 0], color: '#444' },
                    { text: '', pageBreak: 'after' }
                ];

                submissions.forEach((sub) => {
                    pdfContent.push({ text: (sub.title || 'TANPA JUDUL').toUpperCase(), fontSize: 16, bold: true, alignment: 'left' });
                    pdfContent.push({ text: `Oleh: ${sub.studentName || 'Anonim'}`, fontSize: 11, italics: true, alignment: 'left', margin: [0, 2, 0, 20], color: '#555' });

                    const paragraphs = (sub.content || '').split('\n').filter(p => p.trim() !== '');
                    paragraphs.forEach(p => {
                        pdfContent.push({
                            text: '\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0' + p.trim(), // Indentasi Paragraf
                            alignment: 'justify',
                            margin: [0, 0, 0, 8],
                            fontSize: 11,
                            lineHeight: 1.4
                        });
                    });
                    
                    pdfContent.push({ text: '', pageBreak: 'after' });
                });

                pdfContent[pdfContent.length - 1] = { text: '- TAMAT -', alignment: 'center', italics: true, margin: [0, 50, 0, 0] };

                const docDefinition = {
                    pageSize: 'A5',
                    pageMargins: [40, 50, 40, 50],
                    content: pdfContent,
                    defaultStyle: { font: 'Roboto' }
                };

                // 4. Unduh Otomatis
                pdfMake.createPdf(docDefinition).download(`Buku_A5_${eventData.judul.replace(/\s/g,'_')}.pdf`, () => {
                    progressBar.style.width = '100%';
                    progressBar.classList.replace('bg-blue-600', 'bg-green-500');
                    iconStatus.className = "fa-solid fa-circle-check text-green-500 text-4xl mb-4";
                    textStatus.innerText = "Buku Berhasil Diunduh!";
                    textStatus.classList.replace('text-[#003366]', 'text-green-700');
                    btnHome.classList.add('active');
                });

            } catch (error) {
                console.error(error);
                showError("Terjadi kesalahan sistem. Coba beberapa saat lagi.");
            }
        }

        function showError(msg) {
            progressBar.style.width = '100%';
            progressBar.classList.replace('bg-blue-600', 'bg-red-500');
            iconStatus.className = "fa-solid fa-circle-exclamation text-red-500 text-4xl mb-4";
            textStatus.innerText = msg;
            textStatus.classList.replace('text-[#003366]', 'text-red-700');
            btnHome.classList.add('active');
        }

        // Jalankan saat halaman dimuat
        window.onload = () => {
            setTimeout(processPDF, 800); // Jeda visual agar UI sempat me-render
        };
    </script>
</body>
</html>
