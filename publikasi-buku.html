<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unduh Buku Karya - Cendekia Aksara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Pustaka PDFMake -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; flex-direction: column; min-height: 100vh;}
        .top-brand { background: linear-gradient(135deg, #001f3f 0%, #003366 100%); padding: 15px 20px; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 3px solid #d4af37;}
        .top-brand img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #d4af37; padding: 2px; background: white;}
        .top-brand h1 { font-family: 'Playfair Display', serif; color: white; font-size: 1.4rem; margin: 0; font-weight: 700; letter-spacing: 1px;}
        
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px 20px;}
        .system-box { width: 100%; max-width: 500px; background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; animation: fadeIn 0.8s ease;}
        
        .event-title { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 4vw, 1.8rem); color: #003366; font-weight: 900; margin-bottom: 5px; line-height: 1.3;}
        .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 40px; font-weight: 500;}
        
        .loader-icon { font-size: 3.5rem; color: #d4af37; margin-bottom: 25px;}
        .status-text { font-weight: 700; font-size: 1.1rem; color: #0f172a;}
        .status-desc { font-size: 0.85rem; color: #64748b; margin-top: 8px;}
        
        .progress-bar-container { w-full; background: #e2e8f0; border-radius: 50px; height: 6px; margin-top: 25px; overflow: hidden;}
        .progress-bar { background: #003366; height: 100%; width: 0%; transition: width 0.4s ease;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-brand">
        <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia">
        <h1>Cendekia Aksara</h1>
    </div>

    <div class="main-content">
        <div class="system-box">
            <h2 class="event-title" id="event-title">Membaca Data...</h2>
            <p class="subtitle">Sistem Kompilasi Karya Cendekia</p>

            <i class="fa-solid fa-book-journal-whills fa-bounce loader-icon" id="icon-status"></i>
            
            <div class="status-text" id="text-status">Menginisialisasi Jaringan...</div>
            <div class="status-desc" id="desc-status">Harap biarkan halaman ini tetap terbuka.</div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Publik
        const firebaseConfig = { 
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
            authDomain: "mading-cf676.firebaseapp.com", 
            projectId: "mading-cf676", 
            storageBucket: "mading-cf676.firebasestorage.app", 
            messagingSenderId: "72175203671", 
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        const titleEl = document.getElementById('event-title');
        const textStatus = document.getElementById('text-status');
        const descStatus = document.getElementById('desc-status');
        const iconStatus = document.getElementById('icon-status');
        const progressBar = document.getElementById('progress-bar');

        async function processPDF() {
            if(!eventId) {
                showError("Link Akses Tidak Valid.");
                return;
            }

            try {
                // 1. Ambil Info Event
                progressBar.style.width = '30%';
                textStatus.innerText = "Mengunduh Detail Event...";
                const eventDoc = await getDoc(doc(db, 'weekly_events', eventId));
                
                if(!eventDoc.exists()) {
                    showError("Event tidak ditemukan atau sudah ditutup.");
                    return;
                }
                const eventData = eventDoc.data();
                titleEl.innerText = eventData.judul;

                // 2. Ambil Semua Karya
                progressBar.style.width = '60%';
                textStatus.innerText = "Mengekstrak Dokumen Siswa...";
                const q = query(collection(db, 'weekly_submissions'), where('eventId', '==', eventId));
                const snap = await getDocs(q);

                if(snap.empty) {
                    showError("Belum ada karya yang masuk untuk event ini.");
                    return;
                }

                let submissions = [];
                snap.forEach(d => submissions.push(d.data()));
                submissions.sort((a,b) => b.createdAt?.toMillis() - a.createdAt?.toMillis());

                // 3. Susun PDF (Format A5 Standar)
                progressBar.style.width = '85%';
                textStatus.innerText = "Merakit Tata Letak Buku (A5)...";
                descStatus.innerText = "Memproses halaman pdfmake. Harap tunggu.";

                let pdfContent = [
                    { text: 'KOMPILASI KARYA TERPILIH', fontSize: 24, bold: true, alignment: 'center', margin: [0, 120, 0, 10] },
                    { text: eventData.judul.toUpperCase(), fontSize: 18, bold: true, alignment: 'center', color: '#003366', margin: [0, 0, 0, 30] },
                    { text: `Kategori: ${eventData.tipe}`, fontSize: 12, alignment: 'center', italics: true, margin: [0, 0, 0, 10] },
                    { text: eventData.deskripsi, fontSize: 10, alignment: 'center', margin: [40, 0, 40, 0], color: '#444' },
                    { text: '', pageBreak: 'after' }
                ];

                submissions.forEach((sub) => {
                    pdfContent.push({ text: (sub.title || 'TANPA JUDUL').toUpperCase(), fontSize: 16, bold: true, alignment: 'left' });
                    pdfContent.push({ text: `Oleh: ${sub.studentName || 'Anonim'}`, fontSize: 11, italics: true, alignment: 'left', margin: [0, 2, 0, 20], color: '#555' });

                    const paragraphs = (sub.content || '').split('\n').filter(p => p.trim() !== '');
                    paragraphs.forEach(p => {
                        pdfContent.push({
                            text: '\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0' + p.trim(),
                            alignment: 'justify',
                            margin: [0, 0, 0, 8],
                            fontSize: 11,
                            lineHeight: 1.4
                        });
                    });
                    
                    pdfContent.push({ text: '', pageBreak: 'after' });
                });

                pdfContent[pdfContent.length - 1] = { text: '- TAMAT -', alignment: 'center', italics: true, margin: [0, 50, 0, 0] };

                const docDefinition = {
                    pageSize: 'A5',
                    pageMargins: [40, 50, 40, 50],
                    content: pdfContent,
                    defaultStyle: { font: 'Roboto' }
                };

                // 4. Unduh Otomatis
                pdfMake.createPdf(docDefinition).download(`Buku_A5_${eventData.judul.replace(/\s/g,'_')}.pdf`, () => {
                    progressBar.style.width = '100%';
                    progressBar.classList.replace('bg-[#003366]', 'bg-green-600');
                    iconStatus.className = "fa-solid fa-circle-check text-green-500 text-5xl mb-4";
                    textStatus.innerText = "Buku Berhasil Diunduh!";
                    descStatus.innerText = "Silakan periksa folder Download Anda.";
                });

            } catch (error) {
                console.error(error);
                showError("Gagal merender dokumen.");
            }
        }

        function showError(msg) {
            progressBar.style.width = '100%';
            progressBar.style.background = '#ef4444';
            iconStatus.className = "fa-solid fa-circle-exclamation text-red-500 text-5xl mb-4";
            textStatus.innerText = "Terjadi Kesalahan";
            descStatus.innerText = msg;
        }

        window.onload = () => {
            setTimeout(processPDF, 800); 
        };
    </script>
</body>
</html>
