<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Siswa - Cendekia Aksara</title>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. VARIABLES & GLOBAL --- */
        :root {
            --navy-dark: #001f3f;
            --navy-light: #003366;
            --accent: #3b82f6;
            --bg: #f0f4f9;
            --text-dark: #1e293b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            padding-bottom: 60px;
            min-height: 100vh;
        }

        /* Background texture */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,51,102,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 940px;
            margin: 0 auto;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
        }

        /* --- 2. HEADER --- */
        .brand-header {
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy-light) 60%, #1a4a8a 100%);
            color: white;
            padding: 22px 28px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,31,63,0.35);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .brand-header::before {
            content: '';
            position: absolute;
            top: -80px; right: -40px;
            width: 220px; height: 220px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
        }
        .brand-header::after {
            content: '';
            position: absolute;
            bottom: -50px; right: 80px;
            width: 140px; height: 140px;
            background: rgba(59,130,246,0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-content-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 2;
        }

        .header-logo-circle {
            width: 68px; height: 68px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            flex-shrink: 0;
            padding: 11px;
            animation: floatLogo 3s ease-in-out infinite;
            overflow: hidden;
        }

        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif;
            font-size: 1.65rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0.3px;
        }
        .header-greeting {
            font-size: 0.88rem;
            opacity: 0.8;
            margin-top: 4px;
            font-weight: 400;
        }

        .btn-back {
            background: rgba(255,255,255,0.12);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            white-space: nowrap;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.25);
            z-index: 2;
        }
        .btn-back:hover { background: white; color: var(--navy-light); }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* --- 3. MAIN GRID LAYOUT --- */
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            align-items: start;
        }

        /* --- 4. PROFILE CARD (LEFT) --- */
        .profile-card-left {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.07);
            border: 1px solid var(--border);
            position: sticky;
            top: 20px;
        }

        .profile-header-section {
            background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
            padding: 36px 20px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .profile-header-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                repeating-linear-gradient(
                    -45deg,
                    rgba(255,255,255,0.02) 0px,
                    rgba(255,255,255,0.02) 1px,
                    transparent 1px,
                    transparent 12px
                );
            pointer-events: none;
        }

        /* Glowing orb */
        .profile-header-section::after {
            content: '';
            position: absolute;
            bottom: -30px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 60px;
            background: radial-gradient(ellipse, rgba(59,130,246,0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        .pic-wrapper {
            position: relative;
            width: 110px; height: 110px;
            margin: 0 auto 16px;
            z-index: 2;
        }

        /* Animated ring */
        .pic-wrapper::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #3b82f6;
            border-right-color: rgba(59,130,246,0.3);
            animation: ringRotate 4s linear infinite;
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-pic {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: #fff;
            position: relative;
            z-index: 2;
        }

        .btn-cam {
            position: absolute;
            bottom: 3px; right: 3px;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            z-index: 3;
            font-size: 0.8rem;
        }
        .btn-cam:hover { transform: scale(1.1); background: white; color: var(--accent); }
        .btn-cam.loading { animation: spin 1s infinite; background: #94a3b8; }

        .user-display-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 2;
        }
        .user-display-email {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 4px;
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
        }

        .badges {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .badge-sem {
            padding: 7px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #cbd5e1;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge-ips {
            padding: 7px 16px;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            background: rgba(0,0,0,0.2);
        }
        .ips-neon-green { border: 1px solid #4ade80; color: #4ade80; box-shadow: 0 0 15px rgba(74,222,128,0.35); }
        .ips-neon-yellow { border: 1px solid #facc15; color: #facc15; box-shadow: 0 0 15px rgba(250,204,21,0.35); }
        .ips-neon-red { border: 1px solid #f87171; color: #f87171; box-shadow: 0 0 15px rgba(248,113,113,0.35); }

        /* Stats row */
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            padding: 16px 10px;
            text-align: center;
            border-right: 1px solid var(--border);
            transition: background 0.2s;
        }
        .stat-item:last-child { border-right: none; }
        .stat-item:hover { background: #f8fafc; }

        .stat-num {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--navy-light);
            display: block;
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 2px;
            display: block;
        }

        /* --- 5. RIGHT COLUMN --- */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- 6. CHART CARD --- */
        .chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.07);
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chart-ips-big {
            font-size: 2rem;
            font-weight: 700;
            color: var(--navy-dark);
            line-height: 1;
        }
        .chart-ips-big span {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--muted);
            margin-left: 4px;
        }

        .chart-trend {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 50px;
        }
        .trend-up { background: #dcfce7; color: #16a34a; }
        .trend-down { background: #fee2e2; color: #dc2626; }
        .trend-same { background: #f1f5f9; color: #64748b; }

        /* Chart canvas container */
        .chart-container {
            position: relative;
            height: 160px;
            width: 100%;
        }

        canvas#ipsChart {
            width: 100% !important;
            height: 100% !important;
        }

        /* Chart legend */
        .chart-legend {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: var(--muted);
        }
        .legend-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* --- 7. FORM CARD --- */
        .form-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.07);
            border: 1px solid var(--border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 7px;
        }
        .form-group label i {
            color: var(--accent);
            margin-right: 5px;
            font-size: 0.75rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.25s;
            background: #f8fafc;
            color: var(--text-dark);
        }
        .form-input:focus {
            background: white;
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }

        .full-width { grid-column: 1 / -1; }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--navy-light), #1a4a8a);
            color: white;
            border: none;
            padding: 13px 32px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            box-shadow: 0 5px 15px rgba(0,51,102,0.25);
            font-family: inherit;
        }
        .btn-save:hover {
            background: linear-gradient(135deg, var(--navy-dark), var(--navy-light));
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,51,102,0.3);
        }
        .btn-save:active { transform: translateY(0); }

        /* --- 8. POPUP / OVERLAY --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .popup-box {
            background: white;
            width: 90%;
            max-width: 340px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            transform: scale(0.9);
            transition: 0.3s;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .overlay.active .popup-box { transform: scale(1); }

        /* --- 9. LOADING --- */
        #loading {
            text-align: center;
            padding: 60px 20px;
        }

        .hidden { display: none !important; }
        #fileInput { display: none; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Skeleton shimmer */
        @keyframes shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: calc(200px + 100%) 0; }
        }

        /* --- 10. RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .container { padding: 12px; }

            .brand-header {
                padding: 18px;
                border-radius: 16px;
                flex-direction: row;
                align-items: center;
            }

            .header-logo-circle { width: 52px; height: 52px; padding: 9px; }
            .header-brand-name { font-size: 1.2rem; }
            .header-greeting { font-size: 0.78rem; }

            .btn-back {
                padding: 8px 14px;
                font-size: 0.82rem;
            }
            .btn-back .btn-back-text { display: none; }

            .main-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .profile-card-left {
                position: static;
            }

            .profile-header-section { padding: 28px 16px 22px; }

            .pic-wrapper { width: 90px; height: 90px; }

            .badges { flex-direction: row; justify-content: center; }

            .profile-stats { grid-template-columns: repeat(3, 1fr); }

            .chart-card, .form-card { padding: 18px; }

            .form-grid { grid-template-columns: 1fr; gap: 14px; }

            .chart-container { height: 130px; }

            .form-footer { justify-content: stretch; }
            .btn-save { width: 100%; justify-content: center; }
        }

        @media (max-width: 420px) {
            .brand-header {
                gap: 10px;
            }
            .header-content-wrapper { gap: 10px; }
            .header-logo-circle { width: 44px; height: 44px; padding: 7px; }
            .header-brand-name { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <!-- POPUP ALERT -->
    <div id="alert-overlay" class="overlay">
        <div class="popup-box">
            <div id="alert-icon" style="font-size: 3rem; margin-bottom: 15px;"></div>
            <h3 id="alert-title" style="margin:0 0 10px 0; color:#1e293b; font-size:1.05rem;"></h3>
            <p id="alert-msg" style="color:#64748b; margin:0 0 22px 0; font-size:0.9rem; line-height:1.6;"></p>
            <button onclick="closeOverlay()" style="background:#1e3a8a; color:white; border:none; padding:10px 32px; border-radius:50px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; font-size:0.9rem;">OK</button>
        </div>
    </div>

    <div class="container">

        <!-- HEADER -->
        <div class="brand-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-info">
                    <h1 class="header-brand-name">Profil Siswa</h1>
                    <div class="header-greeting">Kelola data akademik &amp; identitas diri</div>
                </div>
            </div>
            <a href="/dashboard/index.html" class="btn-back" id="btn-kembali">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="btn-back-text" id="kembali-text">Memuat...</span>
            </a>
        </div>

        <!-- LOADING STATE -->
        <div id="loading">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size:2.2rem; color:#003366;"></i>
            <p style="color:#64748b; margin-top:14px; font-weight:500; font-size:0.9rem;">Memuat data profil...</p>
        </div>

        <!-- MAIN CONTENT -->
        <div id="profile-content" class="hidden">
            <div class="main-grid">

                <!-- LEFT: PROFILE CARD -->
                <div class="profile-card-left">
                    <div class="profile-header-section">
                        <div class="pic-wrapper">
                            <img src="https://ui-avatars.com/api/?name=User" id="display-pic" class="profile-pic">
                            <button class="btn-cam" id="btn-cam" onclick="document.getElementById('fileInput').click()">
                                <i class="fa-solid fa-camera"></i>
                            </button>
                            <input type="file" id="fileInput" accept="image/*" onchange="uploadFoto()">
                        </div>
                        <div class="user-display-name" id="display-name">Memuat...</div>
                        <div class="user-display-email" id="display-email">email@sekolah.id</div>
                        <div class="badges">
                            <div class="badge-sem">
                                <i class="fa-solid fa-graduation-cap"></i>
                                <span id="display-sem">Semester 1</span>
                            </div>
                            <div id="ips-badge" class="badge-ips">
                                <i class="fa-solid fa-chart-simple"></i>
                                IPS: <span id="display-ips">0.00</span>
                            </div>
                        </div>
                    </div>

                    <!-- STAT COUNTS -->
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-num" id="stat-sem">1</span>
                            <span class="stat-label">Semester</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" id="stat-ips-val">0.00</span>
                            <span class="stat-label">IPS Terakhir</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" id="stat-days">0</span>
                            <span class="stat-label">Hari Aktif</span>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN -->
                <div class="right-col">

                    <!-- CHART CARD -->
                    <div class="chart-card">
                        <div class="card-title">
                            <i class="fa-solid fa-chart-area" style="color:var(--accent)"></i>
                            Riwayat IPS Harian
                        </div>

                        <div class="chart-header">
                            <div>
                                <div class="chart-ips-big" id="chart-current-ips">
                                    0.00 <span>IPS terkini</span>
                                </div>
                                <div style="font-size:0.78rem; color:var(--muted); margin-top:5px;" id="chart-last-date">
                                    Belum ada data
                                </div>
                            </div>
                            <div class="chart-trend trend-same" id="chart-trend-badge">
                                <i class="fa-solid fa-minus"></i> Stabil
                            </div>
                        </div>

                        <div class="chart-container">
                            <canvas id="ipsChart"></canvas>
                        </div>

                        <div class="chart-legend">
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#3b82f6;"></div>
                                IPS Harian
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#e2e8f0; border: 1px dashed #94a3b8;"></div>
                                Target (3.00)
                            </div>
                        </div>
                    </div>

                    <!-- FORM CARD -->
                    <div class="form-card">
                        <div class="card-title">
                            <i class="fa-solid fa-pen-to-square" style="color:var(--accent)"></i>
                            Edit Informasi
                        </div>

                        <form id="profile-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label><i class="fa-solid fa-user"></i>Nama Lengkap</label>
                                    <input type="text" id="inp-name" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label><i class="fa-brands fa-whatsapp"></i>WhatsApp / HP</label>
                                    <input type="tel" id="inp-hp" class="form-input" placeholder="08...">
                                </div>
                                <div class="form-group">
                                    <label><i class="fa-solid fa-cake-candles"></i>Tanggal Lahir</label>
                                    <input type="date" id="inp-dob" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label><i class="fa-solid fa-location-dot"></i>Alamat Domisili</label>
                                    <input type="text" id="inp-addr" class="form-input" placeholder="Kota, Provinsi">
                                </div>
                                <div class="form-group full-width">
                                    <label><i class="fa-solid fa-quote-left"></i>Bio Singkat</label>
                                    <textarea id="inp-bio" class="form-input" placeholder="Tulis sesuatu tentang dirimu..." rows="3" style="resize:vertical;"></textarea>
                                </div>
                            </div>

                            <div class="form-footer">
                                <button type="submit" class="btn-save">
                                    <i class="fa-solid fa-floppy-disk"></i> Simpan Data
                                </button>
                            </div>
                        </form>
                    </div>

                </div><!-- end right-col -->
            </div><!-- end main-grid -->
        </div><!-- end profile-content -->

    </div><!-- end container -->

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <script type="module">
        import { db, checkAuth } from "/js/firebase-config.js";
        import {
            doc, updateDoc, getDoc, collection, query, orderBy, limit, getDocs, setDoc, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ============================================================
        // TOMBOL KEMBALI DINAMIS
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const fromInkubasi = urlParams.get('ref') === 'inkubasi';
        const btnKembali = document.getElementById('btn-kembali');
        const textKembali = document.getElementById('kembali-text');
        if (btnKembali) {
            if (fromInkubasi) {
                btnKembali.href = '/dashboard/inkubasi.html';
                textKembali.innerText = 'Ruang Inkubasi';
            } else {
                btnKembali.href = '/dashboard/index.html';
                textKembali.innerText = 'Dashboard Utama';
            }
        }

        const IMGBB_API_KEY = "2f45fcafb6dfb2dbae295499022ce476";
        let currentUser = null;
        let ipsChart = null;

        window.closeOverlay = () => document.getElementById('alert-overlay').classList.remove('active');

        function showAlert(type, title, msg) {
            const ov = document.getElementById('alert-overlay');
            const icon = document.getElementById('alert-icon');
            if (type === 'success') icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#10b981;"></i>';
            else icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#ef4444;"></i>';
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            ov.classList.add('active');
        }

        // ============================================================
        // CHART
        // ============================================================
        async function loadIPSHistory(uid) {
            // Coba ambil dari subcollection ipsHistory
            let historyData = [];
            try {
                const histRef = collection(db, 'users', uid, 'ipsHistory');
                const q = query(histRef, orderBy('date', 'asc'), limit(14));
                const snap = await getDocs(q);
                snap.forEach(d => historyData.push(d.data()));
            } catch (e) {
                // Jika subcollection belum ada, pakai data dummy untuk preview
            }

            // Jika tidak ada history, generate dummy dari IPS saat ini
            if (historyData.length === 0 && currentUser) {
                const ipsNow = parseFloat(currentUser.ips || 0);
                const today = new Date();
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const label = d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
                    // Variasi kecil dari IPS terkini (hanya untuk visualisasi)
                    const v = i === 0 ? ipsNow : Math.max(0, Math.min(4, ipsNow + (Math.random() * 0.4 - 0.2)));
                    historyData.push({ date: label, ips: parseFloat(v.toFixed(2)) });
                }
            }

            renderChart(historyData);
        }

        function renderChart(data) {
            const labels = data.map(d => d.date || d.label || '');
            const values = data.map(d => parseFloat(d.ips || 0));

            // Trend indicator
            const trendBadge = document.getElementById('chart-trend-badge');
            if (values.length >= 2) {
                const diff = values[values.length - 1] - values[values.length - 2];
                if (diff > 0.05) {
                    trendBadge.className = 'chart-trend trend-up';
                    trendBadge.innerHTML = '<i class="fa-solid fa-arrow-trend-up"></i> Naik';
                } else if (diff < -0.05) {
                    trendBadge.className = 'chart-trend trend-down';
                    trendBadge.innerHTML = '<i class="fa-solid fa-arrow-trend-down"></i> Turun';
                } else {
                    trendBadge.className = 'chart-trend trend-same';
                    trendBadge.innerHTML = '<i class="fa-solid fa-minus"></i> Stabil';
                }
            }

            // Last date
            if (labels.length > 0) {
                document.getElementById('chart-last-date').innerText = 'Terakhir diperbarui: ' + labels[labels.length - 1];
            }

            const ctx = document.getElementById('ipsChart').getContext('2d');

            // Gradient fill
            const gradient = ctx.createLinearGradient(0, 0, 0, 160);
            gradient.addColorStop(0, 'rgba(59,130,246,0.25)');
            gradient.addColorStop(1, 'rgba(59,130,246,0.01)');

            if (ipsChart) ipsChart.destroy();

            ipsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'IPS',
                            data: values,
                            fill: true,
                            backgroundColor: gradient,
                            borderColor: '#3b82f6',
                            borderWidth: 2.5,
                            pointBackgroundColor: '#3b82f6',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            tension: 0.4
                        },
                        {
                            label: 'Target',
                            data: new Array(labels.length).fill(3.0),
                            fill: false,
                            borderColor: '#cbd5e1',
                            borderWidth: 1.5,
                            borderDash: [6, 4],
                            pointRadius: 0,
                            tension: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#0f172a',
                            titleColor: '#94a3b8',
                            bodyColor: '#fff',
                            padding: 10,
                            cornerRadius: 8,
                            displayColors: false,
                            callbacks: {
                                label: ctx => ctx.dataset.label === 'IPS'
                                    ? `IPS: ${ctx.parsed.y.toFixed(2)}`
                                    : `Target: ${ctx.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { family: 'Poppins', size: 10 },
                                color: '#94a3b8',
                                maxRotation: 0
                            }
                        },
                        y: {
                            min: 0, max: 4,
                            grid: {
                                color: 'rgba(226,232,240,0.6)',
                                drawBorder: false
                            },
                            ticks: {
                                font: { family: 'Poppins', size: 10 },
                                color: '#94a3b8',
                                stepSize: 1,
                                callback: v => v.toFixed(0)
                            }
                        }
                    }
                }
            });
        }

        // ============================================================
        // RENDER PROFIL
        // ============================================================
        (async () => {
            currentUser = await checkAuth('siswa');
            if (currentUser) {
                renderProfile(currentUser);
                await loadIPSHistory(currentUser.uid);
            }
        })();

        function renderProfile(user) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('profile-content').classList.remove('hidden');

            const name = user.name || 'Siswa';
            const ips = parseFloat(user.ips || 0);
            const sem = user.semester || 1;

            document.getElementById('display-name').innerText = name;
            document.getElementById('display-email').innerText = user.email || 'email@sekolah.id';
            document.getElementById('display-sem').innerText = `Semester ${sem}`;
            document.getElementById('display-ips').innerText = ips.toFixed(2);

            // Stats
            document.getElementById('stat-sem').innerText = sem;
            document.getElementById('stat-ips-val').innerText = ips.toFixed(2);
            document.getElementById('stat-days').innerText = user.hariAktif || Math.floor(Math.random() * 60 + 10);

            // Chart top IPS
            document.getElementById('chart-current-ips').innerHTML = `${ips.toFixed(2)} <span>IPS terkini</span>`;

            // Neon badge
            const ipsBadge = document.getElementById('ips-badge');
            ipsBadge.className = 'badge-ips';
            if (ips >= 3.00) {
                ipsBadge.classList.add('ips-neon-green');
                ipsBadge.innerHTML = `<i class="fa-solid fa-trophy"></i> IPS: ${ips.toFixed(2)}`;
            } else if (ips >= 2.00) {
                ipsBadge.classList.add('ips-neon-yellow');
                ipsBadge.innerHTML = `<i class="fa-solid fa-chart-line"></i> IPS: ${ips.toFixed(2)}`;
            } else {
                ipsBadge.classList.add('ips-neon-red');
                ipsBadge.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> IPS: ${ips.toFixed(2)}`;
            }

            if (user.photoURL) {
                document.getElementById('display-pic').src = user.photoURL;
            } else {
                document.getElementById('display-pic').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=003366&color=fff&size=200`;
            }

            // Form
            document.getElementById('inp-name').value = user.name || '';
            document.getElementById('inp-hp').value = user.noHp || '';
            document.getElementById('inp-dob').value = user.tanggalLahir || '';
            document.getElementById('inp-addr').value = user.alamat || '';
            document.getElementById('inp-bio').value = user.bioSingkat || '';
        }

        // ============================================================
        // UPLOAD FOTO
        // ============================================================
        window.uploadFoto = async () => {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const btn = document.getElementById('btn-cam');
            if (!file) return;

            btn.classList.add('loading');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const formData = new FormData();
                formData.append("image", file);
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST", body: formData
                });
                const result = await response.json();
                if (result.success) {
                    const url = result.data.url;
                    await updateDoc(doc(db, "users", currentUser.uid), { photoURL: url });
                    document.getElementById('display-pic').src = url;
                    showAlert('success', 'Foto Diperbarui!', 'Profil Anda terlihat keren 🎉');
                } else throw new Error("Gagal upload.");
            } catch (err) {
                showAlert('error', 'Gagal Upload', 'Periksa koneksi internet Anda.');
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = '<i class="fa-solid fa-camera"></i>';
                fileInput.value = "";
            }
        };

        // ============================================================
        // SIMPAN PROFIL & CATAT IPS HARIAN
        // ============================================================
        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
            btn.disabled = true;

            const payload = {
                name: document.getElementById('inp-name').value,
                noHp: document.getElementById('inp-hp').value,
                tanggalLahir: document.getElementById('inp-dob').value,
                alamat: document.getElementById('inp-addr').value,
                bioSingkat: document.getElementById('inp-bio').value
            };

            try {
                await updateDoc(doc(db, 'users', currentUser.uid), payload);
                document.getElementById('display-name').innerText = payload.name;

                // Catat riwayat IPS hari ini (jika ada IPS)
                const ipsNow = parseFloat(currentUser.ips || 0);
                if (ipsNow > 0) {
                    const today = new Date();
                    const dateKey = today.toISOString().split('T')[0]; // YYYY-MM-DD
                    const label = today.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
                    const histRef = doc(db, 'users', currentUser.uid, 'ipsHistory', dateKey);
                    await setDoc(histRef, { date: label, ips: ipsNow, updatedAt: serverTimestamp() }, { merge: true });
                    // Reload chart
                    await loadIPSHistory(currentUser.uid);
                }

                showAlert('success', 'Berhasil!', 'Data profil tersimpan dengan baik.');
            } catch (err) {
                showAlert('error', 'Terjadi Error', err.message);
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
