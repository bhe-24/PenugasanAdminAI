<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan - Cendekia Aksara</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #003366; --accent: #4361ee; --bg: #f4f6f9; }
        body { background-color: var(--bg); font-family: 'Outfit', sans-serif; color: #333; margin: 0; padding-bottom: 40px; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .page-header {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 25px 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 51, 102, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; position: relative; overflow: hidden; flex-wrap: wrap; gap: 15px;
        }
        .page-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255,255,255,0.05);
            border-radius: 50%; pointer-events: none;
        }
        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; }
        .header-logo-circle {
            width: 70px; height: 70px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0; overflow: hidden;
        }
        .header-logo-circle img { width: 75%; height: auto; object-fit: contain; }
        .header-content h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; line-height: 1.2; letter-spacing: 0.5px;}
        .header-content p { margin: 5px 0 0; opacity: 0.9; font-size: 0.9rem; color: #cbd5e1; }
        
        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 18px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2;
        }
        .btn-back:hover { background: white; color: var(--primary); }

        .content-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px; }
        .card {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.03); border: 1px solid #eef2f6;
            height: fit-content;
        }
        .profile-section { text-align: center; }
        .avatar-circle {
            width: 80px; height: 80px; background: #e0f2fe; color: #003366;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; margin: 0 auto 15px;
        }
        .st-name { font-size: 1.2rem; font-weight: 700; margin: 0; color: #1e293b; }
        .st-id { color: #64748b; font-size: 0.9rem; margin-top: 5px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #64748b; }
        .info-val { font-weight: 600; color: #334155; }

        .bill-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 10px; }
        .bill-label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .bill-amount { font-size: 2.2rem; font-weight: 800; color: #003366; line-height: 1; margin: 5px 0; }
        
        .status-badge { padding: 6px 12px; border-radius: 50px; font-weight: 700; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; height: fit-content; }
        .st-unpaid { background: #fee2e2; color: #991b1b; }
        .st-paid { background: #dcfce7; color: #166534; }
        .st-cicil { background: #fef3c7; color: #b45309; }
        .st-waiting { background: #e0f2fe; color: #0369a1; }

        .details-box { background: #f8fafc; border-radius: 12px; padding: 15px; margin: 20px 0; border: 1px solid #f1f5f9; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; color: #475569; }
        .detail-total { border-top: 2px dashed #cbd5e1; margin-top: 10px; padding-top: 10px; font-weight: 700; color: #1e293b; font-size: 1rem; }

        .action-area { margin-top: 25px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-action {
            display: flex; width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none;
            justify-content: center; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-action:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-pay { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-receipt { background: #003366; color: white; }
        .btn-cicil { background: #fff; border: 2px solid #f59e0b; color: #d97706; }
        .btn-cicil:hover { background: #fffbeb; }
        .btn-waiting { background: #cbd5e1; color: #475569; cursor: default; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; transform: scale(0.8); transition: transform 0.3s; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .close-modal { position: absolute; right: 15px; top: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; }

        .modal-icon-lg { font-size: 3rem; margin-bottom: 15px; display: inline-block; }
        .modal-h3 { margin: 0 0 10px 0; color: #003366; font-size: 1.3rem; transition: 0.3s; }
        .modal-p { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; line-height: 1.5; }
        .btn-modal { padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        .btn-yes { background: #003366; color: white; }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        #modal-notification .modal-box { border-top: 5px solid var(--primary); }
        #modal-notification.success .modal-box { border-top-color: #10b981; }
        #modal-notification.error .modal-box { border-top-color: #ef4444; }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .page-header { flex-direction: column; align-items: flex-start; text-align: left; }
            .btn-back { width: 100%; justify-content: center; margin-top: 10px; }
            .content-grid { grid-template-columns: 1fr; gap: 20px; }
            .bill-amount { font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .action-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <header class="page-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-content">
                    <h1>Keuangan Siswa</h1>
                    <p>Kelola tagihan dan administrasi akademik Anda.</p>
                </div>
            </div>
            <a href="/dashboard/index.html" class="btn-back" id="btn-kembali">
                <i class="fa-solid fa-arrow-left"></i> <span id="kembali-text">Dashboard Utama</span>
            </a>
        </header>

        <div class="content-grid">
            <div class="card profile-section">
                <div class="avatar-circle"><i class="fa-solid fa-user-graduate"></i></div>
                <h2 class="st-name" id="st-name">Memuat...</h2>
                <p class="st-id" id="st-uid">ID: -</p>
                <div style="margin-top: 25px; text-align: left;">
                    <div class="info-row"><span class="info-label">Semester</span><span class="info-val" id="header-sem">-</span></div>
                    <div class="info-row"><span class="info-label">IP Semester</span><span class="info-val" id="st-ips">-</span></div>
                    <div class="info-row"><span class="info-label">Status Akademik</span><span class="info-val" style="color:#166534;">Aktif</span></div>
                </div>
            </div>

            <div class="card">
                <div class="bill-header">
                    <div>
                        <div class="bill-label" id="label-tagihan">Total Kewajiban</div>
                        <div class="bill-amount" id="amount-display">Rp -</div>
                    </div>
                    <div id="status-badge" class="status-badge st-unpaid">Memuat...</div>
                </div>
                <div class="details-box" id="rincian-list"></div>
                <div id="action-area" class="action-area"></div>
            </div>
        </div>
    </div>

    <div id="modal-qris" class="modal-overlay">
        <div class="modal-box" style="padding: 35px 25px;">
            <h3 class="modal-h3" id="qris-header">Menyiapkan Pembayaran</h3>
            <p id="qris-title" style="font-size:0.9rem; color:#64748b; margin-bottom:5px;">-</p>
            <p id="qris-amount" style="font-size:1.8rem; font-weight:800; color:#1e293b; margin:0 0 20px 0;">Rp -</p>
            
            <div style="position: relative; width: fit-content; margin: 0 auto 20px auto;">
                <img id="qris-image" src="" style="width:250px; height:250px; border-radius:12px; border:2px solid #e2e8f0; padding:10px;" crossorigin="anonymous">
                
                <div id="qris-success-mark" style="position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); border-radius:12px; display:none; flex-direction:column; justify-content:center; align-items:center;">
                    <div style="width: 80px; height: 80px; background: #10b981; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 3rem; margin-bottom: 10px; box-shadow: 0 10px 25px rgba(16,185,129,0.4); animation: scaleIn 0.5s ease-out;">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <h4 style="margin:0; color:#166534; font-size:1.2rem;">LUNAS</h4>
                </div>
            </div>
            
            <div id="qris-controls">
                <button id="btn-download-qris" class="btn-action btn-pay" onclick="downloadQRISPoster()" style="margin-bottom:15px; background: linear-gradient(135deg, #003366, #001f3f);">
                    <i class="fa-solid fa-download"></i> Unduh Poster QRIS
                </button>
                
                <div style="font-size:0.85rem; color:#64748b; font-weight:600; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <i class="fa-solid fa-circle-notch fa-spin" style="color:var(--primary);"></i> Sistem mendeteksi otomatis...
                </div>
            </div>
        </div>
    </div>

    <div id="modal-notification" class="modal-overlay">
        <div class="modal-box">
            <div id="noti-icon" class="modal-icon-lg"></div>
            <h3 id="noti-title" class="modal-h3">Notifikasi</h3>
            <p id="noti-msg" class="modal-p"></p>
            <button class="btn-action btn-receipt" onclick="closeAllModals()">Tutup</button>
        </div>
    </div>

    <div id="modal-loading" class="modal-overlay">
        <div class="modal-box" style="width:auto; padding:30px;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size:3rem; color:#003366;"></i>
            <p style="margin-top:15px; font-weight:600;">Sedang memproses...</p>
        </div>
    </div>

    <script type="module">
        import { db, checkAuth } from "./js/firebase-config.js";
        import { collection, query, where, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // ================== PARAMETER URL ==================
        const urlParams = new URLSearchParams(window.location.search);
        const refParam = urlParams.get('ref');                  // bisa 'inkubasi' atau lainnya
        const paymentType = urlParams.get('type') || 'regular';
        const penaltyAmount = parseInt(urlParams.get('penalty')) || 0;
        const activeDays = parseInt(urlParams.get('days')) || 0;
        const isWithdrawal = paymentType === 'withdrawal';
        
        // ================== TOMBOL KEMBALI DINAMIS ==================
        const btnKembali = document.getElementById('btn-kembali');
        const textKembali = document.getElementById('kembali-text');
        
        if (btnKembali && textKembali) {
            if (isWithdrawal) {
                // Kembali ke halaman cuti dengan mempertahankan parameter ref jika ada
                let backUrl = '/cuti.html';
                if (refParam) {
                    backUrl += `?ref=${refParam}`;
                }
                btnKembali.href = backUrl;
                textKembali.innerText = 'Kembali ke Form Cuti';
            } else {
                // Bukan mode withdrawal, gunakan ref untuk menentukan halaman kembali
                if (refParam === 'inkubasi') {
                    btnKembali.href = '/dashboard/inkubasi.html';
                    textKembali.innerText = 'Ruang Inkubasi';
                } else {
                    // Default: dashboard utama
                    btnKembali.href = '/dashboard/index.html';
                    textKembali.innerText = 'Dashboard Utama';
                }
            }
        }

        let currentUser = null;
        let unsubscribePayment = null;
        window.currentPaymentContext = 'regular';

        window.showCustomModal = (type, title, message) => {
            const modal = document.getElementById('modal-notification');
            const icon = document.getElementById('noti-icon');
            const titleEl = document.getElementById('noti-title');
            const msgEl = document.getElementById('noti-msg');

            modal.classList.remove('success', 'error');
            modal.classList.add(type);

            if (type === 'success') icon.innerHTML = '✅';
            else if (type === 'error') icon.innerHTML = '❌';
            else icon.innerHTML = 'ℹ️';

            titleEl.innerText = title;
            msgEl.innerText = message;
            modal.classList.add('active');
        };

        window.downloadQRISPoster = () => {
            const btnDownload = document.getElementById('btn-download-qris');
            const originalText = btnDownload.innerHTML;
            btnDownload.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyusun Poster...';
            btnDownload.disabled = true;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 600;
            canvas.height = 800;

            ctx.fillStyle = '#f4f6f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#003366';
            ctx.fillRect(0, 0, canvas.width, 140);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 36px "Outfit", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('CENDEKIA AKSARA', canvas.width / 2, 70);
            ctx.font = '18px "Outfit", sans-serif';
            ctx.fillStyle = '#cbd5e1';
            ctx.fillText('Tagihan & Administrasi Akademik', canvas.width / 2, 105);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 10;
            ctx.fillRect(40, 180, 520, 560);
            ctx.shadowColor = 'transparent'; 
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 24px "Outfit", sans-serif';
            ctx.fillText('KODE BATANG PEMBAYARAN', canvas.width / 2, 230);
            const labelText = document.getElementById('qris-title').innerText;
            ctx.fillStyle = '#64748b';
            ctx.font = '18px "Outfit", sans-serif';
            ctx.fillText(labelText, canvas.width / 2, 260);
            const amountText = document.getElementById('qris-amount').innerText;
            ctx.fillStyle = '#003366';
            ctx.font = 'bold 42px "Outfit", sans-serif';
            ctx.fillText(amountText, canvas.width / 2, 320);

            const qrImg = new Image();
            qrImg.crossOrigin = 'Anonymous';
            qrImg.src = document.getElementById('qris-image').src;

            qrImg.onload = () => {
                const qrSize = 260;
                const qrX = (canvas.width - qrSize) / 2;
                const qrY = 350;
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 4;
                ctx.strokeRect(qrX - 10, qrY - 10, qrSize + 20, qrSize + 20);
                ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
                ctx.fillStyle = '#d97706';
                ctx.font = 'bold 18px "Outfit", sans-serif';
                ctx.fillText('Transfer TEPAT sesuai nominal di atas', canvas.width / 2, 660);
                ctx.fillStyle = '#ef4444';
                ctx.font = 'bold 16px "Outfit", sans-serif';
                ctx.fillText('Kedaluwarsa dalam 60 Menit', canvas.width / 2, 690);
                const link = document.createElement('a');
                link.download = `QRIS_CendekiaAksara_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btnDownload.innerHTML = originalText;
                btnDownload.disabled = false;
            };

            qrImg.onerror = () => {
                alert('Gagal menyusun gambar QRIS. Pastikan koneksi internet Anda stabil.');
                btnDownload.innerHTML = originalText;
                btnDownload.disabled = false;
            };
        };

        window.showQRIS = async (amount, label) => {
            if (!currentUser) return; 
            document.getElementById('modal-loading').classList.add('active');
            window.currentPaymentContext = isWithdrawal ? 'withdrawal' : 'regular';

            try {
                const response = await fetch('https://cendekia-aksara.vercel.app/api/create-qris', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paymentAmount: amount,
                        productDetails: label,
                        uid: currentUser.uid,
                        customerDetail: {
                            name: currentUser.name || "Siswa Cendekia Aksara",
                            email: currentUser.email || "siswa@cendekiaaksara.com",
                            phone: currentUser.phone || "08123456789"
                        }
                    })
                });

                const data = await response.json();
                if (!data.success) throw new Error(data.message || "Gagal membuat kode QRIS.");

                await updateDoc(doc(db, 'users', currentUser.uid), { 
                    paymentStatus: 'waiting', 
                    pendingAmount: amount 
                });

                document.getElementById('qris-amount').innerText = "Rp " + amount.toLocaleString('id-ID');
                document.getElementById('qris-title').innerText = label;
                document.getElementById('qris-header').innerText = 'Menyiapkan Pembayaran';
                document.getElementById('qris-image').src = `https://quickchart.io/qr?text=${encodeURIComponent(data.qrString)}&size=300&margin=1`;

                document.getElementById('modal-loading').classList.remove('active');
                document.getElementById('modal-qris').classList.add('active');

                if (unsubscribePayment) unsubscribePayment();
                unsubscribePayment = onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
                    const snapData = docSnap.data();
                    if (snapData.paymentStatus === 'verified' || snapData.statusPembayaran === 'Lunas') {
                        if (unsubscribePayment) unsubscribePayment();
                        handlePaymentSuccess();
                    }
                });

            } catch(e) {
                console.error(e);
                document.getElementById('modal-loading').classList.remove('active');
                showCustomModal('error', 'Gagal', 'Sistem pembayaran sedang gangguan: ' + e.message);
            }
        };

        function handlePaymentSuccess() {
            if (window.currentPaymentContext === 'withdrawal') {
                updateDoc(doc(db, 'users', currentUser.uid), {
                    withdrawalPenaltyPaid: true,
                    paymentStatus: 'verified',
                    pendingAmount: 0
                }).then(() => {
                    document.getElementById('qris-success-mark').style.display = 'flex';
                    const header = document.getElementById('qris-header');
                    header.innerText = 'Pembayaran Denda Berhasil!';
                    header.style.color = '#10b981';
                    document.getElementById('qris-controls').innerHTML = `
                        <div style="font-size:0.95rem; color:#166534; font-weight:700; background: #dcfce7; padding: 15px; border-radius: 12px; border: 1px solid #bbf7d0; animation: scaleIn 0.5s ease-out;">
                            <i class="fa-solid fa-check-double"></i> Denda withdrawal telah dilunasi. Silakan kembali ke form cuti.
                        </div>
                    `;
                    setTimeout(() => { location.reload(); }, 3000);
                });
                return;
            }

            document.getElementById('qris-success-mark').style.display = 'flex';
            const header = document.getElementById('qris-header');
            header.innerText = 'Pembayaran Berhasil!';
            header.style.color = '#10b981';
            document.getElementById('qris-controls').innerHTML = `
                <div style="font-size:0.95rem; color:#166534; font-weight:700; background: #dcfce7; padding: 15px; border-radius: 12px; border: 1px solid #bbf7d0; animation: scaleIn 0.5s ease-out;">
                    <i class="fa-solid fa-check-double"></i> Sistem telah memverifikasi pembayaran Anda. Halaman akan dimuat ulang...
                </div>
            `;
            setTimeout(() => { location.reload(); }, 3000);
        }

        window.closeAllModals = () => {
            document.querySelectorAll('.modal-overlay:not(#modal-qris)').forEach(el => el.classList.remove('active'));
        };

        (async () => {
            currentUser = await checkAuth('siswa');
            if(currentUser) {
                const rawSem = currentUser.semester || 1;
                const sem = parseInt(String(rawSem).replace(/\\D/g, '')) || 1;

                if (isWithdrawal) {
                    renderData(currentUser, sem);
                    if (currentUser.paymentStatus === 'waiting' && !currentUser.withdrawalPenaltyPaid) {
                        onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
                            const data = docSnap.data();
                            if ((data.paymentStatus === 'verified' || data.statusPembayaran === 'Lunas') && data.withdrawalPenaltyPaid) {
                                handlePaymentSuccess();
                            }
                        });
                    }
                } else {
                    renderData(currentUser, sem);
                    if (currentUser.paymentStatus === 'waiting' && currentUser.statusPembayaran !== 'Lunas') {
                        setWaitingUI();
                        onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
                            if (docSnap.data().paymentStatus === 'verified' || docSnap.data().statusPembayaran === 'Lunas') {
                                handlePaymentSuccess();
                            }
                        });
                    }
                }
            }
        })();

        function setWaitingUI() {
            const badge = document.getElementById('status-badge');
            const actionArea = document.getElementById('action-area');
            if(badge) { badge.className = 'status-badge st-waiting'; badge.innerHTML = '<i class="fa-solid fa-clock"></i> MENUNGGU PEMBAYARAN'; }
            if(actionArea) { 
                actionArea.innerHTML = `
                <div style="text-align:center; padding:20px; background:#f8fafc; border-radius:12px; border:1px solid #e2e8f0;">
                    <p style="margin:0 0 15px 0; font-size:0.95rem; font-weight:600; color:#475569;">Anda memiliki tagihan yang sedang tertunda.</p>
                    <button onclick="location.reload()" class="btn-action btn-pay" style="margin-bottom:10px;"><i class="fa-solid fa-rotate"></i> Cek Status Terkini</button>
                    <p style="margin:0; font-size:0.75rem; color:#ef4444;">*Jika jendela scan QRIS tertutup secara tidak sengaja, harap hubungi Admin.</p>
                </div>
                `; 
            }
        }

        async function renderData(user, sem) {
            if (isWithdrawal) {
                document.getElementById('header-sem').innerText = "Withdrawal";
                document.getElementById('st-name').innerText = user.name;
                document.getElementById('st-uid').innerText = user.uid.substring(0,6).toUpperCase();
                document.getElementById('st-ips').innerText = "-";
                
                const statusPaid = user.withdrawalPenaltyPaid === true;
                const badge = document.getElementById('status-badge');
                const amountEl = document.getElementById('amount-display');
                const detailsEl = document.getElementById('rincian-list');
                const actionArea = document.getElementById('action-area');
                const labelTagihan = document.getElementById('label-tagihan');
                
                labelTagihan.innerText = "DENDA WITHDRAWAL";
                amountEl.innerText = "Rp " + penaltyAmount.toLocaleString('id-ID');
                detailsEl.innerHTML = `
                    <div class="detail-row"><span>Masa Aktif Akun</span><span>${activeDays} hari</span></div>
                    <div class="detail-row"><span>Tarif Denda / Hari</span><span>Rp 1.000</span></div>
                    <div class="detail-row detail-total"><span>TOTAL DENDA</span><span>Rp ${penaltyAmount.toLocaleString('id-ID')}</span></div>
                `;
                
                if (statusPaid) {
                    badge.className = 'status-badge st-paid'; 
                    badge.innerHTML = '<i class="fa-solid fa-check"></i> DENDA LUNAS';
                    // Tombol kembali ke halaman cuti dengan ref jika ada
                    let backUrl = '/cuti.html';
                    if (refParam) backUrl += `?ref=${refParam}`;
                    actionArea.innerHTML = `<button class="btn-action btn-receipt" onclick="window.location.href='${backUrl}'"><i class="fa-solid fa-arrow-left"></i> Kembali ke Form Cuti</button>`;
                } else if (user.paymentStatus === 'waiting') {
                    badge.className = 'status-badge st-waiting'; 
                    badge.innerHTML = '<i class="fa-solid fa-clock"></i> MENUNGGU PEMBAYARAN';
                    actionArea.innerHTML = `
                        <div style="text-align:center; padding:20px; background:#f8fafc; border-radius:12px; border:1px solid #e2e8f0;">
                            <p style="margin:0 0 15px 0; font-size:0.95rem; font-weight:600; color:#475569;">Menunggu pembayaran denda withdrawal.</p>
                            <button onclick="location.reload()" class="btn-action btn-pay" style="margin-bottom:10px;"><i class="fa-solid fa-rotate"></i> Cek Status Terkini</button>
                        </div>
                    `;
                } else {
                    badge.className = 'status-badge st-unpaid'; 
                    badge.innerHTML = 'BELUM BAYAR';
                    actionArea.innerHTML = `<button onclick="showQRIS(${penaltyAmount}, 'Denda Withdrawal')" class="btn-action btn-pay"><i class="fa-solid fa-qrcode"></i> Bayar Denda</button>`;
                }
                return;
            }

            // Mode reguler
            document.getElementById('header-sem').innerText = "Semester " + sem;
            document.getElementById('st-name').innerText = user.name;
            document.getElementById('st-uid').innerText = user.uid.substring(0,6).toUpperCase();
            document.getElementById('st-ips').innerText = parseFloat(user.ips||0).toFixed(2);

            const status = user.statusPembayaran; 
            const paymentStatus = user.paymentStatus;
            
            const badge = document.getElementById('status-badge');
            const amountEl = document.getElementById('amount-display');
            const detailsEl = document.getElementById('rincian-list');
            const actionArea = document.getElementById('action-area');
            const labelTagihan = document.getElementById('label-tagihan');

            if (paymentStatus === 'waiting' && status !== 'Lunas') {
                setWaitingUI();
                if (sem < 3) {
                    const q = query(collection(db, 'exams'), where('status', '==', 'active'));
                    const snap = await getDocs(q);
                    amountEl.innerText = "Rp " + (snap.size * 1000).toLocaleString('id-ID');
                } else {
                    const nominal = (status === 'Cicilan') ? 37725 : 75450;
                    amountEl.innerText = "Rp " + nominal.toLocaleString('id-ID');
                }
                return;
            }

            if (sem < 3) {
                const q = query(collection(db, 'exams'), where('status', '==', 'active'));
                const snap = await getDocs(q);
                const count = snap.size;
                const totalBayar = count * 1000;

                labelTagihan.innerText = "TAGIHAN UJIAN";
                amountEl.innerText = "Rp " + totalBayar.toLocaleString('id-ID');
                detailsEl.innerHTML = `<div class="detail-row"><span>Biaya Per Mapel</span><span>Rp 1.000</span></div><div class="detail-row"><span>Jumlah Mapel</span><span>${count}</span></div><div class="detail-row detail-total"><span>TOTAL TAGIHAN</span><span>Rp ${totalBayar.toLocaleString('id-ID')}</span></div>`;

                if (status === 'Lunas') {
                    badge.className = 'status-badge st-paid'; badge.innerHTML = '<i class="fa-solid fa-check"></i> LUNAS';
                    actionArea.innerHTML = `<a href="kwitansi.html" class="btn-action btn-receipt"><i class="fa-solid fa-file-invoice"></i> Lihat Kwitansi</a>`;
                } else {
                    badge.className = 'status-badge st-unpaid'; badge.innerHTML = 'BELUM BAYAR';
                    if(totalBayar > 0) {
                        actionArea.innerHTML = `<button onclick="showQRIS(${totalBayar}, 'Uang Ujian')" class="btn-action btn-pay"><i class="fa-solid fa-qrcode"></i> Bayar Sekarang</button>`;
                    } else {
                        actionArea.innerHTML = `<div style="text-align:center; color:#64748b; font-size:0.9rem; margin-top:10px;"><i class="fa-solid fa-circle-check"></i> Tidak ada tagihan ujian aktif saat ini.</div>`;
                    }
                }
            } else {
                detailsEl.innerHTML = `<div class="detail-row"><span>Buku Rapor</span><span>Rp 20.450</span></div><div class="detail-row"><span>Special Book</span><span>Rp 25.000</span></div><div class="detail-row"><span>Administrasi</span><span>Rp 5.000</span></div><div class="detail-row"><span>Bimbingan</span><span>Rp 25.000</span></div><div class="detail-row detail-total"><span>TOTAL FULL</span><span>Rp 75.450</span></div>`;

                if (status === 'Lunas') {
                    labelTagihan.innerText = "TOTAL ADMINISTRASI";
                    amountEl.innerText = "Rp 75.450";
                    badge.className = 'status-badge st-paid'; badge.innerHTML = '<i class="fa-solid fa-check"></i> LUNAS';
                    actionArea.innerHTML = `<a href="kwitansi.html" class="btn-action btn-receipt"><i class="fa-solid fa-file-invoice"></i> Download Kwitansi</a>`;
                } else if (status === 'Cicilan') {
                    labelTagihan.innerText = "SISA TAGIHAN";
                    amountEl.innerText = "Rp 37.725"; 
                    badge.className = 'status-badge st-cicil'; badge.innerHTML = 'CICILAN AKTIF (50%)';
                    actionArea.innerHTML = `<div class="action-grid"><button onclick="showQRIS(37725, 'Sisa Cicilan')" class="btn-action btn-pay"><i class="fa-solid fa-wallet"></i> Lunasi Sisa</button><a href="kwitansi.html" class="btn-action btn-receipt" style="background:#64748b;"><i class="fa-solid fa-file-invoice"></i> Bukti DP</a></div>`;
                } else {
                    labelTagihan.innerText = "TOTAL ADMINISTRASI";
                    amountEl.innerText = "Rp 75.450";
                    badge.className = 'status-badge st-unpaid'; badge.innerHTML = 'BELUM BAYAR';
                    actionArea.innerHTML = `<div class="action-grid"><button onclick="showQRIS(37725, 'Cicilan 50%')" class="btn-action btn-cicil">Cicil 50%</button><button onclick="showQRIS(75450, 'Lunas Penuh')" class="btn-action btn-pay">Lunas</button></div>`;
                }
            }
        }
    </script>
</body>
</html>
