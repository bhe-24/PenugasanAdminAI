<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cendekia Aksara</title>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLE CONTAINER --- */
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; padding-bottom: 50px; overflow-x: hidden;}
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* --- HEADER BRANDED NAVY (STICKY) --- */
        .brand-header {
            position: sticky;
            top: 15px; /* Menempel di atas saat di-scroll */
            z-index: 1000;
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 20px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
            margin-bottom: 20px; overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; flex: 1; }

        .header-logo-circle {
            width: 70px; height: 70px;
            background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-shrink: 0; padding: 10px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite;
        }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.7rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: white;
        }
        .header-greeting {
            font-size: 0.95rem; opacity: 0.9; margin-top: 4px; font-weight: 400; color: #bae6fd;
        }

        /* TOMBOL KELUAR DI HEADER */
        .btn-logout-header {
            background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; border-radius: 50px; font-weight: 600; cursor: pointer;
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            backdrop-filter: blur(5px); z-index: 2; font-family: 'Poppins', sans-serif;
            flex-shrink: 0; margin-left: auto;
        }
        .btn-logout-header:hover { background: #dc3545; color: white; border-color: #dc3545; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4); transform: translateY(-2px);}

        /* --- LENCANA STATUS DINAMIS (DI BAWAH HEADER) --- */
        .status-ticker-wrapper {
            display: flex; justify-content: center; margin-bottom: 30px;
        }
        .dynamic-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 20px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 600; font-family: 'Poppins';
            transition: opacity 0.3s ease-in-out, transform 0.3s;
            cursor: default; opacity: 0; /* Awal tersembunyi sampai diload JS */
        }
        
        .badge-aktif { background: #22c55e; color: white; box-shadow: 0 2px 10px rgba(34, 197, 94, 0.3); border: 1px solid #86efac;}
        .badge-cuti { background: #f59e0b; color: white; box-shadow: 0 2px 10px rgba(245, 158, 11, 0.3); border: 1px solid #fde68a;}
        .badge-nonaktif { background: #ef4444; color: white; box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3); border: 1px solid #fca5a5;}
        .badge-osis { background: linear-gradient(135deg, #d4af37, #f59e0b); color: white; box-shadow: 0 2px 10px rgba(212, 175, 55, 0.4); border: 1px solid #fef08a;}

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* --- GRID MENU --- */
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;
        }
        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: repeat(3, 1fr); gap: 25px; }
        }
        
        .dashboard-card {
            background: white; border-radius: 12px; padding: 20px 15px;
            text-align: center; text-decoration: none; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.3s ease;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 120px; cursor: pointer; position: relative; overflow: hidden;
        }
        
        /* EFEK HOVER JIKA AKTIF */
        .dashboard-card:not(.disabled-card):hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .dashboard-card i { font-size: 2rem; margin-bottom: 10px; opacity: 0.9; transition: 0.3s; color: white;}
        .dashboard-card h3 { font-size: 0.95rem; font-weight: 600; margin: 0; transition: 0.3s; color: white;}

        /* WARNA KARTU */
        .tugas { background: linear-gradient(135deg, #005a9c 0%, #007bff 100%); }
        .profil { background: linear-gradient(135deg, #17a2b8 0%, #20c997 100%); }
        .kartu-studi { background: linear-gradient(135deg, #6f42c1 0%, #e83e8c 100%); }
        .pustaka { background: linear-gradient(135deg, #fd7e14 0%, #d63384 100%); }
        .kuis { background: linear-gradient(135deg, #28a745 0%, #17a2b8 100%); }
        .ujian { background: linear-gradient(135deg, #f7a04a 0%, #ffc107 100%); }
        .generator-ide { background: linear-gradient(135deg, #1C6FF8 0%, #FEF720 100%); }
        .card-bayar { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .aksabot { background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%); } 
        .card-cuti { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .aspirasi { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
        
        /* WARNA KARTU OSIS EKSKLUSIF */
        .card-osis { background: linear-gradient(135deg, #d4af37 0%, #a17f1a 100%); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);}

        /* KARTU DISABLED (ABU-ABU) */
        .disabled-card {
            background: #e2e8f0 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }
        .disabled-card i, .disabled-card h3 {
            color: #94a3b8 !important;
        }

        /* --- CUSTOM MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 31, 63, 0.6); backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: white; width: 90%; max-width: 400px;
            padding: 30px; border-radius: 20px; text-align: center;
            transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-icon { font-size: 3rem; margin-bottom: 15px; color: #003366; }
        .modal-title { font-family: 'Playfair Display', serif; margin: 0 0 10px 0; font-size: 1.5rem; color: #333; }
        .modal-text { color: #666; margin-bottom: 25px; line-height: 1.5; font-size: 0.95rem; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-modal { padding: 10px 25px; border-radius: 50px; font-weight: 600; cursor: pointer; border: none; transition: transform 0.2s; font-family: 'Poppins';}
        .btn-modal:active { transform: scale(0.95); }
        .btn-cancel { background: #f1f1f1; color: #666; }
        .btn-confirm { background: #003366; color: white; box-shadow: 0 4px 10px rgba(0, 51, 102, 0.3); }
        .btn-danger-modal { background: #dc3545; color: white; box-shadow: 0 4px 10px rgba(220, 53, 69, 0.3); }

        /* --- RESPONSIVE MOBILE FIX --- */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .brand-header {
                padding: 15px 20px; gap: 10px;
                flex-direction: row; /* Memaksa elemen tetap menyamping */
                align-items: center;
                top: 10px; /* Jarak sticky mobile */
            }
            .header-logo-circle { width: 50px; height: 50px; padding: 8px; }
            .header-brand-name { font-size: 1.3rem; }
            .header-greeting { font-size: 0.8rem; margin-top: 2px; }
            
            /* Tombol keluar mengecil jadi ikon di ujung kanan */
            .btn-logout-header {
                width: 42px; height: 42px; padding: 0;
                justify-content: center; margin: 0; margin-left: auto;
            }
            .btn-logout-header span { display: none; }
            .btn-logout-header i { margin: 0; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- HEADER STICKY -->
        <div class="brand-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-info">
                    <h1 class="header-brand-name">Cendekia Aksara</h1>
                    <div id="user-greeting" class="header-greeting"><i class="fa-solid fa-spinner fa-spin"></i> Memuat...</div>
                </div>
            </div>
            
            <button id="logout-btn" class="btn-logout-header" title="Keluar">
                <i class="fa-solid fa-right-from-bracket"></i> <span>Keluar</span>
            </button>
        </div>

        <!-- LENCANA STATUS DINAMIS DI BAWAH HEADER -->
        <div class="status-ticker-wrapper">
            <div id="dynamic-badge" class="dynamic-badge badge-aktif">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Menyiapkan...
            </div>
        </div>

        <div class="dashboard-grid">
            <a href="/tugas" class="dashboard-card tugas"> 
                <i class="fa-solid fa-pencil-alt"></i> <h3>Tugas Harian</h3> 
            </a>
            <a href="/profil/index.html" class="dashboard-card profil"> 
                <i class="fa-solid fa-user-circle"></i> <h3>Profil Saya</h3> 
            </a>
            <a href="/kartu-studi/index.html" class="dashboard-card kartu-studi"> 
                <i class="fa-solid fa-file-contract"></i> <h3>Kartu Studi</h3> 
            </a>

            <a href="/osis/index.html" id="card-osis" class="dashboard-card card-osis" style="display:none;"> 
                <i class="fa-solid fa-users-viewfinder"></i> <h3>Ruang OSIS</h3> 
            </a>

            <a href="/siswa/aspirasi.html" class="dashboard-card aspirasi always-on-cuti"> 
                <i class="fa-solid fa-box-open"></i> <h3>Kotak Saran</h3> 
            </a>

            <a href="/dashboard/aksabot.html" class="dashboard-card aksabot"> 
                <i class="fa-solid fa-robot"></i> <h3>Asisten AksaBot</h3> 
            </a>

            <a href="https://generator-ide.vercel.app/" target="_blank" class="dashboard-card generator-ide always-on-cuti"> 
                <i class="fa-solid fa-brain"></i> <h3>Generator Ide</h3> 
            </a>
            <a href="/pustaka-materi/index.html" class="dashboard-card pustaka always-on-cuti"> 
                <i class="fa-solid fa-book-open"></i> <h3>Pustaka Materi</h3> 
            </a>
            <a href="/siswa/cuti.html" class="dashboard-card card-cuti always-on-cuti">
                <i class="fa-solid fa-calendar-xmark"></i> 
                <h3>Ajukan Izin / Cuti</h3>
            </a>
            <a href="/kuis/index.html" class="dashboard-card kuis"> 
                <i class="fa-solid fa-list-check"></i> <h3>Portal Kuis</h3> 
            </a>
            <a href="/ujian/index.html" class="dashboard-card ujian"> 
                <i class="fa-solid fa-stopwatch"></i> <h3>Portal Ujian</h3> 
            </a>
            <a href="/payment.html" class="dashboard-card card-bayar">
                <i class="fa-solid fa-wallet"></i> 
                <h3>Pembayaran / SPP</h3>
            </a>
        </div>
    </div>

    <div id="app-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-icon" class="modal-icon"><i class="fa-solid fa-circle-question"></i></div>
            <h3 id="modal-title" class="modal-title">Konfirmasi</h3>
            <p id="modal-text" class="modal-text">Apakah Anda yakin?</p>
            <div class="modal-buttons">
                <button id="btn-modal-cancel" class="btn-modal btn-cancel">Batal</button>
                <button id="btn-modal-confirm" class="btn-modal btn-confirm">Ya, Lanjutkan</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth, checkAuth } from "/js/firebase-config.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FUNGSI CUSTOM MODAL ---
        window.showModal = (title, message, isConfirm = false, type = 'normal') => {
            return new Promise((resolve) => {
                const modal = document.getElementById('app-modal');
                const titleEl = document.getElementById('modal-title');
                const textEl = document.getElementById('modal-text');
                const iconEl = document.getElementById('modal-icon');
                const btnConfirm = document.getElementById('btn-modal-confirm');
                const btnCancel = document.getElementById('btn-modal-cancel');

                titleEl.innerText = title;
                textEl.innerText = message;
                
                if (type === 'danger') {
                    iconEl.innerHTML = '<i class="fa-solid fa-ban" style="color:#dc3545"></i>';
                    btnConfirm.className = 'btn-modal btn-danger-modal';
                    btnConfirm.innerText = "Mengerti";
                } else if (type === 'logout') {
                    iconEl.innerHTML = '<i class="fa-solid fa-right-from-bracket" style="color:#dc3545"></i>';
                    btnConfirm.className = 'btn-modal btn-danger-modal';
                    btnConfirm.innerText = "Ya, Keluar";
                } else if (type === 'warning') {
                    iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b"></i>';
                    btnConfirm.className = 'btn-modal btn-confirm';
                    btnConfirm.innerText = "Mengerti";
                } else {
                    iconEl.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
                    btnConfirm.className = 'btn-modal btn-confirm';
                    btnConfirm.innerText = "Oke";
                }

                btnCancel.style.display = isConfirm ? 'block' : 'none';
                modal.classList.add('active');

                const cleanup = () => {
                    modal.classList.remove('active');
                    btnConfirm.replaceWith(btnConfirm.cloneNode(true));
                    btnCancel.replaceWith(btnCancel.cloneNode(true));
                };

                document.getElementById('btn-modal-confirm').onclick = () => { cleanup(); resolve(true); };
                document.getElementById('btn-modal-cancel').onclick = () => { cleanup(); resolve(false); };
            });
        };

        // --- MAIN LOGIC & STATUS CHECKER ---
        (async () => {
            const userData = await checkAuth('siswa');
            
            if(userData) {
                // 1. Setup Sapaan
                const jam = new Date().getHours();
                let sapaan = "Selamat Pagi"; let icon = "⛅";
                if (jam >= 10 && jam < 15) { sapaan = "Selamat Siang"; icon = "☀️"; }
                else if (jam >= 15 && jam < 18) { sapaan = "Selamat Sore"; icon = "🌇"; }
                else if (jam >= 18) { sapaan = "Selamat Malam"; icon = "🌙"; }

                const nickName = userData.name.split(' ')[0];
                document.getElementById('user-greeting').innerHTML = `${sapaan}, ${nickName} 😊 ${icon}`;

                // 2. Kumpulkan Badge Aktif (OSIS & Status)
                const badgeEl = document.getElementById('dynamic-badge');
                const activeBadges = [];

                if (userData.is_osis === true) {
                    document.getElementById('card-osis').style.display = 'flex';
                    activeBadges.push({ class: 'badge-osis', html: '<i class="fa-solid fa-shield-halved"></i> Pengurus OSIS' });
                }

                let currentStatus = userData.status || 'aktif';

                // Cek inaktivitas (Auto Nonaktif jika > 75 hari tidak login)
                if (currentStatus !== 'nonaktif') {
                    let lastActiveDate = new Date(); 
                    if (userData.last_active && userData.last_active.toDate) {
                        lastActiveDate = userData.last_active.toDate();
                    } else if (userData.createdAt) {
                        lastActiveDate = new Date(userData.createdAt);
                    }

                    const diffTime = Math.abs(new Date() - lastActiveDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                    if (diffDays > 75) {
                        currentStatus = 'nonaktif';
                        updateDoc(doc(db, 'users', userData.uid), { status: 'nonaktif' });
                    }
                }

                const allCards = document.querySelectorAll('.dashboard-card');

                if (currentStatus === 'aktif') {
                    activeBadges.push({ class: 'badge-aktif', html: '<i class="fa-solid fa-user-check"></i> Status: Aktif' });
                    updateDoc(doc(db, 'users', userData.uid), { last_active: serverTimestamp() });

                } else if (currentStatus === 'cuti') {
                    activeBadges.push({ class: 'badge-cuti', html: '<i class="fa-solid fa-bed"></i> Status: Cuti / Izin' });
                    
                    allCards.forEach(card => {
                        if (!card.classList.contains('always-on-cuti')) {
                            card.classList.add('disabled-card');
                            card.onclick = (e) => {
                                e.preventDefault();
                                window.showModal('Akses Dibatasi', 'Fitur ini tidak dapat digunakan selama Anda dalam masa Cuti/Izin. Fokuslah pada istirahat Anda.', false, 'warning');
                            };
                        }
                    });

                } else if (currentStatus === 'nonaktif') {
                    activeBadges.push({ class: 'badge-nonaktif', html: '<i class="fa-solid fa-user-lock"></i> Status: Dinonaktifkan' });
                    
                    allCards.forEach(card => {
                        card.classList.add('disabled-card');
                        card.onclick = (e) => {
                            e.preventDefault();
                            window.showModal('Akun Dibekukan', 'Akun Anda dinonaktifkan karena tidak ada aktivitas lebih dari 2 Bulan 15 Hari. Silakan ajukan banding ke Admin.', false, 'danger');
                        };
                    });

                    setTimeout(() => {
                        window.showModal(
                            'Akun Dinonaktifkan ⚠️', 
                            'Sistem mendeteksi tidak ada aktivitas pembelajaran selama lebih dari 75 hari. Seluruh akses fitur telah dikunci. Silakan hubungi Admin untuk mengajukan pengaktifan kembali.', 
                            false, 
                            'danger'
                        );
                    }, 500);
                }

                // 3. Jalankan Animasi Lencana Ticker
                if (activeBadges.length > 0) {
                    let badgeIdx = 0;
                    badgeEl.className = `dynamic-badge ${activeBadges[0].class}`;
                    badgeEl.innerHTML = activeBadges[0].html;
                    badgeEl.style.opacity = '1';

                    if (activeBadges.length > 1) {
                        setInterval(() => {
                            badgeEl.style.opacity = '0';
                            setTimeout(() => {
                                badgeIdx = (badgeIdx + 1) % activeBadges.length;
                                badgeEl.className = `dynamic-badge ${activeBadges[badgeIdx].class}`;
                                badgeEl.innerHTML = activeBadges[badgeIdx].html;
                                badgeEl.style.opacity = '1';
                            }, 300);
                        }, 4000); // Ganti tiap 4 detik
                    }
                } else {
                    badgeEl.style.display = 'none';
                }
            }
        })();

        // --- LOGOUT LOGIC ---
        document.getElementById('logout-btn').onclick = async () => {
            const yakin = await window.showModal(
                'Konfirmasi Keluar', 
                'Apakah Anda yakin ingin mengakhiri sesi ini?', 
                true, 
                'logout'
            );

            if (yakin) {
                await signOut(auth);
                window.location.href = '/';
            }
        };
    </script>
</body>
</html>
