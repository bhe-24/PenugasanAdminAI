<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manajemen Buku & Penjualan - Admin CA</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #003366; --accent: #d4af37; --bg: #f4f6f9; --text-dark: #1e293b; --text-gray: #64748b; --success: #10b981; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent;}
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--text-dark); padding-bottom: 50px; padding-top: 100px;}
        .container { max-width: 1200px; width: 95%; margin: 0 auto; padding: 20px; }

        /* --- HEADER BRANDED NAVY --- */
        .brand-header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 15px 5%; box-shadow: 0 4px 20px rgba(0, 31, 63, 0.4);
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
            box-sizing: border-box; overflow: hidden; border-bottom: 4px solid var(--accent);
        }
        .brand-header::after { content: ''; position: absolute; top: -50%; right: 0; width: 250px; height: 250px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; pointer-events: none; }
        .header-content-wrapper { display: flex; align-items: center; gap: 15px; z-index: 2; flex: 1;}
        .header-logo-circle { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0; padding: 10px; animation: floatLogo 3s ease-in-out infinite; overflow: hidden; }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }
        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; flex: 1;}
        .header-brand-name { font-family: 'Aleo', serif; font-size: 1.6rem; font-weight: 700; margin: 0; line-height: 1.1; color: white; }
        .header-greeting { font-size: 0.85rem; opacity: 0.9; margin-top: 2px; font-weight: 400; margin-bottom: 0; color: #bae6fd; }
        .btn-back { background: rgba(255,255,255,0.15); color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px); transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2; cursor: pointer; }
        .btn-back:hover { background: white; color: var(--primary); }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* MULTI-PAGE TABS */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: white; padding: 10px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); overflow-x: auto; border: 1px solid #e2e8f0;}
        .tab-link { padding: 12px 20px; border-radius: 10px; text-decoration: none; color: #64748b; font-weight: 600; font-size: 0.95rem; transition: 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap;}
        .tab-link:hover { background: #f1f5f9; color: var(--primary);}
        .tab-link.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0, 51, 102, 0.2); }

        .btn-add { background: var(--accent); color: var(--primary); border: none; padding: 12px 25px; border-radius: 50px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: 'Poppins'; margin-bottom: 25px; font-size: 0.95rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);}
        .btn-add:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        /* GRID BUKU */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .book-card { background: white; border-radius: 16px; padding: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; position: relative; transition: 0.3s;}
        .book-card:hover { border-color: #cbd5e1; box-shadow: 0 8px 25px rgba(0,0,0,0.08); transform: translateY(-3px);}
        
        .b-title { font-family: 'Aleo', serif; font-size: 1.3rem; color: var(--primary); margin: 0 0 12px 0; line-height: 1.3;}
        .b-meta { font-size: 0.85rem; color: #475569; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;}
        .b-meta span i { color: var(--accent); width: 20px; text-align: center;}
        
        .author-list { background: #fffbeb; padding: 15px; border-radius: 12px; font-size: 0.85rem; color: #92400e; margin-bottom: 20px; max-height: 120px; overflow-y: auto; border: 1px solid #fde68a;}
        .author-list strong { display: block; margin-bottom: 8px; color: #b45309; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px;}
        .author-list ul { margin: 0; padding-left: 20px; }

        .btn-sell { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; font-family: 'Poppins'; margin-top: auto;}
        .btn-sell:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);}

        /* MODAL FORM BUKU */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,31,63,0.6); backdrop-filter:blur(5px); z-index:2000; display:none; justify-content:center; align-items:center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background:white; width:95%; max-width:600px; max-height:90vh; overflow-y:auto; padding:35px; border-radius:20px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 20px 50px rgba(0,0,0,0.3);}
        .modal-overlay.active .modal-box { transform: scale(1); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; color: var(--text-dark);}
        .form-input { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; background: #f8fafc; transition: 0.3s;}
        .form-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
        
        .author-input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-add-author { background: #e0f2fe; color: #0284c7; border: 2px dashed #7dd3fc; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.2s; font-family: 'Poppins', sans-serif;}
        .btn-add-author:hover { background: #bae6fd; }

        @media (max-width: 600px) { 
            body { padding-top: 85px; }
            .brand-header { padding: 12px 20px; flex-direction: row; align-items: center; gap: 10px;}
            .header-logo-circle { width: 45px; height: 45px; padding: 6px;}
            .header-brand-name { font-size: 1.3rem; }
            .header-greeting { font-size: 0.8rem; margin-top: 0; }
            .btn-back { width: 40px; height: 40px; padding: 0; justify-content: center; margin: 0; margin-left: auto; }
            .btn-back span { display: none; }
            .btn-back i { margin: 0; font-size: 1.1rem; }
            
            .nav-tabs { padding: 8px; border-radius: 12px; }
            .tab-link { padding: 10px 15px; font-size: 0.85rem; }
            .book-grid { grid-template-columns: 1fr; }
            .modal-box { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <!-- HEADER FIXED -->
    <header class="brand-header">
        <div class="header-content-wrapper">
            <div class="header-logo-circle">
                <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
            </div>
            <div class="header-info">
                <h1 class="header-brand-name">Manajemen Royalti</h1>
                <div class="header-greeting">Kelola penjualan buku dan saldo penulis.</div>
            </div>
        </div>
        <a href="/admin/index.html" class="btn-back" title="Kembali ke Dasbor">
            <i class="fa-solid fa-arrow-left"></i> <span>Lobi Admin</span>
        </a>
    </header>

    <div class="container">
        <!-- MULTI-PAGE NAVIGATION -->
        <div class="nav-tabs">
            <a href="royalti-buku.html" class="tab-link active"><i class="fa-solid fa-book"></i> Penjualan Buku</a>
            <a href="royalti-penulis.html" class="tab-link"><i class="fa-solid fa-wallet"></i> Saldo & Pembayaran</a>
        </div>

        <button class="btn-add" onclick="openModal()"><i class="fa-solid fa-plus-circle"></i> Daftarkan Buku Baru</button>

        <div class="book-grid" id="book-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #94a3b8;">
                <i class="fa-solid fa-circle-notch fa-spin fa-3x"></i><br><br>Memuat Katalog Buku...
            </div>
        </div>
    </div>

    <!-- MODAL TAMBAH BUKU -->
    <div class="modal-overlay" id="book-modal">
        <div class="modal-box">
            <h2 style="color:var(--primary); font-family:'Aleo', serif; margin: 0 0 20px 0;"><i class="fa-solid fa-book-medical"></i> Buku Antologi Baru</h2>
            <form id="book-form">
                <div class="form-group">
                    <label>Judul Buku Lengkap</label>
                    <input type="text" id="b-judul" class="form-input" required placeholder="Contoh: Antologi Puisi Senja di Batas Kota">
                </div>
                <div class="form-group">
                    <label>Royalti Total per 1 Buku (Rp)</label>
                    <small style="color:#64748b; display:block; margin-bottom:8px; line-height:1.4;">Keuntungan bersih penjualan 1 buku ini yang akan otomatis dibagi rata ke seluruh penulis yang terdaftar di bawah.</small>
                    <input type="number" id="b-royalty" class="form-input" required placeholder="Contoh: 15000">
                </div>
                
                <div class="form-group">
                    <label>Daftar Nama Penulis (Siswa)</label>
                    <div id="author-container">
                        <div class="author-input-group">
                            <input type="text" class="form-input auth-name" placeholder="Nama Lengkap Siswa" required>
                        </div>
                    </div>
                    <button type="button" class="btn-add-author" onclick="addAuthorField()"><i class="fa-solid fa-user-plus"></i> Tambah Kolom Penulis Lain</button>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 35px; border-top: 2px dashed #e2e8f0; padding-top: 20px;">
                    <button type="button" style="background:#f1f5f9; color:#64748b; border:none; padding:12px 20px; border-radius:10px; font-weight:600; cursor:pointer; font-family:'Poppins';" onclick="closeModal()">Batal</button>
                    <button type="submit" style="background:var(--primary); color:white; border:none; padding:12px 25px; border-radius:10px; font-weight:600; cursor:pointer; font-family:'Poppins'; box-shadow: 0 4px 10px rgba(0,51,102,0.2);"><i class="fa-solid fa-floppy-disk"></i> Simpan Buku</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { db, checkAuth } from "../js/firebase-config.js";
        import { collection, getDocs, addDoc, doc, updateDoc, increment, runTransaction, serverTimestamp, orderBy, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        (async () => {
            const admin = await checkAuth('admin');
            if(!admin) window.location.href = '../index.html';
            loadBooks();
        })();

        // --- LOAD DATA BUKU ---
        async function loadBooks() {
            const container = document.getElementById('book-grid');
            try {
                const q = query(collection(db, 'royalty_books'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                container.innerHTML = '';

                if(snap.empty) {
                    container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#94a3b8; border:2px dashed #cbd5e1; border-radius:16px; background:white;"><i class="fa-solid fa-book-open fa-3x" style="margin-bottom:15px; color:#e2e8f0;"></i><h3 style="margin:0; color:#475569;">Buku Masih Kosong</h3><p style="margin-top:5px; font-size:0.9rem;">Daftarkan buku antologi baru untuk mulai menghitung royalti.</p></div>`;
                    return;
                }

                snap.forEach(d => {
                    const data = d.data();
                    const royaltyPerAuthor = data.royaltyTotal / data.authors.length;
                    const authorsList = data.authors.map(a => `<li>${a}</li>`).join('');

                    container.innerHTML += `
                        <div class="book-card">
                            <h3 class="b-title">${data.judul}</h3>
                            <div class="b-meta">
                                <span><i class="fa-solid fa-tags"></i> Royalti Total: <b>Rp ${data.royaltyTotal.toLocaleString('id-ID')} /buku</b></span>
                                <span><i class="fa-solid fa-users"></i> Dibagi ke <b>${data.authors.length} Penulis</b> (Rp ${Math.round(royaltyPerAuthor).toLocaleString('id-ID')}/orang)</span>
                                <span style="margin-top:5px; color:var(--primary); font-size:1.1rem; font-weight:700;"><i class="fa-solid fa-chart-line"></i> Total Terjual: ${data.terjual || 0} Buku</span>
                            </div>
                            
                            <div class="author-list">
                                <strong><i class="fa-solid fa-feather-pointed"></i> Daftar Penulis Terlibat:</strong>
                                <ul>${authorsList}</ul>
                            </div>

                            <button class="btn-sell" onclick="recordSale('${d.id}', ${data.royaltyTotal}, '${JSON.stringify(data.authors).replace(/"/g, '&quot;')}', '${data.judul.replace(/'/g, "\\'")}')">
                                <i class="fa-solid fa-cart-plus"></i> Catat Terjual +1 Buku
                            </button>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); }
        }

        // --- CATAT PENJUALAN +1 (TRANSACTION AGAR AMAN) ---
        window.recordSale = async (bookId, totalRoyalty, authorsStr, bookTitle) => {
            const authors = JSON.parse(authorsStr.replace(/&quot;/g, '"'));
            const royaltyPerPerson = totalRoyalty / authors.length;

            Swal.fire({
                title: 'Catat Penjualan Buku?',
                html: `<p style="font-size:0.95rem; color:#475569; margin-bottom:15px;">Anda akan mencatat 1 penjualan untuk buku:<br><b style="color:#003366;">${bookTitle}</b></p><p style="font-size:0.85rem; color:#10b981; font-weight:600; background:#f0fdf4; padding:10px; border-radius:8px; border:1px solid #bbf7d0;">Royalti senilai Rp ${Math.round(royaltyPerPerson).toLocaleString('id-ID')} akan otomatis didistribusikan ke saldo masing-masing penulis.</p>`,
                icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Catat & Bagikan!',
                confirmButtonColor: '#10b981', cancelButtonColor: '#94a3b8',
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Memproses Pembagian...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

                    try {
                        // 1. Tambah jumlah terjual di koleksi Buku
                        await updateDoc(doc(db, 'royalty_books', bookId), { terjual: increment(1) });

                        // 2. Loop setiap penulis, tambahkan saldonya di koleksi Authors
                        for (const authorName of authors) {
                            // UID Unik nama kecil tanpa spasi
                            const authorId = authorName.toLowerCase().replace(/[^a-z0-9]/g, ''); 
                            const authorRef = doc(db, 'authors_royalty', authorId);
                            
                            // Gunakan RunTransaction
                            await runTransaction(db, async (transaction) => {
                                const authorDoc = await transaction.get(authorRef);
                                if (!authorDoc.exists()) {
                                    transaction.set(authorRef, {
                                        name: authorName,
                                        balance: royaltyPerPerson,
                                        whatsapp: '', bank: '', norek: ''
                                    });
                                } else {
                                    const newBalance = (authorDoc.data().balance || 0) + royaltyPerPerson;
                                    transaction.update(authorRef, { balance: newBalance });
                                }
                            });
                        }

                        Swal.fire({icon:'success', title:'Sukses!', text:'Sistem berhasil mencatat penjualan dan mendistribusikan royalti.', timer:2500, showConfirmButton:false});
                        loadBooks();

                    } catch(e) {
                        Swal.fire('Error', e.message, 'error');
                    }
                }
            });
        };

        // --- FORM LOGIC ---
        window.openModal = () => document.getElementById('book-modal').classList.add('active');
        window.closeModal = () => document.getElementById('book-modal').classList.remove('active');
        
        window.addAuthorField = () => {
            const div = document.createElement('div');
            div.className = 'author-input-group';
            div.innerHTML = `<input type="text" class="form-input auth-name" placeholder="Nama Lengkap Siswa" required>
                             <button type="button" style="background:#fee2e2; color:#ef4444; border:1px solid #fecaca; border-radius:10px; padding:0 18px; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='#ef4444'; this.style.color='white';" onmouseout="this.style.background='#fee2e2'; this.style.color='#ef4444';" onclick="this.parentElement.remove()"><i class="fa-solid fa-trash"></i></button>`;
            document.getElementById('author-container').appendChild(div);
        };

        document.getElementById('book-form').onsubmit = async (e) => {
            e.preventDefault();
            const judul = document.getElementById('b-judul').value;
            const royalty = parseInt(document.getElementById('b-royalty').value);
            
            const authors = [];
            document.querySelectorAll('.auth-name').forEach(input => {
                if(input.value.trim() !== '') authors.push(input.value.trim());
            });

            if(authors.length === 0) return alert("Minimal harus ada 1 penulis!");

            Swal.fire({ title: 'Menyimpan Buku...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            
            try {
                await addDoc(collection(db, 'royalty_books'), {
                    judul: judul, royaltyTotal: royalty, authors: authors,
                    terjual: 0, createdAt: serverTimestamp()
                });
                closeModal();
                document.getElementById('book-form').reset();
                Swal.fire({icon:'success', title:'Tersimpan', text:'Buku antologi baru berhasil ditambahkan.', timer:2000, showConfirmButton:false});
                loadBooks();
            } catch(err) { Swal.fire('Error', err.message, 'error'); }
        };
    </script>
</body>
</html>
