<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Pusat - Admin Pro</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* --- STYLE GLOBAL (Tetap Dipertahankan) --- */
        :root { --primary: #003366; --accent: #4361ee; --bg: #f4f7fe; }
        body { background-color: var(--bg); font-family: 'Outfit', sans-serif; color: #333; margin: 0; padding-bottom: 50px; }
        .container { max-width: 1400px; width: 95%; margin: 0 auto; padding: 25px; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 25px 35px; border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 30px;
        }
        .ph-left h2 { margin: 0; color: var(--primary); font-size: 1.6rem; }
        
        .btn { padding: 12px 20px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; transition: 0.2s; font-size: 0.9rem; }
        .btn-dash { background: #f1f5f9; color: #334155; }

        .cycle-panel {
            background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 25px;
            border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;
        }
        .cycle-status { font-weight: bold; padding: 5px 12px; border-radius: 50px; font-size: 0.85rem; }
        .st-open { background: #dcfce7; color: #166534; }
        .st-closed { background: #fee2e2; color: #991b1b; }

        .tab-menu { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-item { padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #64748b; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .tab-item.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3); }
        .badge-count { background: #ef4444; color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; }

        .content-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); min-height: 400px; }
        .hidden { display: none !important; }

        .req-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .req-card { border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; background: #fff; transition: 0.2s; position: relative; overflow: hidden; }
        .req-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background: #f59e0b; }
        
        .req-amount { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 5px 0; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-act { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; color: white; font-size: 0.85rem; }
        .bg-green { background: #10b981; }
        .bg-yellow { background: #f59e0b; }
        .bg-red { background: #ef4444; }

        /* MODAL CUSTOM */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <div class="ph-left">
                <h2><i class="fa-solid fa-robot"></i> Keuangan Pusat (Auto-Sync)</h2>
                <p>Verifikasi Otomatis Aktif & Terpantau.</p>
            </div>
            <a href="index.html" class="btn btn-dash"><i class="fa-solid fa-house"></i> Dashboard</a>
        </div>

        <div class="cycle-panel">
            <div>
                <h4><i class="fa-solid fa-rotate"></i> Siklus Pembayaran</h4>
                <div id="cycle-badge" class="cycle-status st-closed">Memuat...</div>
            </div>
            <label class="toggle-switch" style="position:relative; display:inline-block; width:60px; height:34px;">
                <input type="checkbox" id="cycle-toggle" onchange="toggleCycle(this)" style="opacity:0; width:0; height:0;">
                <span class="slider" style="position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:.4s; border-radius:34px;"></span>
            </label>
        </div>

        <div class="tab-menu">
            <div class="tab-item active" id="tab-btn-verif" onclick="switchTab('verif')">
                <i class="fa-solid fa-bolt"></i> Antrean Real-time
                <span id="badge-waiting" class="badge-count hidden">0</span>
            </div>
            <div class="tab-item" id="tab-btn-arsip" onclick="switchTab('arsip')">
                <i class="fa-solid fa-history"></i> Riwayat Otomatis
            </div>
        </div>

        <div id="tab-verif" class="content-card">
            <div id="list-request" class="req-grid"></div>
            <div id="empty-verif" class="hidden" style="text-align:center; padding:50px; color:#94a3b8;">
                <i class="fa-solid fa-circle-check" style="font-size:4rem; opacity:0.3; margin-bottom:10px; color:#10b981;"></i>
                <h3>Sistem Bersih!</h3>
                <p>Semua pembayaran sedang dihandle otomatis oleh sistem.</p>
            </div>
        </div>

        <div id="tab-arsip" class="content-card hidden">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h3 style="margin:0;">Laporan Pemasukan</h3>
                <div style="display:flex; gap:10px;">
                    <button onclick="downloadReport('ujian')" class="btn" style="background:#e0f2fe; color:#0284c7;">PDF Ujian</button>
                    <button onclick="downloadReport('spp')" class="btn" style="background:#f3e8ff; color:#7c3aed;">PDF SPP</button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse;" id="table-arsip">
                    <thead><tr style="text-align:left; border-bottom:2px solid #eee;"><th style="padding:10px;">Waktu</th><th>Siswa</th><th>Nominal</th><th>Admin</th></tr></thead>
                    <tbody id="archive-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-icon" style="font-size:3rem; margin-bottom:15px;"></div>
            <h3 id="modal-title"></h3>
            <p id="modal-msg"></p>
            <div id="modal-actions" class="modal-btns"></div>
        </div>
    </div>

    <script type="module">
    import { db, checkAuth } from "../js/firebase-config.js";
    import { collection, query, where, onSnapshot, getDocs, updateDoc, doc, addDoc, serverTimestamp, orderBy, setDoc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let currentAdmin = null;

    (async () => {
        currentAdmin = await checkAuth('pengajar');
        if(!currentAdmin) window.location.href = '../index.html';

        // REAL-TIME LISTENER: Antrean Verifikasi
        const qVerif = query(collection(db, 'users'), where('paymentStatus', '==', 'waiting'));
        onSnapshot(qVerif, (snap) => {
            renderVerifList(snap);
        });

        // REAL-TIME LISTENER: Arsip Pemasukan
        const qArsip = query(collection(db, 'finance_logs'), orderBy('timestamp', 'desc'));
        onSnapshot(qArsip, (snap) => {
            renderArchive(snap);
        });

        loadCycleStatus();
    })();

    // --- FUNGSI SIKLUS (YANG TADI MACET) ---
    window.toggleCycle = async (el) => {
        const isOpen = el.checked;
        
        if (!isOpen) {
            // Jika mau ditutup (Reset)
            showModal('confirm', 'Tutup & Reset?', 'SEMUA status siswa akan di-reset jadi BELUM BAYAR. Lanjutkan?', 
                async () => {
                    showModal('loading', 'Resetting...', 'Mereset data...');
                    try {
                        // 1. Update status di settings
                        await setDoc(doc(db, 'settings', 'finance'), { isOpen: false }, { merge: true });
                        
                        // 2. Ambil semua siswa untuk di-reset
                        const qSiswa = query(collection(db, 'users'), where('role', '==', 'siswa'));
                        const snap = await getDocs(qSiswa);
                        const batch = writeBatch(db);
                        
                        snap.forEach(d => {
                            batch.update(doc(db, 'users', d.id), { 
                                statusPembayaran: 'Belum', 
                                paymentStatus: null,
                                pendingAmount: 0 
                            });
                        });
                        
                        await batch.commit();
                        updateCycleUI(false);
                        closeModal();
                        showModal('success', 'Selesai', 'Siklus ditutup & semua data siswa telah di-reset.');
                    } catch (e) {
                        showModal('error', 'Gagal', e.message);
                    }
                },
                () => { el.checked = true; } // Jika batal, kembalikan ke ON
            );
        } else {
            // Jika mau dibuka
            await setDoc(doc(db, 'settings', 'finance'), { isOpen: true }, { merge: true });
            updateCycleUI(true);
        }
    }

    async function loadCycleStatus() {
        const snap = await getDoc(doc(db, 'settings', 'finance'));
        if(snap.exists()){
            const open = snap.data().isOpen;
            document.getElementById('cycle-toggle').checked = open;
            updateCycleUI(open);
        }
    }

    function updateCycleUI(isOpen) {
        const badge = document.getElementById('cycle-badge');
        badge.className = isOpen ? 'cycle-status st-open' : 'cycle-status st-closed';
        badge.innerText = isOpen ? 'Pembayaran DIBUKA' : 'Pembayaran DITUTUP';
    }

    // --- FUNGSI RENDER (Tetap Sama) ---
    function renderVerifList(snap) {
        const container = document.getElementById('list-request');
        const badge = document.getElementById('badge-waiting');
        container.innerHTML = '';
        badge.innerText = snap.size;
        badge.classList.toggle('hidden', snap.size === 0);
        document.getElementById('empty-verif').classList.toggle('hidden', snap.size > 0);
        snap.forEach(d => {
            const u = d.data();
            const safeName = u.name ? u.name.replace(/'/g, "\\'") : "Siswa";
            container.innerHTML += `
                <div class="req-card">
                    <div style="font-weight:700;">${u.name}</div>
                    <div style="font-size:0.8rem; color:#666;">ID: ${u.uid.substring(0,5)} | Sem: ${u.semester}</div>
                    <div class="req-amount">Rp ${u.pendingAmount ? u.pendingAmount.toLocaleString() : '-'}</div>
                    <div class="btn-group">
                        <button onclick="actReject('${d.id}')" class="btn-act bg-red">Tolak</button>
                        <button onclick="manualApprove('${d.id}', '${safeName}', ${u.pendingAmount}, ${u.semester})" class="btn-act bg-green">Terima Manual</button>
                    </div>
                </div>
            `;
        });
    }

    function renderArchive(snap) {
        const tbody = document.getElementById('archive-body');
        tbody.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            const time = data.timestamp ? new Date(data.timestamp.seconds*1000).toLocaleString('id-ID') : '-';
            tbody.innerHTML += `
                <tr style="border-bottom:1px solid #eee;">
                    <td style="padding:12px; font-size:0.85rem;">${time}</td>
                    <td><b>${data.studentName}</b><br><small>${data.type}</small></td>
                    <td>Rp ${data.amount.toLocaleString()}</td>
                    <td style="color:#4361ee; font-weight:600;">${data.adminName}</td>
                </tr>
            `;
        });
    }

    window.manualApprove = (uid, name, amount, sem) => {
        showModal('confirm', 'Konfirmasi Manual', `Terima pembayaran Rp ${amount.toLocaleString()} untuk ${name}?`, async () => {
            await updateDoc(doc(db, 'users', uid), { statusPembayaran: 'Lunas', paymentStatus: 'verified', pendingAmount: 0 });
            await addDoc(collection(db, 'finance_logs'), {
                studentName: name, studentUid: uid, amount: amount, semester: sem,
                type: "Manual Admin", adminName: currentAdmin.name, timestamp: serverTimestamp()
            });
            closeModal();
        });
    }

    window.actReject = (uid) => {
        showModal('confirm', 'Tolak Pembayaran', 'Siswa harus mengulang proses bayar. Lanjutkan?', async () => {
            await updateDoc(doc(db, 'users', uid), { paymentStatus: 'rejected', pendingAmount: 0 });
            closeModal();
        });
    }

    window.switchTab = (tab) => {
        document.getElementById('tab-verif').classList.toggle('hidden', tab !== 'verif');
        document.getElementById('tab-arsip').classList.toggle('hidden', tab !== 'arsip');
        document.getElementById('tab-btn-verif').classList.toggle('active', tab === 'verif');
        document.getElementById('tab-btn-arsip').classList.toggle('active', tab === 'arsip');
    }

    function showModal(type, title, msg, action, cancelAction) {
        const m = document.getElementById('custom-modal');
        const icon = document.getElementById('modal-icon');
        if(type === 'success') icon.innerHTML = '✅';
        else if(type === 'error') icon.innerHTML = '❌';
        else if(type === 'loading') icon.innerHTML = '⏳';
        else icon.innerHTML = '🤔';

        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        const btnArea = document.getElementById('modal-actions');
        
        if (type === 'loading') {
            btnArea.innerHTML = '';
        } else {
            btnArea.innerHTML = `<button class="btn" id="btn-cancel">Batal</button>
                                 <button class="btn" style="background:#003366; color:white;" id="btn-confirm">Proses</button>`;
            document.getElementById('btn-confirm').onclick = action;
            document.getElementById('btn-cancel').onclick = () => {
                closeModal();
                if(cancelAction) cancelAction();
            };
        }
        m.classList.add('active');
    }

    window.closeModal = () => document.getElementById('custom-modal').classList.remove('active');
    window.loadRequests = () => location.reload(); 
</script>
</body>
</html>
