<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Buku Teks - Cendekia Aksara</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-pdfmake/browser.js"></script>

    <style>
        :root { --primary: #003366; --accent: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #333; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .page-header { background: #fff; padding: 25px 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { margin: 0; color: var(--primary); font-family: 'Playfair Display', serif; }
        
        .panel-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; animation: fadeIn 0.5s ease;}
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        .form-control { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Poppins'; box-sizing: border-box;}
        textarea.form-control { min-height: 120px; resize: vertical; }
        .form-control:focus { border-color: var(--primary); outline: none; }

        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); }
        .btn-accent { background: var(--accent); text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .btn-success { background: #166534; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .progress-box { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px;}
        
        /* Area HTML Tersembunyi untuk proses PDF */
        #book-content-preview { padding: 30px; background: #fafafa; border: 1px dashed #ccc; margin-top: 20px; max-height: 500px; overflow-y: auto; font-family: 'Times New Roman', serif;}
        
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h2><i class="fa-solid fa-book-journal-whills"></i> Generator Buku Teks AI</h2>
            <a href="index.html" class="btn btn-primary" style="text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Dasbor Admin</a>
        </div>

        <div id="fase-1" class="panel-card">
            <h3 style="color: var(--primary); margin-top:0;"><i class="fa-solid fa-pen-nib"></i> Tahap 1: Ideasi Buku</h3>
            <div class="form-group">
                <label>Judul Buku</label>
                <input type="text" id="input-judul" class="form-control" placeholder="Contoh: Menguasai Sastra Modern">
            </div>
            <div class="form-group">
                <label>Target Siswa / Pembaca</label>
                <input type="text" id="input-target" class="form-control" placeholder="Contoh: Siswa SMA Kelas 10">
            </div>
            <div class="form-group">
                <label>Deskripsi Singkat & Tujuan Buku</label>
                <textarea id="input-deskripsi" class="form-control" placeholder="Buku ini akan membahas tentang..."></textarea>
            </div>
            <button class="btn btn-primary" id="btn-to-fase-2" onclick="generateKerangka()">
                <i class="fa-solid fa-list"></i> Buat Kerangka (Daftar Isi)
            </button>
        </div>

        <div id="fase-2" class="panel-card hidden">
            <h3 style="color: var(--primary); margin-top:0;"><i class="fa-solid fa-list-check"></i> Tahap 2: Review Kerangka Buku</h3>
            <p style="font-size: 0.9rem; color: #666;">AI telah menyusun bab-bab di bawah ini. Anda bisa mengedit teks HTML ini secara manual sebelum AI mulai menulis keseluruhan bukunya.</p>
            
            <div class="form-group">
                <textarea id="editor-kerangka" class="form-control" style="min-height: 250px; font-family: monospace;"></textarea>
            </div>
            
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#64748b;" onclick="document.getElementById('fase-2').classList.add('hidden'); document.getElementById('fase-1').classList.remove('hidden');">Batal</button>
                <button class="btn btn-success" id="btn-to-fase-3" onclick="mulaiTulisBuku()">
                    <i class="fa-solid fa-pen-to-square"></i> Mulai Penulisan Otomatis
                </button>
            </div>
        </div>

        <div id="fase-3" class="panel-card hidden">
            <h3 style="color: var(--primary); margin-top:0;"><i class="fa-solid fa-gears"></i> Tahap 3: Mesin Penulis AI</h3>
            
            <div id="progress-area" class="progress-box">
                <i class="fa-solid fa-robot fa-bounce" style="font-size: 2.5rem; color: #166534; margin-bottom: 10px;"></i>
                <h4 id="status-text" style="margin:0;">Menunggu perintah...</h4>
                <p id="status-detail" style="margin:5px 0 0 0; color:#666; font-size:0.9rem;">-</p>
            </div>

            <div id="result-actions" class="hidden" style="text-align: center; margin-top: 20px;">
                <button class="btn btn-accent" onclick="unduhBukuPDF()">
                    <i class="fa-solid fa-file-pdf"></i> Unduh Buku Teks (PDF)
                </button>
            </div>

            <div id="book-content-preview">
                </div>
        </div>
    </div>

    <script type="module">
        let daftarBabTersimpan = [];

        // FASE 1 -> FASE 2
        window.generateKerangka = async () => {
            const btn = document.getElementById('btn-to-fase-2');
            const judul = document.getElementById('input-judul').value;
            const target = document.getElementById('input-target').value;
            const deskripsi = document.getElementById('input-deskripsi').value;

            if(!judul) return alert("Judul buku harus diisi!");

            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyusun Daftar Isi...';

            try {
                const response = await fetch('/api/generate-toc', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ judul, target, deskripsi })
                });
                
                if (!response.ok) throw new Error("Gagal");
                const data = await response.json();

                document.getElementById('editor-kerangka').value = data.tocHtml;
                document.getElementById('fase-1').classList.add('hidden');
                document.getElementById('fase-2').classList.remove('hidden');
            } catch (e) {
                alert("Gagal menghubungi AI. Pastikan Vercel API siap.");
            } finally {
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-list"></i> Buat Kerangka (Daftar Isi)';
            }
        };

        // FASE 2 -> FASE 3 (LOOPING API)
        window.mulaiTulisBuku = async () => {
            const htmlTOC = document.getElementById('editor-kerangka').value;
            const judulBuku = document.getElementById('input-judul').value;
            
            // Ekstrak nama-nama bab dari <li> di dalam HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlTOC;
            const listItems = tempDiv.querySelectorAll('li');
            daftarBabTersimpan = Array.from(listItems).map(li => li.innerText);

            if(daftarBabTersimpan.length === 0) return alert("Kerangka tidak valid, pastikan ada elemen <li>");

            document.getElementById('fase-2').classList.add('hidden');
            document.getElementById('fase-3').classList.remove('hidden');

            const statusText = document.getElementById('status-text');
            const statusDetail = document.getElementById('status-detail');
            const previewArea = document.getElementById('book-content-preview');
            
            // Masukkan Daftar Isi ke Preview
            previewArea.innerHTML = `<h1 style="text-align:center;">${judulBuku}</h1><h2>Daftar Isi</h2>${htmlTOC}<hr>`;

            // SEQUENTIAL LOOP GENERATION
            for (let i = 0; i < daftarBabTersimpan.length; i++) {
                const babJudul = daftarBabTersimpan[i];
                statusText.innerText = `Sedang Menulis Bab ${i + 1} dari ${daftarBabTersimpan.length}...`;
                statusDetail.innerText = `Menyusun materi: "${babJudul}"`;

                try {
                    const response = await fetch('/api/generate-chapter', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ judulBuku, babJudul })
                    });
                    
                    if(!response.ok) throw new Error("Terputus");
                    const data = await response.json();
                    
                    // Tempel langsung ke dokumen web
                    previewArea.innerHTML += `<div class="bab-container" style="page-break-before: always; margin-top:30px;">${data.chapterHtml}</div>`;
                    
                    // Auto scroll ke bawah
                    previewArea.scrollTop = previewArea.scrollHeight;
                } catch (e) {
                    console.error(e);
                    previewArea.innerHTML += `<h2 style="color:red;">Gagal memuat: ${babJudul}</h2>`;
                }
            }

            statusText.innerText = "Buku Teks Selesai Disusun!";
            statusDetail.innerText = "Silakan periksa pratinjau di bawah dan unduh hasilnya.";
            document.querySelector('.fa-robot').classList.replace('fa-bounce', 'fa-check');
            document.getElementById('result-actions').classList.remove('hidden');
        };

        // FASE UNDUH (PDFMAKE NATIVE TEXT)
        window.unduhBukuPDF = async () => {
            const btn = document.querySelector('#result-actions .btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Merapikan Halaman...';
            
            try {
                // Konversi HTML ke format PDFMake
                const rawHtml = document.getElementById('book-content-preview').innerHTML;
                const convertedHtml = htmlToPdfmake(rawHtml, { tableAutoSize: true });
                const judulUtama = document.getElementById('input-judul').value;

                // Definisi Dokumen dengan Cover dan Header/Footer
                const docDefinition = {
                    pageSize: 'A4',
                    pageMargins: [50, 70, 50, 60], // Ruang untuk header/footer
                    header: function(currentPage, pageCount) {
                        if (currentPage > 1) { // Jangan ada header di cover (halaman 1)
                            return {
                                text: 'Buku Teks Cendekia Aksara',
                                margin: [50, 30, 50, 0],
                                fontSize: 9,
                                color: '#64748b',
                                borderBottom: 1
                            };
                        }
                    },
                    footer: function(currentPage, pageCount) {
                        if (currentPage > 1) {
                            return {
                                text: `Halaman ${currentPage} dari ${pageCount}`,
                                alignment: 'center',
                                margin: [0, 20, 0, 0],
                                fontSize: 9
                            };
                        }
                    },
                    content: [
                        // HALAMAN COVER
                        {
                            text: 'CENDEKIA AKSARA',
                            style: 'coverPenerbit',
                            alignment: 'center',
                            margin: [0, 150, 0, 20]
                        },
                        {
                            text: judulUtama.toUpperCase(),
                            style: 'coverTitle',
                            alignment: 'center',
                            margin: [0, 0, 0, 30]
                        },
                        {
                            text: 'Buku Pegangan Siswa\nDisusun secara otomatis oleh Sistem Cendekia',
                            style: 'coverSub',
                            alignment: 'center',
                            pageBreak: 'after' // Pindah halaman setelah cover
                        },
                        // ISI BUKU (Daftar isi dan Bab-bab)
                        convertedHtml
                    ],
                    styles: {
                        coverPenerbit: { fontSize: 16, color: '#003366', bold: true, letterSpacing: 2 },
                        coverTitle: { fontSize: 32, bold: true, color: '#d4af37' },
                        coverSub: { fontSize: 12, color: '#666', italics: true },
                        html: { fontSize: 11, lineHeight: 1.5, color: '#222' }
                    },
                    defaultStyle: { font: 'Roboto' }
                };

                // Proses Download
                pdfMake.createPdf(docDefinition).download(`Buku_${judulUtama}.pdf`);
            } catch (e) {
                console.error(e);
                alert("Gagal membangun PDF.");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-file-pdf"></i> Unduh Buku Teks (PDF)';
            }
        };
    </script>
</body>
</html>
