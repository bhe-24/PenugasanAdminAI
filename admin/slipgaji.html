<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manajemen Slip Gaji - Admin Cendekia Aksara</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#003366', primaryLight: '#005a9c', accent: '#d4af37', bgLight: '#f1f5f9', textDark: '#1e293b' },
                    fontFamily: { sans: ['Poppins', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <style>
        .tab-btn.active { background: #003366; color: white; }
        .tab-btn { transition: all 0.2s; cursor: pointer; }
        #preview-slip { display: none; }
        #preview-slip.show { display: block; }
        .step-circle.done { background: #10b981; color: white; }
        .step-circle.active { background: #003366; color: white; }
        .step-circle { background: #e5e7eb; color: #6b7280; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-bgLight text-textDark min-h-screen flex flex-col overflow-x-hidden">

    <!-- Header -->
    <header class="w-full bg-gradient-to-r from-primary to-[#001f3f] px-4 md:px-8 py-4 shadow-lg border-b-4 border-accent flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo" class="h-10 w-10 rounded-full bg-white p-0.5 border-2 border-accent">
            <div>
                <h1 class="font-serif text-white text-lg font-bold tracking-wide">Manajemen <span class="text-accent">Slip Gaji</span></h1>
                <p class="text-white/60 text-xs">Panel Administrasi Cendekia Aksara</p>
            </div>
        </div>
        <a href="index.html" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-full text-xs font-semibold transition"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
    </header>

    <!-- Tab Navigasi -->
    <div class="w-full max-w-6xl mx-auto px-4 pt-6">
        <div class="flex gap-2 bg-white rounded-xl p-1.5 shadow-sm border border-gray-100 overflow-x-auto">
            <button class="tab-btn active flex-1 min-w-max text-xs md:text-sm font-semibold py-2 px-4 rounded-lg" onclick="switchTab('dashboard')" id="tab-btn-dashboard">
                <i class="fa-solid fa-chart-pie mr-1"></i> Ringkasan
            </button>
            <button class="tab-btn flex-1 min-w-max text-xs md:text-sm font-semibold py-2 px-4 rounded-lg" onclick="switchTab('pengajar')" id="tab-btn-pengajar">
                <i class="fa-solid fa-users mr-1"></i> Daftar Pengajar
            </button>
            <button class="tab-btn flex-1 min-w-max text-xs md:text-sm font-semibold py-2 px-4 rounded-lg" onclick="switchTab('riwayat')" id="tab-btn-riwayat">
                <i class="fa-solid fa-clock-rotate-left mr-1"></i> Riwayat Slip
            </button>
        </div>
    </div>

    <main class="flex-1 w-full max-w-6xl mx-auto px-4 py-6">

        <!-- TAB: DASHBOARD -->
        <div id="tab-dashboard" class="tab-content space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 text-center">
                    <i class="fa-solid fa-users text-2xl text-primary mb-2"></i>
                    <p class="text-2xl font-bold font-serif text-primary" id="stat-pengajar">0</p>
                    <p class="text-xs text-gray-500 font-medium mt-1">Total Pengajar</p>
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 text-center">
                    <i class="fa-solid fa-money-bill-wave text-2xl text-emerald-500 mb-2"></i>
                    <p class="text-2xl font-bold font-serif text-emerald-600" id="stat-honor">Rp 0</p>
                    <p class="text-xs text-gray-500 font-medium mt-1">Total Honor</p>
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 text-center">
                    <i class="fa-solid fa-file-invoice-dollar text-2xl text-accent mb-2"></i>
                    <p class="text-2xl font-bold font-serif text-yellow-600" id="stat-slip">0</p>
                    <p class="text-xs text-gray-500 font-medium mt-1">Slip Diterbitkan</p>
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 text-center">
                    <i class="fa-solid fa-hourglass-half text-2xl text-orange-400 mb-2"></i>
                    <p class="text-2xl font-bold font-serif text-orange-500" id="stat-pending">0</p>
                    <p class="text-xs text-gray-500 font-medium mt-1">Pending Transfer</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="font-serif text-lg text-primary font-bold mb-4 border-b pb-2 flex items-center gap-2">
                    <i class="fa-solid fa-bell text-orange-400"></i> Pengajar Dengan Saldo Menunggu Cair
                </h3>
                <div id="belum-cair-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- TAB: DAFTAR PENGAJAR -->
        <div id="tab-pengajar" class="tab-content hidden space-y-4">
            <div class="flex items-center gap-3 mb-4">
                <input type="text" id="search-pengajar" placeholder="Cari nama pengajar..." class="flex-1 p-3 border border-gray-200 rounded-xl bg-white text-sm focus:ring-2 focus:ring-primaryLight outline-none">
                <button onclick="loadDaftarPengajar()" class="bg-primary text-white px-4 py-3 rounded-xl text-sm font-semibold hover:bg-primaryLight transition">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
            <div id="pengajar-list" class="space-y-3"></div>
        </div>

        <!-- TAB: RIWAYAT -->
        <div id="tab-riwayat" class="tab-content hidden">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="font-serif text-lg text-primary font-bold mb-4 border-b pb-2">Riwayat Slip Gaji</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-3 text-left">Pengajar</th>
                                <th class="p-3 text-left">Periode</th>
                                <th class="p-3 text-center">Sesi</th>
                                <th class="p-3 text-right">Nominal</th>
                                <th class="p-3 text-center">Status</th>
                                <th class="p-3 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="riwayat-list" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, getDocs, orderBy, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0",
            authDomain: "mading-cf676.firebaseapp.com",
            projectId: "mading-cf676",
            storageBucket: "mading-cf676.firebasestorage.app",
            messagingSenderId: "72175203671",
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const fmt = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        let allPengajar = [];

        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-btn-' + tabName).classList.add('active');
            
            if (tabName === 'pengajar') loadDaftarPengajar();
            if (tabName === 'riwayat') loadRiwayat();
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '../index.html';
                return;
            }

            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists() || userDoc.data().role !== 'admin') {
                window.location.href = '../index.html';
                return;
            }

            loadDashboard();
        });

        async function loadDashboard() {
            try {
                // Load semua pengajar
                const pengajarSnap = await getDocs(query(collection(db, 'users'), where('role', '==', 'pengajar')));
                allPengajar = pengajarSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('stat-pengajar').textContent = allPengajar.length;

                let totalHonor = 0;
                let totalSlip = 0;
                let totalPending = 0;
                const belumCairList = [];

                for (const pengajar of allPengajar) {
                    const salary = pengajar.salary || 0;
                    const disbursed = pengajar.salaryDisbursed || 0;
                    totalHonor += salary;

                    if (disbursed < salary) {
                        belumCairList.push({ ...pengajar, sisa: salary - disbursed });
                    }
                }

                // Load slip
                const slipSnap = await getDocs(collection(db, 'slipGaji'));
                totalSlip = slipSnap.size;
                slipSnap.forEach(doc => {
                    if (doc.data().status !== 'lunas') totalPending++;
                });

                document.getElementById('stat-honor').textContent = fmt(totalHonor);
                document.getElementById('stat-slip').textContent = totalSlip;
                document.getElementById('stat-pending').textContent = totalPending;

                // Render belum cair
                const belumCairEl = document.getElementById('belum-cair-list');
                if (belumCairList.length === 0) {
                    belumCairEl.innerHTML = '<p class="text-center text-gray-400 py-4">Semua pengajar telah menerima pembayaran ✅</p>';
                } else {
                    belumCairEl.innerHTML = belumCairList.map(p => `
                        <div class="p-4 bg-orange-50 border border-orange-200 rounded-xl flex justify-between items-center">
                            <div>
                                <p class="font-bold text-primary">${p.name || p.nama || 'Pengajar'}</p>
                                <p class="text-xs text-gray-500">${p.email || '-'}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-orange-600">${fmt(p.sisa)}</p>
                                <p class="text-xs text-gray-500">Sisa menunggu</p>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) {
                console.error('Error loading dashboard:', e);
                Swal.fire('Error', e.message, 'error');
            }
        }

        window.loadDaftarPengajar = async () => {
            try {
                const list = document.getElementById('pengajar-list');
                const search = document.getElementById('search-pengajar').value.toLowerCase();
                
                const filtered = allPengajar.filter(p => 
                    (p.name || p.nama || '').toLowerCase().includes(search) ||
                    (p.email || '').toLowerCase().includes(search)
                );

                if (filtered.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-400 py-8">Tidak ada pengajar ditemukan</p>';
                    return;
                }

                list.innerHTML = filtered.map(p => `
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-primary">${p.name || p.nama || '-'}</h4>
                                <p class="text-xs text-gray-500">${p.email || '-'} • ${p.mapel || p.mataPelajaran || '-'}</p>
                            </div>
                            <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">ID: ${p.id.slice(0, 8)}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="text-center p-3 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500">Saldo</p>
                                <p class="font-bold text-primary text-sm">${fmt(p.salary || 0)}</p>
                            </div>
                            <div class="text-center p-3 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500">Sesi</p>
                                <p class="font-bold text-primary text-sm">${p.totalSesi || Math.floor((p.salary || 0) / 5000)}</p>
                            </div>
                            <div class="text-center p-3 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500">Cair</p>
                                <p class="font-bold text-emerald-600 text-sm">${fmt(p.salaryDisbursed || 0)}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Error:', e);
            }
        };

        async function loadRiwayat() {
            try {
                const slipSnap = await getDocs(query(collection(db, 'slipGaji'), orderBy('createdAt', 'desc')));
                const riwayatEl = document.getElementById('riwayat-list');

                if (slipSnap.empty) {
                    riwayatEl.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-400">Belum ada slip diterbitkan</td></tr>';
                    return;
                }

                riwayatEl.innerHTML = Array.from(slipSnap.docs).map(doc => {
                    const slip = doc.data();
                    const status = slip.status === 'lunas' ? 'Lunas' : slip.status === 'diproses' ? 'Diproses' : 'Menunggu';
                    const statusColor = slip.status === 'lunas' ? 'emerald' : slip.status === 'diproses' ? 'yellow' : 'blue';
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="p-3">${slip.pengajarNama || 'Pengajar'}</td>
                            <td class="p-3">${slip.periodeLabel || '-'}</td>
                            <td class="p-3 text-center">${slip.jumlahSesi || 0}</td>
                            <td class="p-3 text-right font-bold">${fmt(slip.nominalBersih || 0)}</td>
                            <td class="p-3 text-center"><span class="bg-${statusColor}-100 text-${statusColor}-700 text-xs font-bold px-2 py-1 rounded-full">${status}</span></td>
                            <td class="p-3 text-center">
                                <button onclick="downloadPDF('${doc.id}')" class="text-primary hover:text-primaryLight text-xs font-bold">
                                    <i class="fa-solid fa-download"></i> PDF
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch(e) {
                console.error('Error:', e);
            }
        }

        window.downloadPDF = async (slipId) => {
            Swal.fire({ title: 'Menyiapkan PDF...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const slip = (await getDoc(doc(db, 'slipGaji', slipId))).data();
                Swal.close();
                Swal.fire('Berhasil', 'File slip gaji siap untuk diunduh', 'success');
            } catch(e) {
                Swal.fire('Error', 'Gagal menyiapkan file', 'error');
            }
        };
    </script>
</body>
</html>
