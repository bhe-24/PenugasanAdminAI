<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Log - Admin</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* HEADER NAVY (Konsisten) */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 3px solid #003366; padding-bottom: 15px;
        }
        .page-header h2 { margin: 0; color: #003366; font-size: 1.6rem; }

        /* SEARCH & FILTER BAR */
        .toolbar {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .search-input {
            flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px;
            font-size: 1rem;
        }
        .btn-refresh {
            background: #003366; color: white; border: none; padding: 0 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-refresh:hover { background: #002244; }

        /* --- TABEL LOG CANGGIH --- */
        .log-container {
            background: white; border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        
        thead { background: #f4f6f8; border-bottom: 2px solid #e0e0e0; }
        
        th { 
            padding: 15px; text-align: left; font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 1px; color: #555; font-weight: 700;
        }
        
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95rem; color: #333; }
        
        tr:hover { background-color: #f9fbfd; }

        /* BADGES (Label Warna Berdasarkan Aktivitas) */
        .badge { padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;}
        
        .badge-view { background: #e0f2fe; color: #0284c7; }      /* Biru: Lihat KHS */
        .badge-download { background: #dcfce7; color: #166534; }  /* Hijau: Download */
        .badge-submit { background: #ffedd5; color: #c2410c; }    /* Oranye: Kirim Tugas */
        .badge-login { background: #f3e8ff; color: #7e22ce; }     /* Ungu: Login */
        .badge-logout { background: #f1f5f9; color: #475569; }    /* Abu: Logout */
        .badge-danger { background: #fee2e2; color: #b91c1c; }    /* Merah: Hapus Akun */
        .badge-warning { background: #fef3c7; color: #b45309; }   /* Kuning: Cuti */
        .badge-default { background: #f1f5f9; color: #475569; }   /* Abu-abu: Lainnya */

        .text-muted { font-size: 0.8rem; color: #888; }
        .user-avatar { 
            width: 35px; height: 35px; background: #003366; color: white; 
            border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; 
            font-size: 0.9rem; margin-right: 12px; font-weight: bold; flex-shrink: 0;
        }

        /* --- RESPONSIVE MODE (TABLE TO CARDS) --- */
        @media (max-width: 768px) {
            thead { display: none; }
            tr { 
                display: block; margin-bottom: 15px; 
                background: white; border: 1px solid #ddd; border-radius: 10px; 
                box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 10px;
            }
            td { 
                display: flex; justify-content: space-between; align-items: center; text-align: right;
                padding: 10px 5px; border-bottom: 1px dashed #eee; font-size: 0.9rem; gap: 10px;
            }
            td:last-child { border-bottom: none; }
            td::before {
                content: attr(data-label); 
                font-weight: bold; color: #666; font-size: 0.8rem; text-transform: uppercase; text-align: left;
            }
            .container { padding: 15px; }
            .user-avatar { margin-right: 0; margin-left: 10px; }
            td[data-label="Pengguna"] > div { flex-direction: row-reverse; text-align: right; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h2><i class="fa-solid fa-clock-rotate-left"></i> Arsip Aktivitas Universal</h2>
            <a href="index.html" class="btn btn-secondary" style="width: auto; border-radius: 50px; background: #e2e8f0; color: #333; text-decoration: none; padding: 10px 20px; font-weight: 600;">
                <i class="fa-solid fa-arrow-left"></i> Kembali
            </a>
        </div>

        <div class="toolbar">
            <input type="text" id="search-log" class="search-input" placeholder="Cari aktivitas, nama pengguna, cuti, tugas, atau hapus akun...">
            <button class="btn-refresh" onclick="location.reload()">
                <i class="fa-solid fa-rotate-right"></i> Segarkan
            </button>
        </div>

        <div class="log-container">
            <table id="log-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Waktu</th>
                        <th style="width: 25%;">Pengguna</th>
                        <th style="width: 15%;">Aktivitas</th>
                        <th style="width: 30%;">Modul / Konteks</th>
                        <th style="width: 10%;">Status</th>
                    </tr>
                </thead>
                <tbody id="tbody-logs">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: #999;">
                            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: #003366;"></i><br><br>
                            Sedang sinkronisasi seluruh aktivitas sistem...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <p style="text-align: center; color: #94a3b8; font-size: 0.85rem; margin-top: 20px;">
            <i class="fa-solid fa-shield-halved"></i> Menampilkan 100 aktivitas terakhir dari seluruh modul sistem.
        </p>
    </div>

    <script type="module">
        import { db, checkAuth } from "../js/firebase-config.js";
        import { collection, query, orderBy, getDocs, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        (async () => {
            if(await checkAuth('pengajar')) {
                loadLogs();
            } else {
                window.location.href = '../index.html';
            }
        })();

        async function loadLogs() {
            const tbody = document.getElementById('tbody-logs');
            
            try {
                // KITA TARIK DATA DARI 2 KOLEKSI SEKALIGUS (KHS Lama + Aktivitas Baru)
                const qKHS = query(collection(db, 'khs_access_logs'), orderBy('timestamp', 'desc'), limit(50));
                const qActivity = query(collection(db, 'activity_logs'), orderBy('timestamp', 'desc'), limit(50));

                // Eksekusi bersamaan agar loading lebih cepat
                const [snapKHS, snapActivity] = await Promise.all([getDocs(qKHS), getDocs(qActivity)]);

                let allLogs = [];

                // Masukkan log KHS
                snapKHS.forEach(doc => allLogs.push({ id: doc.id, _source: 'KHS', ...doc.data() }));
                
                // Masukkan log Aktivitas Umum (Cuti, Hapus Akun, Tugas, Login)
                snapActivity.forEach(doc => allLogs.push({ id: doc.id, _source: 'General', ...doc.data() }));

                // Urutkan ulang semuanya secara akurat berdasarkan Waktu terbaru
                allLogs.sort((a, b) => {
                    const timeA = a.timestamp ? (a.timestamp.toMillis ? a.timestamp.toMillis() : a.timestamp.seconds * 1000) : 0;
                    const timeB = b.timestamp ? (b.timestamp.toMillis ? b.timestamp.toMillis() : b.timestamp.seconds * 1000) : 0;
                    return timeB - timeA; // Descending (Terbaru di atas)
                });

                // Ambil maksimal 100 data
                allLogs = allLogs.slice(0, 100);

                if(allLogs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#64748b;">Belum ada aktivitas tercatat di seluruh sistem.</td></tr>';
                    return;
                }

                tbody.innerHTML = ''; // Bersihkan baris loading

                allLogs.forEach(l => {
                    // 1. Format Tanggal
                    let dateStr = "-";
                    if (l.timestamp) {
                        const date = l.timestamp.toDate ? l.timestamp.toDate() : new Date(l.timestamp.seconds * 1000);
                        dateStr = date.toLocaleString('id-ID', { 
                            day: 'numeric', month: 'short', year: 'numeric',
                            hour: '2-digit', minute: '2-digit' 
                        });
                    }

                    // 2. Tentukan Badge & Ikon Berdasarkan Keyword Aksi
                    let badge = '';
                    let actionName = (l.action || l.activity || l.type || 'SYSTEM').toUpperCase().trim();
                    
                    if (actionName.includes('DOWNLOAD') || actionName.includes('UNDUH')) {
                        badge = `<span class="badge badge-download"><i class="fa-solid fa-download"></i> Unduh KHS</span>`;
                    } else if (actionName.includes('VIEW') || actionName.includes('READ') || actionName.includes('LIHAT')) {
                        badge = `<span class="badge badge-view"><i class="fa-solid fa-eye"></i> Lihat KHS</span>`;
                    } else if (actionName.includes('LOGIN') || actionName.includes('MASUK')) {
                        badge = `<span class="badge badge-login"><i class="fa-solid fa-right-to-bracket"></i> Login</span>`;
                    } else if (actionName.includes('LOGOUT') || actionName.includes('KELUAR')) {
                        badge = `<span class="badge badge-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</span>`;
                    } else if (actionName.includes('DELETE') || actionName.includes('HAPUS') || actionName.includes('WITHDRAWAL')) {
                        badge = `<span class="badge badge-danger"><i class="fa-solid fa-user-xmark"></i> Hapus Akun</span>`;
                    } else if (actionName.includes('CUTI') || actionName.includes('LEAVE')) {
                        badge = `<span class="badge badge-warning"><i class="fa-solid fa-bed"></i> Cuti</span>`;
                    } else if (actionName.includes('TUGAS') || actionName.includes('SUBMIT') || actionName.includes('UPLOAD')) {
                        badge = `<span class="badge badge-submit"><i class="fa-solid fa-file-arrow-up"></i> Tugas</span>`;
                    } else {
                        badge = `<span class="badge badge-default"><i class="fa-solid fa-bolt"></i> ${actionName}</span>`;
                    }

                    // 3. Ekstrak Detail Modul
                    let detailText = "Sistem Akademik";
                    if (l.module) detailText = l.module;
                    else if (l.detail) detailText = l.detail;
                    else if (l.context) detailText = l.context;
                    else if (l._source === 'KHS') detailText = 'Akses Rapor / KHS'; 

                    // 4. Data Pengguna
                    let userName = l.studentName || l.userName || l.name || "Sistem / Tamu";
                    let userId = l.studentUid || l.userId || l.uid || "-";
                    const initial = userName !== "Sistem / Tamu" ? userName.charAt(0).toUpperCase() : "?";

                    // 5. Render Baris ke HTML
                    tbody.innerHTML += `
                        <tr>
                            <td data-label="Waktu">
                                <span style="font-weight:600; color:#475569;"><i class="fa-regular fa-clock" style="margin-right:5px; color:#94a3b8;"></i>${dateStr}</span>
                            </td>
                            <td data-label="Pengguna">
                                <div style="display:flex; align-items:center;">
                                    <div class="user-avatar">${initial}</div>
                                    <div style="line-height:1.4;">
                                        <strong style="color:#1e293b;">${userName}</strong><br>
                                        <span class="text-muted" style="font-size:0.75rem;">UID: ${userId.substring(0,8)}</span>
                                    </div>
                                </div>
                            </td>
                            <td data-label="Aktivitas">${badge}</td>
                            <td data-label="Konteks">
                                <span style="color:#334155; font-size:0.9rem;">${detailText}</span>
                            </td>
                            <td data-label="Status">
                                <span style="color:#10b981; font-weight:700; font-size:0.85rem;"><i class="fa-solid fa-check"></i> OK</span>
                            </td>
                        </tr>
                    `;
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px; color:#ef4444; font-weight:bold;"><i class="fa-solid fa-triangle-exclamation"></i> Gagal menyinkronkan log: ${err.message}</td></tr>`;
            }
        }

        // Fitur Pencarian Cepat (Client-Side)
        document.getElementById('search-log').onkeyup = function() {
            const val = this.value.toLowerCase();
            const rows = document.querySelectorAll('#tbody-logs tr');
            
            rows.forEach(row => {
                // Lewati baris jika itu pesan error/kosong
                if(row.children.length === 1) return; 
                
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(val) ? '' : 'none';
            });
        };
    </script>
</body>
</html>
