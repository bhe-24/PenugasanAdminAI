<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Penulisan Naskah - Admin CA</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        :root {
            --primary: #003366; --accent: #d4af37; --bg: #f4f6f9;
            --text-dark: #1e293b; --text-gray: #64748b; --danger: #ef4444;
            --ai-color: #8b5cf6; --success: #10b981; --warning: #f59e0b; --info: #0284c7;
        }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-dark); padding-bottom: 50px; }
        .container { max-width: 1300px; width: 95%; margin: 0 auto; padding: 25px; }

        .swal2-container { z-index: 4000 !important; }

        .brand-header {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 25px; position: relative; overflow: hidden;
        }
        .header-info h1 { font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700; margin: 0; color: #fbbf24; z-index: 2; position: relative;}
        .header-info p { font-size: 0.95rem; opacity: 0.9; margin: 5px 0 0 0; z-index: 2; position: relative;}
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .filter-btn { padding: 10px 18px; border: 1px solid #cbd5e1; background: white; border-radius: 50px; font-family: 'Poppins'; font-size: 0.82rem; font-weight: 600; cursor: pointer; color: var(--text-gray); transition: 0.3s; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        #list-siswa { display: flex; flex-direction: column; gap: 18px; }

        .student-card { background: white; border-radius: 14px; padding: 22px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; }
        .sc-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .sc-title { font-family: 'Aleo', serif; color: var(--primary); font-size: 1.25rem; margin: 0 0 4px 0; }
        .sc-sub { font-size: 0.85rem; color: var(--text-gray); margin: 0; }

        .badge { padding: 6px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;}
        .badge.menulis { background: #dbeafe; color: #1d4ed8; }
        .badge.tamat-gabung { background: #fef3c7; color: #d97706; }
        .badge.siap-final { background: #ede9fe; color: #6d28d9; }
        .badge.selesai { background: #d1fae5; color: #059669; }
        .badge.dibatalkan { background: #fee2e2; color: #dc2626; }

        .progress-wrap { margin-bottom: 15px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-gray); margin-bottom: 5px; font-weight: 600;}
        .progress-bar-bg { background: #f1f5f9; border-radius: 20px; height: 10px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, var(--primary), #0369a1); height: 100%; border-radius: 20px; transition: width 0.4s ease; }

        .stats-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 15px; font-size: 0.85rem; color: var(--text-dark); }
        .stats-row span { display: inline-flex; align-items: center; gap: 6px; background: #f8fafc; padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0;}

        .history-toggle { font-size: 0.8rem; color: var(--info); cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 10px; }
        .history-list { display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 15px; margin-bottom: 15px; }
        .history-list.show { display: block; }
        .history-item { padding: 8px 0; border-bottom: 1px dashed #e2e8f0; font-size: 0.83rem; }
        
        .final-score-box { background: #ede9fe; border: 1px solid #ddd6fe; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}
        .final-score-box .score-num { font-size: 1.4rem; font-weight: 700; color: #6d28d9; }

        .action-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-sm { padding: 9px 16px; border-radius: 8px; border: none; font-weight: 600; font-size: 0.83rem; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: 0.2s; }
        .btn-sm:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-progress { background: linear-gradient(135deg, var(--ai-color), #6d28d9); color: white; }
        .btn-final { background: linear-gradient(135deg, #0284c7, #075985); color: white; }
        .btn-download { background: #eff6ff; color: #3b82f6; border: 1px solid #bfdbfe; }
        .btn-cancel { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
        .btn-rapor { background: linear-gradient(135deg, #10b981, #059669); color: white; }

        /* ===== MODAL EVALUASI (FULLSCREEN) ===== */
        .eval-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6f9; z-index: 2000; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .eval-modal.active { transform: translateY(0); }
        .eval-header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .eval-header h2 { margin: 0; font-size: 1.3rem; color: var(--primary); display: flex; align-items: center; gap: 10px; font-family: 'Aleo', serif;}
        .btn-close-modal { background: white; border: 1px solid #cbd5e1; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #64748b; display: flex; align-items: center; gap: 8px; }
        
        .eval-body { display: flex; flex: 1; overflow: hidden; }
        .doc-viewer { flex: 2; padding: 30px 40px; overflow-y: auto; background: white; border-right: 1px solid #e2e8f0; }
        .bab-block { margin-bottom: 25px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
        .bab-block h4 { margin: 0; background: #f1f5f9; padding: 10px 15px; font-size: 0.95rem; color: var(--primary); }
        .bab-block .bab-isi { padding: 15px 20px; white-space: pre-wrap; line-height: 1.8; font-size: 0.95rem; color: #334155; max-height: 300px; overflow-y: auto; }

        .decision-panel { flex: 1; min-width: 450px; padding: 25px; background: #f8fafc; overflow-y: auto; display: flex; flex-direction: column; gap: 18px;}
        .ai-panel { background: linear-gradient(135deg, #f3e8ff, #ede9fe); border: 1px solid #ddd6fe; padding: 22px; border-radius: 16px;}
        .btn-ai { background: linear-gradient(135deg, var(--ai-color), #6d28d9); color: white; border: none; padding: 12px 15px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.9rem;}
        
        .feedback-form { background: white; padding: 22px; border-radius: 16px; border: 1px solid #e2e8f0; flex: 1; display: flex; flex-direction: column;}
        textarea.feedback-input { flex: 1; min-height: 150px; width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 10px; font-family: inherit; font-size: 0.85rem; line-height: 1.6; resize: none; margin-bottom: 15px; background: #f8fafc; }
        
        /* GRID 10 SKOR AI */
        .score-input-group { display: none; margin-bottom: 15px; }
        .score-input-group.show { display: block; }
        .score-input-group > label { font-size: 0.85rem; font-weight: 700; color: #475569; display: block; margin-bottom: 10px; }
        .score-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .score-item { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0;}
        .score-item label { font-size: 0.75rem; font-weight: 600; color: #475569; margin:0; flex:1;}
        .score-item input { width: 60px; padding: 5px; border: 2px solid #cbd5e1; border-radius: 6px; font-weight: 700; text-align: center; color: var(--primary); }

        .btn-simpan-eval { background: linear-gradient(135deg, #003366, #001f3f); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: auto;}
    </style>
</head>
<body>

    <div id="main-loading"><h2 style="color: #003366;">Memuat Data...</h2></div>

    <div class="container">
        <div class="brand-header">
            <div class="header-info">
                <h1>Monitoring Penulisan Naskah</h1>
                <p>Pantau progres dan kelola inkubasi naskah siswa.</p>
            </div>
            <a href="/admin/index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="setFilter('semua', this)">Semua</button>
            <button class="filter-btn" onclick="setFilter('menulis', this)">Sedang Menulis</button>
            <button class="filter-btn" onclick="setFilter('siap-final', this)">Siap Evaluasi Final</button>
            <button class="filter-btn" onclick="setFilter('selesai', this)">Sudah Dievaluasi</button>
        </div>

        <div id="list-siswa"></div>
    </div>

    <!-- MODAL EVALUASI -->
    <div class="eval-modal" id="eval-modal">
        <div class="eval-header">
            <h2><i class="fa-solid fa-microscope"></i> <span id="eval-mode-title">Workspace Evaluasi</span></h2>
            <button class="btn-close-modal" id="btn-close-modal" onclick="closeEvalModal()">Tutup</button>
        </div>
        <div class="eval-body">
            <div class="doc-viewer">
                <h1 id="v-judul" style="color:var(--primary); font-family:Aleo;">Judul</h1>
                <div id="v-bab-container"></div>
            </div>
            
            <div class="decision-panel">
                <div class="ai-panel">
                    <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Asisten Analisis AI</h3>
                    <p class="ai-desc" id="ai-desc-text">AI akan membaca dan merumuskan skor.</p>
                    <button class="btn-ai" id="btn-ai" onclick="analyzeWithAI()">Analisis dengan AI</button>
                </div>

                <div class="feedback-form">
                    <h3>Catatan Evaluasi</h3>
                    <textarea class="feedback-input" id="mentor-feedback"></textarea>
                    
                    <div class="score-input-group" id="score-input-group">
                        <label>Detail 10 Skor Naskah (Auto-Ekstrak AI)</label>
                        <div class="score-grid">
                            <div class="score-item"><label>1. Ide & Orisinalitas</label><input type="number" id="s-t1" placeholder="0"></div>
                            <div class="score-item"><label>2. Struktur & Alur</label><input type="number" id="s-t2" placeholder="0"></div>
                            <div class="score-item"><label>3. Penokohan</label><input type="number" id="s-t3" placeholder="0"></div>
                            <div class="score-item"><label>4. Genre & Tone</label><input type="number" id="s-t4" placeholder="0"></div>
                            <div class="score-item"><label>5. Teknik & Pacing</label><input type="number" id="s-t5" placeholder="0"></div>
                            <div class="score-item"><label>6. Gaya Bahasa</label><input type="number" id="s-t6" placeholder="0"></div>
                            <div class="score-item"><label>7. Kekuatan Dialog</label><input type="number" id="s-t7" placeholder="0"></div>
                            <div class="score-item"><label>8. Plot Hole</label><input type="number" id="s-t8" placeholder="0"></div>
                            <div class="score-item"><label>9. Resolusi (UTS)</label><input type="number" id="s-uts" placeholder="0"></div>
                            <div class="score-item"><label>10. PUEBI (UAS)</label><input type="number" id="s-uas" placeholder="0"></div>
                        </div>
                    </div>

                    <button class="btn-simpan-eval" id="btn-simpan-eval" onclick="simpanEvaluasi()">Simpan Evaluasi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { db, checkAuth } from "/js/firebase-config.js";
        import { collection, getDocs, doc, getDoc, updateDoc, query, where, orderBy, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let allStudents = [];
        let currentFilter = 'semua';
        let adminInfo = null;
        let activeUid = null;
        let activeMode = null; 
        let activeChapters = [];

        (async () => {
            adminInfo = await checkAuth('pengajar');
            if (adminInfo) await loadData();
            else window.location.href = '/admin/index.html';
        })();

        async function loadData() {
            try {
                const profileSnap = await getDocs(collection(db, 'author_profiles'));
                const profiles = [];
                profileSnap.forEach(d => profiles.push({ id: d.id, ...d.data() }));

                allStudents = [];
                for (const profile of profiles) {
                    const uid = profile.id;
                    let pitching = {};
                    try {
                        const pitchSnap = await getDoc(doc(db, 'pitching_projects', uid));
                        if (pitchSnap.exists()) pitching = pitchSnap.data();
                    } catch (e) {}

                    let chapters = [];
                    try {
                        const q = query(collection(db, 'chapters'), where('uid', '==', uid), orderBy('timestamp', 'asc'));
                        const chapSnap = await getDocs(q);
                        chapSnap.forEach(c => chapters.push({ id: c.id, ...c.data() }));
                    } catch (e) {}

                    const isTamat = !!profile.is_tamat;
                    const linkNaskahLengkap = pitching.link_naskah_lengkap || null;
                    const evaluasiFinal = profile.evaluasi_final || null;
                    const statusPitching = pitching.status || 'menunggu';

                    let statusKey = '';
                    if (statusPitching !== 'acc') statusKey = 'dibatalkan';
                    else if (!isTamat) statusKey = 'menulis';
                    else if (isTamat && !linkNaskahLengkap) statusKey = 'tamat-gabung';
                    else if (isTamat && linkNaskahLengkap && !evaluasiFinal) statusKey = 'siap-final';
                    else if (evaluasiFinal) statusKey = 'selesai';

                    allStudents.push({
                        uid, profile, pitching, chapters,
                        jumlahBab: chapters.length,
                        isTamat, linkNaskahLengkap, evaluasiFinal, statusPitching, statusKey,
                        checkpoints: profile.evaluasi_checkpoints || [],
                        canEvalFinal: statusPitching === 'acc' && isTamat && !!linkNaskahLengkap
                    });
                }
                render();
            } catch (error) {
                Swal.fire('Gagal', 'Tidak dapat memuat data.', 'error');
            } finally {
                document.getElementById('main-loading').style.display = 'none';
            }
        }

        window.setFilter = (key, btnEl) => {
            currentFilter = key;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            render();
        };

        function render() {
            const container = document.getElementById('list-siswa');
            const data = currentFilter === 'semua' ? allStudents : allStudents.filter(s => s.statusKey === currentFilter);

            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">Tidak ada data untuk filter ini.</div>';
                return;
            }

            container.innerHTML = data.map(s => {
                const finalScoreHTML = s.evaluasiFinal && s.evaluasiFinal.skor_detail
                    ? `<div class="final-score-box">
                         <div><b>Skor Rata-rata AI: <span class="score-num">${s.evaluasiFinal.skor}/100</span></b><br>
                         <small style="color:#64748b;">(Telah memiliki 10 komponen nilai spesifik)</small></div>
                         <button class="btn-sm btn-rapor" onclick="kirimNilaiRapor('${s.uid}')"><i class="fa-solid fa-paper-plane"></i> Sinkronisasi Ke Rapor</button>
                       </div>`
                    : '';

                return `
                <div class="student-card">
                    <div class="sc-header">
                        <div>
                            <h3 class="sc-title">${s.pitching.judul || '-'}</h3>
                            <p class="sc-sub"><i class="fa-solid fa-user"></i> ${s.profile.pen_name || '-'} &middot; Bab: ${s.jumlahBab}</p>
                        </div>
                    </div>
                    ${finalScoreHTML}
                    <div class="action-row">
                        <button class="btn-sm btn-final" ${s.canEvalFinal ? '' : 'disabled'} onclick="openEvalModal('${s.uid}', 'final')">
                            <i class="fa-solid fa-graduation-cap"></i> ${s.evaluasiFinal ? 'Edit Evaluasi Final' : 'Evaluasi Final Naskah'}
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // ============================================================
        // KIRIM NILAI RAPOR (BACA 10 SKOR, KIRIM KE SISWA.HTML, HITUNG IPS)
        // ============================================================
        window.kirimNilaiRapor = async (uid) => {
            const student = allStudents.find(x => x.uid === uid);
            const ev = student.evaluasiFinal;

            if (!ev || !ev.skor_detail) {
                Swal.fire('Error', 'Data evaluasi 10 komponen belum lengkap. Silakan Evaluasi Ulang.', 'warning');
                return;
            }

            try {
                const userRef = doc(db, 'users', uid);
                const userSnap = await getDoc(userRef);
                
                let updateData = { nilai_naskah: ev.skor }; // skor rata-rata
                let msgSuffix = 'Skor rata-rata telah disimpan.';

                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    const sem = userData.semester || 1;

                    // Logika Khusus Semester 3
                    if (sem == 3) {
                        updateData = {
                            nilai_naskah: ev.skor, // Ini rata-rata 10 komponen
                            nilai_t1: ev.skor_detail.t1,
                            nilai_t2: ev.skor_detail.t2,
                            nilai_t3: ev.skor_detail.t3,
                            nilai_t4: ev.skor_detail.t4,
                            nilai_t5: ev.skor_detail.t5,
                            nilai_t6: ev.skor_detail.t6,
                            nilai_t7: ev.skor_detail.t7,
                            nilai_t8: ev.skor_detail.t8,
                            nilai_uts: ev.skor_detail.uts,
                            nilai_uas: ev.skor_detail.uas
                        };

                        // Kalkulasi IPS otomatis persis seperti di siswa.html
                        const avgTugas = (ev.skor_detail.t1 + ev.skor_detail.t2 + ev.skor_detail.t3 + ev.skor_detail.t4 + 
                                          ev.skor_detail.t5 + ev.skor_detail.t6 + ev.skor_detail.t7 + ev.skor_detail.t8) / 8;
                        const scoreTugas = avgTugas * 0.40;
                        const scoreUts = ev.skor_detail.uts * 0.25;
                        const scoreUas = ev.skor_detail.uas * 0.25;

                        let valEx1 = userData.nilai_extra1 || null;
                        let valEx2 = userData.nilai_extra2 || null;
                        const extraValues = [valEx1, valEx2, ev.skor].filter(v => v !== null && !isNaN(v));
                        const avgExtra = extraValues.length > 0 ? (extraValues.reduce((a,b)=>a+b,0) / extraValues.length) : 0;
                        const scoreExtra = avgExtra * 0.10;

                        let finalScore = scoreTugas + scoreUts + scoreUas + scoreExtra;
                        if(finalScore > 100) finalScore = 100;

                        updateData.ips = (finalScore / 100) * 4;
                        msgSuffix = '<br><br><b>10 Nilai Naskah Spesifik berhasil dikirim dan IPS Otomatis dihitung!</b>';
                    }
                }

                await updateDoc(userRef, updateData);
                Swal.fire({ icon: 'success', title: 'Terkirim!', html: msgSuffix });
            } catch (error) {
                Swal.fire('Gagal', 'Terjadi kesalahan: ' + error.message, 'error');
            }
        };

        window.openEvalModal = (uid, mode) => {
            const s = allStudents.find(x => x.uid === uid);
            activeUid = uid; activeMode = mode; activeChapters = s.chapters.slice();
            document.getElementById('eval-modal').classList.add('active');
            
            document.getElementById('v-judul').innerText = s.pitching.judul;
            document.getElementById('v-bab-container').innerHTML = activeChapters.map((c, i) => `
                <div class="bab-block">
                    <h4>Bab ${i+1}: ${c.judul_bab || ''}</h4>
                    <div class="bab-isi">${c.isi_teks.slice(0, 3000)}...</div>
                </div>`).join('');

            document.getElementById('score-input-group').classList.add('show');
            document.getElementById('mentor-feedback').value = '';
            
            // Kosongkan form 10 input
            for (let i=1; i<=8; i++) document.getElementById(`s-t${i}`).value = '';
            document.getElementById('s-uts').value = '';
            document.getElementById('s-uas').value = '';
        };

        window.closeEvalModal = () => document.getElementById('eval-modal').classList.remove('active');

        // ============================================================
        // ANALISIS AI & AUTO PARSER REGEX
        // ============================================================
        window.analyzeWithAI = async () => {
            const s = allStudents.find(x => x.uid === activeUid);
            const btnAi = document.getElementById('btn-ai');
            const feedbackInput = document.getElementById('mentor-feedback');
            
            btnAi.disabled = true; btnAi.innerHTML = 'AI Sedang Membaca...';
            feedbackInput.value = 'Menganalisis naskah...';

            try {
                const response = await fetch('/api/analisis-naskah', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'final', chapters: activeChapters }) // Sesuaikan payload Anda
                });
                const result = await response.json();
                const text = result.analisis_teks;
                feedbackInput.value = text;

                // FUNGSI REGEX UNTUK EKSTRAK SKOR (Format "KataKunci: 80/100" atau "KataKunci : 80")
                const extractScore = (keyword) => {
                    const regex = new RegExp(keyword + '[^:]*:\\s*(\\d+)', 'i');
                    const match = text.match(regex);
                    return match ? parseInt(match[1]) : '';
                };

                // Isi otomatis ke-10 input HTML
                document.getElementById('s-t1').value = extractScore('Ide');
                document.getElementById('s-t2').value = extractScore('Struktur|Alur');
                document.getElementById('s-t3').value = extractScore('Karakter');
                document.getElementById('s-t4').value = extractScore('Genre|Tone');
                document.getElementById('s-t5').value = extractScore('Pacing|Teknik');
                document.getElementById('s-t6').value = extractScore('Gaya Bahasa|Diksi');
                document.getElementById('s-t7').value = extractScore('Dialog');
                document.getElementById('s-t8').value = extractScore('Plot Hole');
                document.getElementById('s-uts').value = extractScore('Resolusi|Ending');
                document.getElementById('s-uas').value = extractScore('PUEBI|Teknis');

                Swal.fire({ icon: 'success', title: 'Skor Diekstrak!', timer: 2000, showConfirmButton: false });
            } catch (error) {
                Swal.fire('Koneksi Gagal', 'AI gagal merespons.', 'error');
            } finally {
                btnAi.disabled = false; btnAi.innerHTML = 'Analisis dengan AI';
            }
        };

        // ============================================================
        // SIMPAN EVALUASI (SIMPAN OBJEK 10 SKOR)
        // ============================================================
        window.simpanEvaluasi = async () => {
            const btnSimpan = document.getElementById('btn-simpan-eval');
            btnSimpan.disabled = true; btnSimpan.innerText = 'Menyimpan...';

            try {
                // Ambil nilai dari ke-10 input
                const skorDetail = {
                    t1: parseInt(document.getElementById('s-t1').value) || 0,
                    t2: parseInt(document.getElementById('s-t2').value) || 0,
                    t3: parseInt(document.getElementById('s-t3').value) || 0,
                    t4: parseInt(document.getElementById('s-t4').value) || 0,
                    t5: parseInt(document.getElementById('s-t5').value) || 0,
                    t6: parseInt(document.getElementById('s-t6').value) || 0,
                    t7: parseInt(document.getElementById('s-t7').value) || 0,
                    t8: parseInt(document.getElementById('s-t8').value) || 0,
                    uts: parseInt(document.getElementById('s-uts').value) || 0,
                    uas: parseInt(document.getElementById('s-uas').value) || 0
                };

                // Hitung Rata-rata dari 10 skor untuk nilai naskah keseluruhan
                const totalSkor = Object.values(skorDetail).reduce((a, b) => a + b, 0);
                const rataRata = Math.round(totalSkor / 10);

                await updateDoc(doc(db, 'author_profiles', activeUid), {
                    evaluasi_final: {
                        catatan: document.getElementById('mentor-feedback').value,
                        skor: rataRata, // skor rata-rata
                        skor_detail: skorDetail, // objek 10 skor spesifik
                        timestamp: serverTimestamp()
                    }
                });

                Swal.fire('Berhasil', 'Evaluasi final 10 komponen tersimpan. Silakan klik Sinkronisasi Rapor pada kartu.', 'success')
                .then(() => { closeEvalModal(); loadData(); });
            } catch (e) {
                Swal.fire('Gagal', e.message, 'error');
            } finally {
                btnSimpan.disabled = false; btnSimpan.innerText = 'Simpan Evaluasi';
            }
        };
    </script>
</body>
</html>
