<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Tugas - Admin CA</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLE GLOBAL --- */
        :root { --primary: #003366; --accent: #4361ee; --bg: #f4f6f9; --text-dark: #1e293b; --text-gray: #64748b;}
        * { box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text-dark); margin: 0; padding-bottom: 50px; }
        
        .container { max-width: 1200px; width: 95%; margin: 0 auto; padding: 25px; }

        /* --- HEADER BRANDED NAVY --- */
        .brand-header {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; }

        .header-logo-circle {
            width: 75px; height: 75px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0;
            padding: 12px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite; overflow: hidden;
        }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: #fbbf24;
        }
        .header-greeting {
            font-size: 0.95rem; opacity: 0.9; margin-top: 5px; font-weight: 400; margin-bottom: 0; color: #e2e8f0;
        }

        /* --- TOMBOL KEMBALI DI HEADER --- */
        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2; cursor: pointer;
        }
        .btn-back:hover { background: white; color: var(--primary); }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* --- GRID TUGAS --- */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 40px;}
        .task-card {
            background: white; border-radius: 16px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0;
            transition: 0.3s; display: flex; flex-direction: column; position: relative;
        }
        .task-card:hover { border-color: #cbd5e1; box-shadow: 0 8px 25px rgba(0,0,0,0.06); transform: translateY(-3px); }
        
        .tc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 15px;}
        .tc-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .tc-badge { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .tc-sem { background: #e0f2fe; color: #0284c7; }
        .tc-type { background: #fef3c7; color: #d97706; }

        .tc-title { margin: 0 0 10px 0; font-size: 1.25rem; color: var(--primary); font-weight: 700; line-height: 1.3; font-family: 'Aleo', serif;}
        .tc-info { font-size: 0.9rem; color: var(--text-gray); margin: 0 0 5px 0; display: flex; gap: 10px; align-items: center; }
        .tc-deadline { font-size: 0.85rem; font-weight: 600; color: #ef4444; display: flex; align-items: center; gap: 6px;}
        
        .tc-actions { margin-top: auto; padding-top: 20px; display: flex; gap: 10px; }
        .btn-act { flex: 1; justify-content: center; font-size: 0.85rem; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; color: white;}
        .btn-act:hover { filter: brightness(0.9); }
        .bg-edit { background: var(--primary); box-shadow: 0 4px 10px rgba(0,51,102,0.2);}
        .bg-del { background: #ef4444; box-shadow: 0 4px 10px rgba(239,68,68,0.2);}

        /* --- FORM STYLES --- */
        .form-card {
            background: white; border-radius: 16px; padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #e2e8f0;
        }
        .form-header { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-family: 'Aleo', serif; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px;}
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-dark); font-size: 0.95rem; }
        .form-input, .form-select {
            width: 100%; padding: 14px 15px; border: 1px solid #cbd5e1; border-radius: 10px;
            font-family: 'Poppins', sans-serif; font-size: 0.95rem; transition: 0.3s; background: #f8fafc; color: var(--text-dark);
        }
        .form-input:focus, .form-select:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* --- RICH TEXT EDITOR (WYSIWYG) --- */
        .editor-wrapper { border: 1px solid #cbd5e1; border-radius: 10px; overflow: hidden; transition: 0.3s; background: white;}
        .editor-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
        .editor-toolbar {
            background: #f1f5f9; padding: 10px 15px; border-bottom: 1px solid #cbd5e1; 
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .editor-btn {
            background: white; border: 1px solid #cbd5e1; padding: 6px 12px;
            cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 0.9rem; color: var(--text-dark);
            transition: 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .editor-btn:hover { background: #e2e8f0; color: var(--primary); border-color: #94a3b8; }
        
        .editor-content {
            min-height: 200px; padding: 15px; outline: none; font-size: 0.95rem; line-height: 1.6; color: var(--text-dark); overflow-y: auto; max-height: 400px;
        }
        .editor-content table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .editor-content table th, .editor-content table td { border: 1px solid #cbd5e1; padding: 8px; }
        .editor-content table th { background: #f1f5f9; }

        /* ACTION BUTTONS FORM */
        .form-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; border-top: 1px dashed #e2e8f0; padding-top: 20px;}
        .btn-batal { background: #f1f5f9; color: var(--text-gray); border: none; padding: 14px 30px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Poppins', sans-serif;}
        .btn-batal:hover { background: #e2e8f0; color: var(--text-dark);}
        .btn-simpan { background: #10b981; color: white; border: none; padding: 14px 40px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Poppins', sans-serif; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);}
        .btn-simpan:hover { background: #059669; transform: translateY(-2px);}
        .btn-simpan:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none;}

        /* --- CUSTOM MODAL & LOADING --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 31, 63, 0.5); backdrop-filter: blur(5px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: white; width: 90%; max-width: 400px; padding: 35px;
            border-radius: 20px; text-align: center;
            transform: scale(0.8); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        .modal-overlay.active .modal-box { transform: scale(1); }

        .modal-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .icon-success { color: #10b981; }
        .icon-error { color: #ef4444; }
        .icon-confirm { color: #0284c7; }

        .modal-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; color: var(--primary); font-family: 'Aleo', serif;}
        .modal-text { color: var(--text-gray); font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; }

        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .btn-modal { padding: 12px 20px; border-radius: 50px; border: none; font-weight: 600; cursor: pointer; font-size: 0.95rem; transition: 0.2s; width: 100%; font-family: 'Poppins', sans-serif;}
        .btn-modal:hover { transform: translateY(-2px); }
        .btn-modal-primary { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0, 51, 102, 0.2); }
        .btn-modal-danger { background: #ef4444; color: white; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); }
        .btn-modal-cancel { background: #f1f5f9; color: var(--text-gray); }
        .btn-modal-cancel:hover { background: #e2e8f0; color: var(--text-dark); transform: none;}

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(4px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000;
        }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
        @media (max-width: 600px) {
            .brand-header { flex-direction: column; align-items: flex-start; }
            .btn-back { width: 100%; justify-content: center; margin-top: 10px; }
            .header-logo-circle { width: 60px; height: 60px; padding: 10px; }
            .header-brand-name { font-size: 1.4rem; }
            .form-actions { flex-direction: column; }
            .btn-batal, .btn-simpan { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="brand-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-info">
                    <h1 class="header-brand-name">Kelola Tugas</h1>
                    <div class="header-greeting">Buat dan pantau tugas harian siswa.</div>
                </div>
            </div>
            <a href="/admin/index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Dashboard Utama</a>
        </div>

        <!-- DAFTAR TUGAS -->
        <div id="list-container">
            <h2 style="color:var(--primary); margin-bottom: 20px; font-weight: 700; font-family: 'Aleo', serif;"><i class="fa-solid fa-list-check"></i> Daftar Tugas Terbit</h2>
            <div id="task-list" class="task-grid"></div>
        </div>

        <div style="margin: 50px 0; border-top: 2px dashed #cbd5e1;"></div>

        <!-- FORM TUGAS -->
        <div class="form-card" id="form-section">
            <div class="form-header" id="form-title">
                <i class="fa-solid fa-plus-circle"></i> Buat Tugas Baru
            </div>
            
            <form id="form-tugas">
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label class="form-label">Judul Tugas</label>
                    <input type="text" id="judul" class="form-input" required placeholder="Contoh: Analisis Struktur Cerpen">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Mata Pelajaran</label>
                        <input type="text" id="mapel" class="form-input" required placeholder="Contoh: Bahasa Indonesia">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Semester</label>
                        <select id="semester" class="form-select">
                            <option value="1">Semester 1</option><option value="2">Semester 2</option>
                            <option value="3">Semester 3</option><option value="4">Semester 4</option>
                            <option value="5">Semester 5</option><option value="6">Semester 6</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Tipe Pengumpulan</label>
                        <select id="tipe" class="form-select">
                            <option value="Esai">Esai (Input Teks Langsung)</option>
                            <option value="Dokumen">Upload File (PDF/Docx/Img)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Batas Waktu (Deadline)</label>
                        <input type="datetime-local" id="deadline" class="form-input" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Instruksi / Soal</label>
                    <div class="editor-wrapper">
                        <!-- RICH TEXT TOOLBAR -->
                        <div class="editor-toolbar">
                            <button type="button" class="editor-btn" onclick="formatText('bold')" title="Tebal"><i class="fa-solid fa-bold"></i></button>
                            <button type="button" class="editor-btn" onclick="formatText('italic')" title="Miring"><i class="fa-solid fa-italic"></i></button>
                            <button type="button" class="editor-btn" onclick="formatText('underline')" title="Garis Bawah"><i class="fa-solid fa-underline"></i></button>
                            <div style="width: 1px; background: #cbd5e1; margin: 0 5px;"></div>
                            <button type="button" class="editor-btn" onclick="formatText('insertOrderedList')" title="Daftar Angka"><i class="fa-solid fa-list-ol"></i></button>
                            <button type="button" class="editor-btn" onclick="formatText('insertUnorderedList')" title="Daftar Titik"><i class="fa-solid fa-list-ul"></i></button>
                            <div style="width: 1px; background: #cbd5e1; margin: 0 5px;"></div>
                            <button type="button" class="editor-btn" onclick="insertTable()"><i class="fa-solid fa-table"></i> Sisipkan Tabel</button>
                        </div>
                        <!-- CONTENT EDITABLE DIV -->
                        <div id="instruksi-editor" class="editor-content" contenteditable="true" placeholder="Tulis instruksi lengkap di sini..."></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn-batal hidden" onclick="resetForm()">Batal Edit</button>
                    <button type="submit" class="btn-simpan" id="btn-submit">
                        <span id="btn-text">Simpan & Terbitkan</span>
                        <i id="btn-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- CUSTOM MODAL -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-icon-container" class="modal-icon"></div>
            <h3 id="modal-title" class="modal-title"></h3>
            <p id="modal-text" class="modal-text"></p>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loading-overlay" class="hidden">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 4rem; color: var(--primary);"></i>
        <h3 style="margin-top: 20px; color: var(--primary); font-family: 'Aleo', serif;">Memproses Data...</h3>
    </div>

    <!-- JAVASCRIPT -->
    <script type="module">
        import { db, checkAuth } from "../js/firebase-config.js";
        import { collection, query, orderBy, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let currentUser = null;

        // --- 1. RICH TEXT EDITOR FUNCTIONS ---
        window.formatText = (command) => {
            document.execCommand(command, false, null);
            document.getElementById('instruksi-editor').focus();
        };

        window.insertTable = () => {
            const tableHTML = '<br><table border="1" style="width:100%; border-collapse:collapse; margin:15px 0; border: 1px solid #cbd5e1;"><tr><th style="padding:10px; background:#f1f5f9; border: 1px solid #cbd5e1;">Header 1</th><th style="padding:10px; background:#f1f5f9; border: 1px solid #cbd5e1;">Header 2</th></tr><tr><td style="padding:10px; border: 1px solid #cbd5e1;">Data 1</td><td style="padding:10px; border: 1px solid #cbd5e1;">Data 2</td></tr></table><br>';
            document.execCommand('insertHTML', false, tableHTML);
            document.getElementById('instruksi-editor').focus();
        };

        // Fallback untuk placeholder contenteditable
        const editor = document.getElementById('instruksi-editor');
        editor.addEventListener('focus', function() {
            if(this.innerHTML.trim() === '<p><br></p>' || this.innerHTML.trim() === '<br>') this.innerHTML = '';
        });

        // --- 2. CUSTOM MODAL FUNCTION ---
        function showModal(type, title, text, onConfirm = null) {
            const overlay = document.getElementById('custom-modal');
            const iconContainer = document.getElementById('modal-icon-container');
            const actionsContainer = document.getElementById('modal-actions');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            
            // Icon Setup
            iconContainer.className = 'modal-icon'; // reset
            if(type === 'success') {
                iconContainer.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                iconContainer.classList.add('icon-success');
            } else if(type === 'error') {
                iconContainer.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
                iconContainer.classList.add('icon-error');
            } else {
                iconContainer.innerHTML = '<i class="fa-solid fa-circle-question"></i>';
                iconContainer.classList.add('icon-confirm');
            }

            // Buttons Setup
            actionsContainer.innerHTML = '';
            if (onConfirm) {
                const btnCancel = document.createElement('button');
                btnCancel.className = 'btn-modal btn-modal-cancel';
                btnCancel.innerText = 'Batal';
                btnCancel.onclick = () => overlay.classList.remove('active');
                
                const btnOk = document.createElement('button');
                btnOk.className = type === 'error' ? 'btn-modal btn-modal-danger' : 'btn-modal btn-modal-primary';
                btnOk.innerText = 'Ya, Lanjutkan';
                btnOk.onclick = () => { overlay.classList.remove('active'); onConfirm(); };
                
                actionsContainer.append(btnCancel, btnOk);
            } else {
                const btnOk = document.createElement('button');
                btnOk.className = 'btn-modal btn-modal-primary';
                btnOk.innerText = 'Tutup';
                btnOk.onclick = () => overlay.classList.remove('active');
                actionsContainer.appendChild(btnOk);
            }
            
            overlay.classList.add('active');
        }

        // --- 3. CORE LOGIC ---
        const showLoad = () => document.getElementById('loading-overlay').classList.remove('hidden');
        const hideLoad = () => document.getElementById('loading-overlay').classList.add('hidden');

        (async () => {
            currentUser = await checkAuth('pengajar');
            if(currentUser) loadTugas();
            else window.location.href = '../index.html';
        })();

        async function loadTugas() {
            const listDiv = document.getElementById('task-list');
            try {
                const q = query(collection(db, 'assignments'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                
                listDiv.innerHTML = '';
                if(snap.empty) {
                    listDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#94a3b8; border:2px dashed #cbd5e1; border-radius:16px; background:white;"><i class="fa-solid fa-folder-open fa-3x" style="margin-bottom:15px; color:#e2e8f0;"></i><br><span style="font-size:1.1rem; font-weight:600;">Belum ada tugas yang diterbitkan.</span></div>';
                    return;
                }

                snap.forEach(d => {
                    const t = d.data();
                    const dateObj = new Date(t.deadline);
                    const isOverdue = dateObj < new Date();
                    const dateStr = dateObj.toLocaleString('id-ID', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                    const deadlineColor = isOverdue ? 'color: #ef4444;' : 'color: #10b981;';
                    
                    listDiv.innerHTML += `
                        <div class="task-card">
                            <div class="tc-header">
                                <div class="tc-badges">
                                    <span class="tc-badge tc-sem">Sem ${t.semester || 1}</span>
                                    <span class="tc-badge tc-type"><i class="fa-solid ${t.tipe === 'Esai' ? 'fa-align-left' : 'fa-file-arrow-up'}"></i> ${t.tipe}</span>
                                </div>
                            </div>
                            <h3 class="tc-title">${t.judul}</h3>
                            <p class="tc-info"><i class="fa-solid fa-book-open"></i> Mapel: ${t.mapel}</p>
                            <p class="tc-deadline" style="${deadlineColor}"><i class="fa-regular fa-clock"></i> Deadline: ${dateStr}</p>
                            
                            <div class="tc-actions">
                                <button class="btn-act bg-edit" onclick="window.editTugas('${d.id}')" title="Edit Tugas">
                                    <i class="fa-solid fa-pen"></i> Edit
                                </button>
                                <button class="btn-act bg-del" onclick="window.hapusTugas('${d.id}')" title="Hapus Tugas">
                                    <i class="fa-solid fa-trash-can"></i> Hapus
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch(e) {
                console.error(e);
                listDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px; color:#ef4444; background:white; border-radius:12px;">Gagal memuat data.</div>';
            }
        }

        window.hapusTugas = async (id) => {
            showModal('error', 'Hapus Tugas Permanen?', 'Yakin ingin menghapus tugas ini? Data yang dihapus tidak dapat dikembalikan.', async () => {
                showLoad();
                try {
                    await deleteDoc(doc(db, 'assignments', id));
                    await loadTugas();
                    showModal('success', 'Berhasil', 'Tugas telah dihapus dari sistem.');
                } catch(e) {
                    showModal('error', 'Gagal Menghapus', e.message);
                } finally {
                    hideLoad();
                }
            });
        };

        window.editTugas = async (id) => {
            showLoad();
            try {
                const snap = await getDoc(doc(db, 'assignments', id));
                const data = snap.data();
                
                document.getElementById('edit-id').value = id;
                document.getElementById('judul').value = data.judul;
                document.getElementById('mapel').value = data.mapel;
                document.getElementById('semester').value = data.semester || 1;
                document.getElementById('tipe').value = data.tipe;
                document.getElementById('instruksi-editor').innerHTML = data.instruksi; 
                document.getElementById('deadline').value = data.deadline;

                // UI Edit Mode
                document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Edit Tugas';
                document.getElementById('btn-cancel').classList.remove('hidden');
                document.getElementById('btn-text').innerText = 'Update Tugas';
                document.getElementById('btn-submit').style.background = '#f59e0b'; // Ubah warna tombol jadi kuning saat edit
                document.getElementById('form-section').scrollIntoView({behavior: 'smooth'});
            } catch(e) {
                showModal('error', 'Error', 'Gagal memuat detail tugas untuk diedit.');
            } finally {
                hideLoad();
            }
        };

        window.resetForm = () => {
            document.getElementById('form-tugas').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('instruksi-editor').innerHTML = '';
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-plus-circle"></i> Buat Tugas Baru';
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('btn-text').innerText = 'Simpan & Terbitkan';
            document.getElementById('btn-submit').style.background = '#10b981'; // Kembalikan ke warna hijau
        };

        document.getElementById('form-tugas').onsubmit = async (e) => {
            e.preventDefault();
            
            // Ambil konten HTML dari Rich Text Editor
            const instruksiHTML = document.getElementById('instruksi-editor').innerHTML.trim();
            if(!instruksiHTML || instruksiHTML === '<br>' || instruksiHTML === '<p><br></p>') {
                return showModal('error', 'Instruksi Kosong', 'Harap isi instruksi tugas terlebih dahulu.');
            }

            const btnSubmit = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            
            btnSubmit.disabled = true;
            btnText.innerText = 'Menyimpan...';
            spinner.classList.remove('hidden');

            const editId = document.getElementById('edit-id').value;
            const payload = {
                judul: document.getElementById('judul').value,
                mapel: document.getElementById('mapel').value,
                semester: parseInt(document.getElementById('semester').value),
                tipe: document.getElementById('tipe').value,
                instruksi: instruksiHTML, 
                deadline: document.getElementById('deadline').value,
                updatedAt: serverTimestamp()
            };

            try {
                if(editId) {
                    await updateDoc(doc(db, 'assignments', editId), payload);
                    showModal('success', 'Diperbarui', 'Data tugas berhasil diupdate.');
                } else {
                    payload.createdAt = serverTimestamp();
                    payload.namaPengajar = currentUser.name;
                    await addDoc(collection(db, 'assignments'), payload);
                    showModal('success', 'Diterbitkan', 'Tugas baru berhasil diterbitkan untuk siswa.');
                }
                
                window.resetForm();
                loadTugas();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch(e) {
                showModal('error', 'Gagal Menyimpan', e.message);
            } finally {
                btnSubmit.disabled = false;
                btnText.innerText = editId ? 'Update Tugas' : 'Simpan & Terbitkan';
                spinner.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
