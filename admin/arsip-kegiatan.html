<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Promosi - Admin Cendekia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .admin-header { width: 100%; background: linear-gradient(135deg, #001f3f 0%, #003366 100%); padding: 15px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #d4af37; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; }
        .header-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-brand img { height: 45px; width: 45px; border-radius: 50%; border: 2px solid #d4af37; padding: 2px; background:white;}
        .header-brand h1 { font-family: 'Aleo', serif; font-size: 1.4rem; color: white; font-weight: 700; margin: 0;}
        .btn-back { background: rgba(255,255,255,0.15); color: white; padding: 8px 15px; border-radius: 50px; text-decoration: none; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; border:1px solid rgba(255,255,255,0.3);}
        .btn-back:hover { background: white; color: #003366; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="admin-header">
        <a href="#" class="header-brand">
            <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo">
            <h1>Arsip Promosi</h1>
        </a>
        <a href="kegiatan-mingguan.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Pengelola</a>
    </header>

    <main class="flex-1 w-full max-w-6xl mx-auto p-4 md:p-8">
        <div class="mb-6">
            <h2 class="text-2xl font-serif font-bold text-[#003366]">Riwayat Cetak Promosi</h2>
            <p class="text-sm text-gray-500">Histori teks caption dan informasi event yang pernah dipublikasikan.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="arsip-grid">
            <div class="col-span-full text-center py-10 text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i><br>Memuat arsip...
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
            authDomain: "mading-cf676.firebaseapp.com", 
            projectId: "mading-cf676", 
            storageBucket: "mading-cf676.firebasestorage.app", 
            messagingSenderId: "72175203671", 
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) loadArsip();
            else window.location.href = '../index.html';
        });

        async function loadArsip() {
            const container = document.getElementById('arsip-grid');
            try {
                const q = query(collection(db, 'arsip_promosi'), orderBy('tanggalCetak', 'desc'));
                const snap = await getDocs(q);
                
                container.innerHTML = '';
                if(snap.empty) {
                    container.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">Belum ada riwayat promosi dicetak.</div>';
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    const date = new Date(data.tanggalCetak).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                    
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full hover:shadow-md transition">
                            <div class="flex justify-between items-start mb-3">
                                <span class="bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-1 rounded uppercase">${data.tipe}</span>
                                <span class="text-[10px] text-gray-400"><i class="fa-regular fa-clock"></i> ${date}</span>
                            </div>
                            <h3 class="font-bold text-gray-800 text-sm mb-1">${data.judul}</h3>
                            <p class="text-xs text-gray-500 mb-3">Tema Poster: <span class="capitalize font-semibold">${data.tema}</span></p>
                            <div class="bg-gray-50 p-3 rounded-lg flex-1 border border-gray-100 overflow-y-auto max-h-[120px] text-xs text-gray-600 whitespace-pre-wrap font-sans">${data.caption}</div>
                            
                            <button onclick="navigator.clipboard.writeText(\`${data.caption.replace(/`/g, '')}\`); Swal.fire({toast:true, position:'top-end', icon:'success', title:'Teks Disalin', showConfirmButton:false, timer:1500})" class="mt-4 w-full bg-[#003366] hover:bg-[#002244] text-white py-2 rounded-lg text-xs font-bold transition">
                                <i class="fa-regular fa-copy"></i> Salin Caption
                            </button>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-center text-red-500">Error: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
