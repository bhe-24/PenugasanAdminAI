<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pustaka Materi - Admin</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLE GLOBAL --- */
        :root { --primary: #003366; --accent: #4361ee; --bg: #f4f6f9; --text-dark: #1e293b; --text-gray: #64748b;}
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text-dark); margin: 0; padding-bottom: 50px; }
        * { box-sizing: border-box; outline: none; }
        .container { max-width: 1200px; width: 95%; margin: 0 auto; padding: 25px; }

        /* --- HEADER BRANDED NAVY --- */
        .brand-header {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; }

        .header-logo-circle {
            width: 75px; height: 75px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0;
            padding: 12px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite; overflow: hidden;
        }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px;
        }
        .header-greeting {
            font-size: 0.95rem; opacity: 0.9; margin-top: 5px; font-weight: 400; margin-bottom: 0;
        }

        /* --- TOMBOL KEMBALI DI HEADER --- */
        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2;
        }
        .btn-back:hover { background: white; color: var(--primary); }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* --- LAYOUT GRID --- */
        .dashboard-grid {
            display: grid; grid-template-columns: 350px 1fr; gap: 25px; align-items: start;
        }

        /* --- KARTU (CARDS) --- */
        .card {
            background: white; border-radius: 16px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0;
        }
        .card-header {
            font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px;
        }

        /* --- FORM STYLES --- */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }
        .form-input, .form-select {
            width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid #cbd5e1;
            font-family: 'Poppins', sans-serif; font-size: 0.9rem; transition: 0.3s;
            background: #f8fafc; color: var(--text-dark);
        }
        .form-input:focus, .form-select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
        .help-text { font-size: 0.75rem; color: var(--text-gray); margin-top: 4px; }
        
        .btn-submit {
            width: 100%; background: var(--primary); color: white; padding: 12px; border-radius: 8px;
            font-weight: 600; border: none; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
            font-family: 'Poppins', sans-serif;
        }
        .btn-submit:hover { background: #001f3f; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,31,63,0.2);}
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none;}
        
        .btn-cancel {
            width: 100%; background: #f1f5f9; color: var(--text-gray); padding: 12px; border-radius: 8px;
            font-weight: 600; border: none; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px;
            font-family: 'Poppins', sans-serif;
        }
        .btn-cancel:hover { background: #e2e8f0; color: var(--text-dark); }

        /* Preview Image */
        .preview-box { margin-top: 10px; display: none; }
        .preview-box.active { display: block; }
        .preview-box img { height: 80px; width: auto; border-radius: 6px; border: 1px solid #cbd5e1; object-fit: cover; }

        /* --- TABLE STYLES --- */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #f8fafc; color: var(--text-gray); font-weight: 600; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; white-space: nowrap;}
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; color: var(--text-dark); vertical-align: middle;}
        tr:hover td { background: #f1f5f9; }
        
        .badge { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; display: inline-block; white-space: nowrap;}
        .bg-karya { background: #f3e8ff; color: #7e22ce; }
        .bg-materi { background: #dcfce7; color: #166534; }
        
        .btn-icon { background: none; border: none; font-size: 1.1rem; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 8px;}
        .text-blue { color: var(--accent); } .text-blue:hover { color: #1d4ed8; background: #eff6ff; }
        .text-red { color: #ef4444; } .text-red:hover { color: #b91c1c; background: #fef2f2; }

        /* Notice / Error */
        .alert-box { background: #fef2f2; border-left: 4px solid #ef4444; color: #b91c1c; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; display: none;}
        .alert-box.active { display: block; }
        
        .badge-count { background: #e2e8f0; color: var(--text-dark); font-size: 0.8rem; padding: 4px 12px; border-radius: 50px; font-weight: 700;}

        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; display: none; }
        .empty-state.active { display: block; }
        .empty-state i { font-size: 3.5rem; margin-bottom: 15px; opacity: 0.5; }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .brand-header { flex-direction: column; align-items: flex-start; }
            .btn-back { width: 100%; justify-content: center; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER -->
        <div class="brand-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-info">
                    <h1 class="header-brand-name">Kelola Pustaka</h1>
                    <p class="header-greeting">Upload dan kelola karya & materi ajar siswa.</p>
                </div>
            </div>
            <a href="/admin/index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Dashboard Utama</a>
        </div>

        <div id="error-container" class="alert-box">
            <strong><i class="fa-solid fa-triangle-exclamation"></i> Perhatian:</strong> <span id="error-message"></span>
        </div>

        <!-- MAIN GRID -->
        <div class="dashboard-grid">
            
            <!-- FORM UPLOAD/EDIT -->
            <div class="card" style="position: sticky; top: 20px;">
                <div class="card-header" id="formTitle">
                    <span><i class="fa-solid fa-plus-circle"></i> Tambah Materi Baru</span>
                </div>
                
                <form id="uploadForm">
                    <input type="hidden" id="editId">
                    <input type="hidden" id="existingCoverUrl">

                    <div class="form-group">
                        <label class="form-label">Judul Buku / Materi</label>
                        <input type="text" id="judul" class="form-input" required placeholder="Contoh: Antologi Puisi X">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Kategori</label>
                        <select id="kategori" class="form-select" required>
                            <option value="karya">Karya Siswa (Novel/Cerpen/Puisi)</option>
                            <option value="materi">Materi Pelajaran (Buku Teks)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Cover Buku (Gambar)</label>
                        <input type="file" id="fileCover" accept="image/*" class="form-input" style="padding: 9px 15px; background: white;">
                        <div class="help-text" id="coverHelp">*Pilih file baru jika ingin mengganti cover.</div>
                        <div id="coverPreview" class="preview-box">
                            <img src="" alt="Preview Cover">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Link Dokumen (Google Drive)</label>
                        <input type="text" id="linkDrive" class="form-input" required placeholder="Paste link 'Anyone with the link' di sini...">
                    </div>

                    <div style="margin-top: 25px;">
                        <button type="submit" id="btnSubmit" class="btn-submit">
                            <span id="btnText">Simpan Data</span>
                            <i id="loadingIcon" class="fa-solid fa-spinner fa-spin hidden"></i>
                        </button>
                        <button type="button" id="btnCancel" onclick="resetForm()" class="btn-cancel hidden">
                            <i class="fa-solid fa-xmark"></i> Batal Edit
                        </button>
                    </div>
                </form>
            </div>

            <!-- TABEL DATA -->
            <div class="card">
                <div class="card-header">
                    <span><i class="fa-solid fa-book-open"></i> Daftar Pustaka & Materi</span>
                    <span class="badge-count" id="totalCount"><i class="fa-solid fa-spinner fa-spin"></i> Memuat...</span>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 70px;">Cover</th>
                                <th>Informasi Materi</th>
                                <th>Kategori</th>
                                <th style="text-align: center; width: 100px;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Data akan dimuat disini -->
                        </tbody>
                    </table>
                </div>

                <div id="emptyState" class="empty-state">
                    <i class="fa-solid fa-box-open"></i>
                    <h3 style="margin: 0 0 5px 0; color: #64748b;">Belum ada materi</h3>
                    <p style="margin: 0; font-size: 0.9rem;">Materi atau karya yang ditambahkan akan muncul di sini.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPT LOGIC -->
    <script type="module">
        import { checkAuth } from "../js/firebase-config.js";
        
        // Import Firebase App dan Firestore untuk inisialisasi database Pustaka yang terpisah
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === KONFIGURASI DATABASE PUSTAKA (berbasis-ai) ===
        const firebaseConfigPustaka = {
            apiKey: "AIzaSyDooErB7K4vFtmC6-PcI30v82Vh6b85fPI",
            authDomain: "berbasis-ai.firebaseapp.com",
            projectId: "berbasis-ai",
            storageBucket: "berbasis-ai.firebasestorage.app",
            messagingSenderId: "962437652324",
            appId: "1:962437652324:web:4426a5efcabf72caebe471"
        };

        // Inisialisasi Instance Firebase kedua khusus untuk Pustaka Materi
        const appPustaka = initializeApp(firebaseConfigPustaka, "PustakaApp");
        const dbPustaka = getFirestore(appPustaka);

        const COLLECTION_NAME = 'pustaka_materi';
        const API_KEY_IMGBB = '2f45fcafb6dfb2dbae295499022ce476'; 
        
        let materialsData = [];
        let currentAdmin = null;

        (async () => {
            // Verifikasi Admin (menggunakan checkAuth dari main config mading-cf676)
            currentAdmin = await checkAuth('pengajar');
            if(!currentAdmin) {
                window.location.href = '/admin/index.html';
                return;
            }
            startDatabaseListener();
        })();

        // --- LISTENER DATABASE PUSTAKA ---
        function startDatabaseListener() {
            // Memanggil query menggunakan dbPustaka
            const q = query(collection(dbPustaka, COLLECTION_NAME));
            
            onSnapshot(q, (snapshot) => {
                materialsData = []; 
                const tbody = document.getElementById('tableBody');
                const emptyState = document.getElementById('emptyState');
                const errorContainer = document.getElementById('error-container');
                
                errorContainer.classList.remove('active'); 
                tbody.innerHTML = '';

                if (snapshot.empty) {
                    emptyState.classList.add('active');
                    document.getElementById('totalCount').innerText = `0 Item`;
                    return;
                }

                emptyState.classList.remove('active');
                document.getElementById('totalCount').innerText = `${snapshot.size} Item`;

                snapshot.forEach((doc) => {
                    const item = doc.data();
                    item.id = doc.id;
                    materialsData.push(item);
                });

                // Sorting Client-side (Terbaru di atas)
                materialsData.sort((a, b) => new Date(b.tanggal || 0) - new Date(a.tanggal || 0));

                // Render Tabel
                materialsData.forEach((item) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <img src="${item.cover}" alt="cover" style="width: 50px; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid #cbd5e1;" onerror="this.src='https://via.placeholder.com/50?text=No+Img'">
                        </td>
                        <td>
                            <div style="font-weight: 700; color: var(--primary); margin-bottom: 4px; font-size: 1rem;">${item.judul}</div>
                            <a href="${item.link}" target="_blank" style="font-size: 0.8rem; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 4px;"><i class="fa-solid fa-link"></i> Buka Dokumen Drive</a>
                        </td>
                        <td>
                            <span class="badge ${item.kategori === 'karya' ? 'bg-karya' : 'bg-materi'}">
                                ${item.kategori === 'karya' ? 'Karya Siswa' : 'Materi Ajar'}
                            </span>
                        </td>
                        <td style="text-align: center; white-space: nowrap;">
                            <button onclick="startEdit('${item.id}')" class="btn-icon text-blue" title="Edit Materi"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteItem('${item.id}')" class="btn-icon text-red" title="Hapus Materi"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }, (error) => {
                console.error("Error Database: ", error);
                let msg = error.message;

                if(msg.includes("Missing or insufficient permissions")) {
                    msg = "Firebase memblokir akses karena Aturan (Rules) Firestore terkunci.";
                }
                
                showError(msg);
            });
        }

        function showError(msg) {
            const errorContainer = document.getElementById('error-container');
            const errorMsg = document.getElementById('error-message');
            errorContainer.classList.add('active');
            errorMsg.innerText = msg;
        }

        // --- FUNGSI GLOBAL & HELPER ---
        window.getDirectLink = (url) => {
            const regex = /\/d\/([a-zA-Z0-9_-]+)/;
            const match = url.match(regex);
            return (match && match[1]) ? `https://drive.google.com/uc?export=download&id=${match[1]}` : null;
        }

        window.deleteItem = async (id) => {
            if(confirm("Yakin ingin menghapus materi ini dari pustaka? Data tidak dapat dikembalikan.")) {
                try {
                    await deleteDoc(doc(dbPustaka, COLLECTION_NAME, id));
                    if(document.getElementById('editId').value == id) window.resetForm();
                } catch (e) {
                    alert("Gagal menghapus: " + e.message);
                }
            }
        }

        window.startEdit = (id) => {
            const item = materialsData.find(x => x.id === id);
            if(!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('existingCoverUrl').value = item.cover;
            document.getElementById('judul').value = item.judul;
            document.getElementById('kategori').value = item.kategori;
            document.getElementById('linkDrive').value = item.link; 

            document.getElementById('formTitle').innerHTML = '<span style="color:#f59e0b;"><i class="fa-solid fa-pen-to-square"></i> Edit Materi</span>';
            document.getElementById('btnText').innerText = "Update Data";
            document.getElementById('btnSubmit').style.background = "#f59e0b";
            document.getElementById('btnCancel').classList.remove('hidden');
            
            const preview = document.getElementById('coverPreview');
            preview.classList.add('active');
            preview.querySelector('img').src = item.cover;
            
            // Auto scroll ke atas (bagian form)
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.resetForm = () => {
            document.getElementById('uploadForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('existingCoverUrl').value = "";
            
            document.getElementById('formTitle').innerHTML = '<span><i class="fa-solid fa-plus-circle"></i> Tambah Materi Baru</span>';
            document.getElementById('btnText').innerText = "Simpan Data";
            document.getElementById('btnSubmit').style.background = "var(--primary)";
            document.getElementById('btnCancel').classList.add('hidden');
            document.getElementById('coverPreview').classList.remove('active');
        }

        // --- SUBMIT HANDLER ---
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const editId = document.getElementById('editId').value; 

            btnSubmit.disabled = true;
            btnText.innerText = editId ? "Memperbarui..." : "Menyimpan...";
            loadingIcon.classList.remove('hidden');

            try {
                const judul = document.getElementById('judul').value;
                const kategori = document.getElementById('kategori').value;
                const rawLink = document.getElementById('linkDrive').value;
                
                let finalLink = rawLink;
                if(rawLink.includes('drive.google.com/file') || rawLink.includes('drive.google.com/open')) {
                    const dlLink = window.getDirectLink(rawLink);
                    if (!dlLink) throw new Error('Format Link Google Drive tidak valid!');
                    finalLink = dlLink;
                }

                let imageUrl = document.getElementById('existingCoverUrl').value;
                const fileInput = document.getElementById('fileCover');

                // Jika ada gambar baru yang dipilih
                if (fileInput.files.length > 0) {
                     const formData = new FormData();
                    formData.append('image', fileInput.files[0]);

                    const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY_IMGBB}`, {
                        method: 'POST',
                        body: formData
                    });
                    const imgData = await imgRes.json();
                    if (!imgData.success) throw new Error('Gagal upload gambar cover ke server.');
                    imageUrl = imgData.data.url;
                } else if (!editId && !imageUrl) {
                    throw new Error('Anda wajib mengupload gambar cover buku/materi!');
                }

                const dataToSave = {
                    judul: judul,
                    kategori: kategori,
                    cover: imageUrl,
                    link: finalLink,
                    tanggal: new Date().toISOString()
                };

                if (editId) {
                    const docRef = doc(dbPustaka, COLLECTION_NAME, editId);
                    await updateDoc(docRef, dataToSave);
                    alert("Berhasil memperbarui data materi!");
                } else {
                    await addDoc(collection(dbPustaka, COLLECTION_NAME), dataToSave);
                    alert("Berhasil menambahkan materi baru ke Pustaka!");
                }
                
                window.resetForm();

            } catch (err) {
                console.error(err);
                alert("Gagal: " + err.message);
            } finally {
                btnSubmit.disabled = false;
                btnText.innerText = editId ? "Update Data" : "Simpan Data";
                loadingIcon.classList.add('hidden');
            }
        });

    </script>
</body>
</html>
