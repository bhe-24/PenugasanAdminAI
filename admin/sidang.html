<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Redaksi - Sidang Cendekia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root {
            --primary: #003366; --navy-light: #1e3a8a; --accent: #eab308; 
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f8fafc; --text-dark: #334155; --border: #e2e8f0;
        }
        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); padding-bottom: 50px; }
        
        /* NAVBAR */
        .navbar { background: #020617; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000;}
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-brand img { width: 45px; height: 45px; background: white; border-radius: 50%; padding: 2px; }
        .nav-brand h1 { font-family: 'Playfair Display', serif; color: white; font-size: 1.4rem; margin: 0;}
        .nav-brand h1 span { color: var(--accent); }
        .btn-kembali { background: rgba(255,255,255,0.1); color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s;}
        .btn-kembali:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        
        /* HEADER PANEL */
        .panel-header { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;}
        .panel-title h2 { color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; font-family: 'Playfair Display', serif;}
        .panel-title p { color: #64748b; font-size: 0.9rem;}
        
        /* TABS */
        .tabs { display: flex; gap: 10px; background: #e2e8f0; padding: 5px; border-radius: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; border-radius: 8px; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 6px;}
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn:hover:not(.active) { color: var(--primary); }
        .tab-badge { background: var(--danger); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50px; }

        /* DATA GRID & CARDS */
        .data-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .student-card { background: white; border-radius: 16px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 20px; animation: fadeIn 0.4s ease;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px dashed var(--border); padding-bottom: 15px;}
        .student-info h3 { color: var(--primary); font-size: 1.3rem; margin-bottom: 5px;}
        .student-info p { color: #64748b; font-size: 0.85rem; margin: 2px 0; font-weight: 500;}
        .student-info .npm { color: var(--accent); font-family: monospace; font-size: 1rem; font-weight: 700; background: #f8fafc; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);}
        
        .status-badge { padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        .status-badge.pending { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .status-badge.approved { background: #d1fae5; color: #059669; border: 1px solid #a7f3d0; }
        .status-badge.rejected { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

        /* BERKAS & LINK */
        .berkas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border);}
        .berkas-item { display: flex; flex-direction: column; gap: 5px;}
        .berkas-label { font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase;}
        .btn-link { background: white; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; text-decoration: none; color: var(--navy-light); font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s;}
        .btn-link:hover { border-color: var(--navy-light); background: #eff6ff;}
        .btn-link.disabled { opacity: 0.5; pointer-events: none; color: #94a3b8; }

        /* METADATA TAMBAHAN */
        .meta-details { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.85rem; color: #475569;}
        .meta-box { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px;}
        .meta-box strong { display: block; color: var(--navy-dark); margin-bottom: 3px;}

        /* ACTION BUTTONS */
        .action-bar { display: flex; gap: 10px; margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 20px;}
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; color: white;}
        .btn-acc { background: var(--success); }
        .btn-acc:hover { background: #059669; transform: translateY(-2px);}
        .btn-reject { background: var(--danger); }
        .btn-reject:hover { background: #dc2626; transform: translateY(-2px);}

        /* EMPTY STATE & LOADING */
        .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 16px; border: 1px dashed #cbd5e1; color: #64748b;}
        .empty-state i { font-size: 3rem; color: #cbd5e1; margin-bottom: 15px;}
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;}
        .spinner { width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .panel-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .tabs { width: 100%; overflow-x: auto; }
            .tab-btn { flex: 1; justify-content: center; white-space: nowrap;}
            .meta-details { grid-template-columns: 1fr; }
            .action-bar { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h3 style="color: var(--primary);">Menarik Data Server...</h3>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <img src="https://imgur.com/5Srjyo4.png" alt="Logo">
            <h1>Panel Redaksi <span>Sidang</span></h1>
        </div>
        <a href="/dashboard/admin.html" class="btn-kembali"><i class="fa-solid fa-arrow-left"></i> Dasbor Utama</a>
    </nav>

    <div class="container">
        
        <div class="panel-header">
            <div class="panel-title">
                <h2>Validasi Berkas Sidang</h2>
                <p>Kelola dan evaluasi pengajuan dossier sidang akhir siswa.</p>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('pending_admin')">
                    <i class="fa-solid fa-inbox"></i> Antrean <span class="tab-badge" id="count-pending">0</span>
                </button>
                <button class="tab-btn" onclick="switchTab('approved')">
                    <i class="fa-solid fa-check-double"></i> Disetujui <span style="margin-left:5px; color:#10b981;" id="count-approved">0</span>
                </button>
                <button class="tab-btn" onclick="switchTab('rejected')">
                    <i class="fa-solid fa-rotate-left"></i> Revisi
                </button>
            </div>
        </div>

        <div class="data-grid" id="data-container">
            </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        // Sesuaikan path import dengan struktur folder admin kamu
        import { db, checkAuth } from "../js/firebase-config.js";
        import { collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let currentUser = null;
        let allApplications = [];
        let currentTab = 'pending_admin';

        // INISIALISASI HALAMAN
        window.onload = async () => {
            try {
                // Pastikan yang masuk adalah admin
                currentUser = await checkAuth('admin');
                if(!currentUser) {
                    Swal.fire('Akses Ditolak', 'Halaman khusus Redaksi.', 'error').then(()=> window.location.href = '../login.html');
                    return;
                }
                await fetchApplications();
            } catch(e) {
                console.error(e);
                Swal.fire('Error', 'Gagal terhubung ke database.', 'error');
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        };

        // TARIK DATA DARI FIRESTORE
        async function fetchApplications() {
            try {
                const q = query(collection(db, 'sidang_applications'), orderBy('timestamp', 'desc'));
                const querySnapshot = await getDocs(q);
                
                allApplications = [];
                let pendingCount = 0;
                let approvedCount = 0;

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    data.id = docSnap.id; // Menyimpan UID dokumen
                    
                    // KITA TANGKAP SEMUA STATUS: Baik versi lama maupun versi baru
                    if (data.status === 'pending' || data.status === 'pending_admin' || data.status === 'approved' || data.status === 'acc' || data.status === 'rejected') {
                        
                        // Normalisasi (Ubah status lama agar cocok dengan sistem tab Admin yang baru)
                        if(data.status === 'acc') data.status = 'approved';
                        if(data.status === 'pending') data.status = 'pending_admin';
                        
                        allApplications.push(data);
                        
                        if (data.status === 'pending_admin') pendingCount++;
                        if (data.status === 'approved') approvedCount++;
                    }
                });

                document.getElementById('count-pending').innerText = pendingCount;
                document.getElementById('count-approved').innerText = approvedCount;

                renderData();
            } catch (error) {
                console.error("Gagal tarik data:", error);
            }
        } // --> BAGIAN YANG TER-COPY DUA KALI SUDAH DIHAPUS DI SINI <--

        // RENDER KARTU SISWA BERDASARKAN TAB
        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderData();
        }

        function renderData() {
            const container = document.getElementById('data-container');
            container.innerHTML = '';

            const filteredData = allApplications.filter(app => app.status === currentTab);

            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-folder-open"></i>
                        <h3>Tidak ada data</h3>
                        <p>Belum ada pengajuan dengan status ini.</p>
                    </div>`;
                return;
            }

            filteredData.forEach(app => {
                const dateSubmit = app.submitted_final_at ? app.submitted_final_at.toDate().toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'}) : 'Tanggal tidak diketahui';
                
                let statusBadge = '';
                if(app.status === 'pending_admin') statusBadge = `<span class="status-badge pending"><i class="fa-solid fa-clock"></i> Perlu Direview</span>`;
                else if(app.status === 'approved') statusBadge = `<span class="status-badge approved"><i class="fa-solid fa-check"></i> Disetujui</span>`;
                else if(app.status === 'rejected') statusBadge = `<span class="status-badge rejected"><i class="fa-solid fa-xmark"></i> Dikembalikan</span>`;

                // Tombol Aksi (Hanya muncul di tab Antrean)
                let actionButtons = '';
                if (app.status === 'pending_admin') {
                    actionButtons = `
                        <div class="action-bar">
                            <button class="btn-action btn-reject" onclick="rejectApplication('${app.id}')"><i class="fa-solid fa-pen-to-square"></i> Tolak / Kembalikan</button>
                            <button class="btn-action btn-acc" onclick="approveApplication('${app.id}')"><i class="fa-solid fa-check-double"></i> ACC & Jadwalkan</button>
                        </div>
                    `;
                } else if (app.status === 'approved' && app.jadwal_sidang) {
                    actionButtons = `
                        <div style="background:#eff6ff; padding:15px; border-radius:8px; border:1px solid #bfdbfe; margin-top:15px;">
                            <p style="margin:0 0 5px; color:var(--primary); font-weight:700;"><i class="fa-regular fa-calendar-check"></i> Dijadwalkan: ${app.jadwal_sidang}</p>
                            <a href="${app.link_meet}" target="_blank" style="font-size:0.85rem; font-weight:600; color:#2563eb; text-decoration:none;"><i class="fa-solid fa-video"></i> Buka Link Google Meet</a>
                        </div>
                    `;
                } else if (app.status === 'rejected') {
                    actionButtons = `
                        <div style="background:#fef2f2; padding:15px; border-radius:8px; border:1px solid #fecaca; margin-top:15px;">
                            <p style="margin:0; font-size:0.85rem; color:#991b1b;"><strong>Alasan Ditolak:</strong><br>${app.reject_reason || 'Tidak ada alasan.'}</p>
                        </div>
                    `;
                }

                // Amankan Link Drive (Jika ada yang kosong/gagal upload)
                const linkFoto = app.url_foto ? `<a href="${app.url_foto}" target="_blank" class="btn-link"><i class="fa-solid fa-image"></i> Pas Foto</a>` : `<span class="btn-link disabled">Kosong</span>`;
                const linkKHS = app.url_khs ? `<a href="${app.url_khs}" target="_blank" class="btn-link"><i class="fa-solid fa-file-pdf"></i> File KHS</a>` : `<span class="btn-link disabled">Kosong</span>`;
                const linkKuitansi = app.url_kuitansi ? `<a href="${app.url_kuitansi}" target="_blank" class="btn-link"><i class="fa-solid fa-receipt"></i> Kuitansi</a>` : `<span class="btn-link disabled">Kosong</span>`;
                const linkPerjanjian = app.url_perjanjian ? `<a href="${app.url_perjanjian}" target="_blank" class="btn-link"><i class="fa-solid fa-file-signature"></i> Perjanjian</a>` : `<span class="btn-link disabled">Kosong</span>`;
                const linkSK = app.url_sk ? `<a href="${app.url_sk}" target="_blank" class="btn-link"><i class="fa-solid fa-file-contract"></i> SK Sidang</a>` : `<span class="btn-link disabled">Kosong</span>`;

                const cardHTML = `
                    <div class="student-card">
                        <div class="card-header">
                            <div class="student-info">
                                <h3>${app.judul_naskah || 'Judul Tidak Tersedia'}</h3>
                                <p><i class="fa-solid fa-user"></i> ${app.nama_lengkap || '-'} &nbsp;|&nbsp; <span class="npm">${app.npm || app.id.substring(0,8)}</span></p>
                                <p style="font-size:0.8rem; color:#94a3b8; margin-top:5px;"><i class="fa-regular fa-clock"></i> Dikirim pada: ${dateSubmit}</p>
                            </div>
                            <div>${statusBadge}</div>
                        </div>

                        <div class="meta-details">
                            <div class="meta-box"><strong>Paket Penerbitan:</strong> ${app.paket || '-'}</div>
                            <div class="meta-box"><strong>Komunitas/Instansi:</strong> ${app.instansi || '-'}</div>
                            <div class="meta-box" style="grid-column: 1 / -1;"><strong>Strategi Promosi:</strong> ${app.promosi || '-'}</div>
                        </div>

                        <div>
                            <p style="font-size:0.85rem; font-weight:700; color:var(--navy-light); margin-bottom:10px;"><i class="fa-brands fa-google-drive"></i> BERKAS GOOGLE DRIVE:</p>
                            <div class="berkas-grid">
                                <div class="berkas-item"><span class="berkas-label">Identitas</span>${linkFoto}</div>
                                <div class="berkas-item"><span class="berkas-label">Akademik</span>${linkKHS}</div>
                                <div class="berkas-item"><span class="berkas-label">Keuangan</span>${linkKuitansi}</div>
                                <div class="berkas-item"><span class="berkas-label">Legalitas 1</span>${linkPerjanjian}</div>
                                <div class="berkas-item"><span class="berkas-label">Legalitas 2</span>${linkSK}</div>
                            </div>
                        </div>

                        ${actionButtons}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // ==========================================
        // FUNGSI AKSI ADMIN: TERIMA / TOLAK
        // ==========================================

        // FUNGSI ACC (SETUJUI)
        window.approveApplication = async function(uid) {
            const { value: formValues } = await Swal.fire({
                title: 'Setujui & Jadwalkan Sidang',
                html: `
                    <div style="text-align:left;">
                        <label style="font-size:0.9rem; font-weight:600; color:#333; margin-bottom:5px; display:block;">Jadwal Sidang Lengkap</label>
                        <input id="swal-jadwal" class="swal2-input" placeholder="Misal: Sabtu, 15 Mei 2026 - 10:00 WIB" style="width:100%; margin:0 0 15px 0;">
                        
                        <label style="font-size:0.9rem; font-weight:600; color:#333; margin-bottom:5px; display:block;">Link Google Meet</label>
                        <input id="swal-meet" type="url" class="swal2-input" placeholder="https://meet.google.com/..." style="width:100%; margin:0;">
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: '<i class="fa-solid fa-check"></i> Konfirmasi Lulus',
                cancelButtonText: 'Batal',
                preConfirm: () => {
                    const jadwal = document.getElementById('swal-jadwal').value;
                    const meet = document.getElementById('swal-meet').value;
                    if (!jadwal || !meet) {
                        Swal.showValidationMessage('Jadwal dan Link Meet wajib diisi!');
                        return false;
                    }
                    return { jadwal: jadwal, meet: meet }
                }
            });

            if (formValues) {
                try {
                    Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                    
                    await updateDoc(doc(db, 'sidang_applications', uid), {
                        status: 'approved', // Sistem siswa membaca ini
                        jadwal_sidang: formValues.jadwal,
                        link_meet: formValues.meet,
                        approved_at: serverTimestamp()
                    });

                    Swal.fire('Berhasil!', 'Siswa telah diluluskan dan jadwal sudah terkirim ke dasbor mereka.', 'success')
                        .then(() => {
                            // Update data lokal agar tidak perlu refresh halaman
                            const index = allApplications.findIndex(app => app.id === uid);
                            if(index !== -1) {
                                allApplications[index].status = 'approved';
                                allApplications[index].jadwal_sidang = formValues.jadwal;
                                allApplications[index].link_meet = formValues.meet;
                            }
                            fetchApplications(); // Render ulang badge angka
                        });

                } catch (error) {
                    console.error(error);
                    Swal.fire('Error', 'Gagal menyimpan persetujuan.', 'error');
                }
            }
        };

        // FUNGSI TOLAK (REJECT)
        window.rejectApplication = async function(uid) {
            const { value: reason } = await Swal.fire({
                title: 'Kembalikan Berkas (Revisi)',
                input: 'textarea',
                inputLabel: 'Tuliskan alasan spesifik agar siswa bisa memperbaiki:',
                inputPlaceholder: 'Contoh: File kuitansi tidak terbaca, mohon foto ulang dengan jelas...',
                inputAttributes: { 'aria-label': 'Alasan penolakan' },
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: '<i class="fa-solid fa-paper-plane"></i> Kirim Revisi',
                cancelButtonText: 'Batal',
                inputValidator: (value) => {
                    if (!value) return 'Anda wajib menuliskan alasan penolakan!'
                }
            });

            if (reason) {
                try {
                    Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                    
                    await updateDoc(doc(db, 'sidang_applications', uid), {
                        status: 'rejected',
                        reject_reason: reason,
                        rejected_at: serverTimestamp()
                    });

                    Swal.fire('Terkirim!', 'Status dikembalikan ke siswa. Mereka akan diminta mengisi ulang formulir.', 'success')
                        .then(() => {
                            const index = allApplications.findIndex(app => app.id === uid);
                            if(index !== -1) {
                                allApplications[index].status = 'rejected';
                                allApplications[index].reject_reason = reason;
                            }
                            fetchApplications(); 
                        });

                } catch (error) {
                    console.error(error);
                    Swal.fire('Error', 'Gagal mengirim revisi.', 'error');
                }
            }
        };
    </script>
</body>
</html>
