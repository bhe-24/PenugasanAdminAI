<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Sidang - Admin CA</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* --- GAYA DASAR --- */
        :root { 
            --primary: #003366; --accent: #d4af37; --bg: #f4f6f9; 
            --text-dark: #1e293b; --text-gray: #64748b; --danger: #ef4444; 
            --success: #10b981; --warning: #f59e0b;
        }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-dark); padding-bottom: 50px; }
        .container { max-width: 1200px; width: 95%; margin: 0 auto; padding: 25px; }

        /* --- LULUGU (HEADER) NAVY --- */
        .brand-header {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; }

        .header-logo-circle {
            width: 75px; height: 75px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0;
            padding: 12px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite; overflow: hidden;
        }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: #fbbf24;
        }
        .header-greeting {
            font-size: 0.95rem; opacity: 0.9; margin-top: 5px; font-weight: 400; margin-bottom: 0;
        }

        /* --- TOMBOL KEMBALI DI HEADER --- */
        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2; cursor: pointer;
        }
        .btn-back:hover { background: white; color: var(--primary); }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* --- TOMBOL SARINGAN (FILTER BAR) --- */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap;}
        .filter-btn { padding: 10px 20px; border: 1px solid #cbd5e1; background: white; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--text-gray); transition: 0.3s; }
        .filter-btn:hover { background: #f8fafc; color: var(--text-dark);}
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,51,102,0.2);}

        /* --- KARTU DATA PANGAJUAN --- */
        .req-grid { display: flex; flex-direction: column; gap: 20px; }
        .app-card {
            background: white; border-radius: 16px; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .app-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.06); transform: translateY(-2px); border-color: #cbd5e1;}

        .app-card-header {
            padding: 20px 25px; display: flex; align-items: flex-start; justify-content: space-between; gap: 15px;
            border-bottom: 2px dashed #f1f5f9; background: #fafafa;
        }
        .app-title-block h3 { font-size: 1.15rem; font-weight: 700; color: var(--primary); margin: 0 0 6px 0; font-family: 'Aleo', serif;}
        .app-meta { font-size: 0.85rem; color: var(--text-gray); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .npm-chip { background: #e0f2fe; border: 1px solid #bae6fd; padding: 2px 10px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; color: #0284c7; font-weight: 700; }

        /* Lencana Status */
        .s-badge { padding: 6px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .s-badge.t1 { background: #fef9c3; color: #a16207; border: 1px solid #fde68a; }
        .s-badge.t2 { background: #e0e7ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .s-badge.ttd { background: #ffedd5; color: #c2410c; border: 1px solid #fed7aa; }
        .s-badge.acc { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .s-badge.rev { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* Eusi Kartu */
        .app-card-body { padding: 20px 25px; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .detail-item { display: flex; flex-direction: column; gap: 4px; }
        .detail-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; font-weight: 700; }
        .detail-value { font-size: 0.9rem; font-weight: 600; color: var(--text-dark); }

        /* Tumbu Berkas */
        .berkas-row {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;
            padding: 15px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;
        }
        .berkas-row-title { width: 100%; font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;}
        .btn-berkas {
            padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid; transition: 0.2s;
        }
        .btn-berkas.normal { background: white; border-color: #cbd5e1; color: var(--primary); }
        .btn-berkas.normal:hover { background: #eff6ff; border-color: #93c5fd; }
        .btn-berkas.ttd-ok { background: #d1fae5; border-color: #10b981; color: #065f46; }
        .btn-berkas.ttd-ok:hover { background: #a7f3d0; }
        .btn-berkas.kosong { background: #f1f5f9; border-color: #e2e8f0; color: #94a3b8; pointer-events: none; opacity: 0.7; }

        /* Kotak Jadwal & Alesan */
        .jadwal-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #3b82f6;}
        .jadwal-box .j-title { font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .jadwal-box .j-info { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .jadwal-box a { font-size: 0.85rem; color: #2563eb; text-decoration: none; font-weight: 600; }
        .jadwal-box a:hover { text-decoration: underline; }

        .alasan-box { background: #fef2f2; border: 1px solid #fecaca; border-left: 4px solid var(--danger); border-radius: 12px; padding: 15px; margin-bottom: 15px; font-size: 0.85rem; color: #991b1b; }
        .alasan-box strong { display: block; margin-bottom: 5px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--danger);}

        /* Tombol Aksi */
        .app-card-actions {
            padding: 15px 25px; border-top: 1px solid #e2e8f0; background: #f8fafc;
            display: flex; gap: 15px; flex-wrap: wrap;
        }
        .btn-action {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: white; transition: 0.2s; font-family: 'Poppins', sans-serif;
        }
        .btn-action:hover { filter: brightness(0.9); transform: translateY(-2px); }
        .btn-acc1 { background: var(--primary); box-shadow: 0 4px 10px rgba(0,51,102,0.2);}
        .btn-acc-final { background: var(--success); box-shadow: 0 4px 10px rgba(16,185,129,0.2);}
        .btn-tolak { background: var(--danger); box-shadow: 0 4px 10px rgba(239,68,68,0.2);}

        /* --- EMPTY STATE & LOADING --- */
        .empty { text-align: center; padding: 80px 20px; background: white; border-radius: 16px; border: 2px dashed #cbd5e1; color: var(--text-gray);}
        .empty i { font-size: 4rem; color: #e2e8f0; display: block; margin-bottom: 15px; }
        .empty h3 { color: var(--primary); font-size: 1.2rem; font-weight: 700; margin: 0 0 5px 0; font-family: 'Aleo', serif;}
        
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .spin-ring { font-size: 4rem; color: var(--primary); animation: spin 1.5s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .brand-header { flex-direction: column; align-items: flex-start; }
            .btn-back { width: 100%; justify-content: center; margin-top: 10px; }
            .app-card-header { flex-direction: column; }
            .app-card-actions { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fa-solid fa-circle-notch spin-ring"></i>
    <h2 style="color:var(--primary); font-weight:700; font-family: 'Aleo', serif; margin:0;">Memuat Panel Sidang...</h2>
</div>

<div class="container">
    
    <!-- LULUGU (HEADER) -->
    <div class="brand-header">
        <div class="header-content-wrapper">
            <div class="header-logo-circle">
                <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
            </div>
            <div class="header-info">
                <h1 class="header-brand-name">Panel Sidang Naskah</h1>
                <p class="header-greeting">Periksa dan atur persetujuan jadwal sidang siswa.</p>
            </div>
        </div>
        <a href="/admin/index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Dashboard Utama</a>
    </div>

    <!-- SARINGAN DATA (FILTER) -->
    <div class="filter-bar">
        <button class="filter-btn active" onclick="switchTab('t1', this)">Tahap 1: Berkas Awal</button>
        <button class="filter-btn" onclick="switchTab('t2', this)">Tahap 2: Final TTD</button>
        <button class="filter-btn" onclick="switchTab('ttd_wait', this)">Menunggu TTD Siswa</button>
        <button class="filter-btn" onclick="switchTab('acc', this)">Lulus Sidang</button>
        <button class="filter-btn" onclick="switchTab('rev', this)">Direvisi</button>
        <button class="filter-btn" onclick="switchTab('all', this)">Semua Data</button>
    </div>

    <!-- WADAH DATA -->
    <div class="req-grid" id="data-container">
        <!-- Kartu bakal di-render di dieu -->
    </div>

</div>

<script type="module">
    import { db, checkAuth } from "../js/firebase-config.js";
    import { collection, getDocs, doc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let currentUser = null;
    let allApps = [];
    let currentTab = 't1';

    // Konfigurasi Tab Saringan
    const TAB_CONFIG = {
        't1':       { filter: a => a.status === 'pending_tahap1' },
        't2':       { filter: a => a.status === 'pending_tahap2' },
        'ttd_wait': { filter: a => a.status === 'menunggu_ttd' },
        'acc':      { filter: a => a.status === 'approved' },
        'rev':      { filter: a => a.status.startsWith('revisi') },
        'all':      { filter: () => true },
    };

    // ── INIT ──
    window.onload = async () => {
        try {
            // Periksa status login admin
            currentUser = await checkAuth('pengajar');
            if (!currentUser) {
                window.location.href = '/admin/index.html';
                return;
            }
            await fetchApplications();
        } catch(e) {
            console.error(e);
            Swal.fire('Error', 'Gagal terhubung ke database.', 'error');
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    };

    // ── MENGAMBIL DATA ──
    window.fetchApplications = async function() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const q = query(collection(db, 'sidang_applications'), orderBy('timestamp', 'desc'));
            const snap = await getDocs(q);
            allApps = [];

            snap.forEach(d => {
                const app = { ...d.data(), id: d.id };
                // Nyamikeun status lami supados cocog sareng format anyar
                if (app.status === 'acc') app.status = 'approved';
                if (app.status === 'pending' || app.status === 'pending_admin') app.status = 'pending_tahap1';
                if (app.status === 'rejected') app.status = 'revisi_tahap1';
                allApps.push(app);
            });

            renderData();
        } catch(err) {
            console.error(err);
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    };

    // ── BERALIH TAB ──
    window.switchTab = function(tab, btnElement) {
        currentTab = tab;
        document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('active'));
        btnElement.classList.add('active');
        renderData();
    };

    // ── MENAMPILKAN DATA ──
    function renderData() {
        const cfg = TAB_CONFIG[currentTab];
        const filtered = allApps.filter(cfg.filter);
        const container = document.getElementById('data-container');
        
        container.innerHTML = '';

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <i class="fa-solid fa-folder-open"></i>
                    <h3>Tidak ada data pengajuan</h3>
                    <p>Semua pengajuan telah diproses atau belum ada yang masuk.</p>
                </div>`;
            return;
        }

        filtered.forEach(app => container.insertAdjacentHTML('beforeend', buildCard(app)));
    }

    function buildCard(app) {
        const npm = app.npm || app.id.substring(0,8).toUpperCase();
        const ttl = [app.tempat_lahir, app.tgl_lahir].filter(Boolean).join(', ') || '-';

        // ── Lencana Status ──
        const badgeMap = {
            'pending_tahap1': `<span class="s-badge t1"><i class="fa-solid fa-inbox"></i> Tahap 1: Cek Berkas</span>`,
            'menunggu_ttd':   `<span class="s-badge ttd"><i class="fa-solid fa-hourglass-half"></i> Menunggu TTD Siswa</span>`,
            'pending_tahap2': `<span class="s-badge t2"><i class="fa-solid fa-pen-nib"></i> Tahap 2: Cek TTD</span>`,
            'approved':       `<span class="s-badge acc"><i class="fa-solid fa-check-double"></i> Lulus Sidang</span>`,
            'revisi_tahap1':  `<span class="s-badge rev"><i class="fa-solid fa-rotate-left"></i> Revisi Tahap 1</span>`,
            'revisi_tahap2':  `<span class="s-badge rev"><i class="fa-solid fa-rotate-left"></i> Revisi Tahap 2</span>`,
        };
        const badge = badgeMap[app.status] || `<span class="s-badge rev">${app.status}</span>`;

        // ── Tautan Berkas ──
        const lnk = (url, label, icon, cls='normal') => url
            ? `<a href="${url}" target="_blank" class="btn-berkas ${cls}"><i class="fa-solid ${icon}"></i> ${label}</a>`
            : `<span class="btn-berkas kosong"><i class="fa-solid ${icon}"></i> ${label}</span>`;

        const berkasHTML = `
            <div class="berkas-row">
                <div class="berkas-row-title"><i class="fa-brands fa-google-drive"></i> Akses Berkas Google Drive</div>
                ${lnk(app.url_foto, 'Pas Foto', 'fa-image')}
                ${lnk(app.url_khs, 'KHS', 'fa-file-alt')}
                ${lnk(app.url_kuitansi, 'Kuitansi', 'fa-receipt')}
                ${lnk(app.draf_perjanjian, 'Draf Perjanjian', 'fa-file-contract')}
                ${lnk(app.draf_sk, 'Draf SK', 'fa-file-signature')}
                ${lnk(app.url_perjanjian_final, 'TTD Perjanjian', 'fa-signature', 'ttd-ok')}
                ${lnk(app.url_sk_final, 'TTD SK', 'fa-signature', 'ttd-ok')}
            </div>`;

        // ── Jadwal Sidang ──
        const jadwalHTML = app.status === 'approved' ? `
            <div class="jadwal-box">
                <div class="j-title"><i class="fa-regular fa-calendar-check"></i> Jadwal Sidang Ditetapkan</div>
                <div class="j-info"><i class="fa-regular fa-clock"></i> ${app.jadwal_sidang || '-'}</div>
                ${app.link_meet ? `<a href="${app.link_meet}" target="_blank"><i class="fa-solid fa-video"></i> ${app.link_meet}</a>` : ''}
            </div>` : '';

        // ── Alasan Revisi ──
        const revHTML = app.status?.startsWith('revisi') ? `
            <div class="alasan-box">
                <strong>Alasan Dikembalikan (Revisi):</strong>
                ${app.reject_reason || 'Tidak ada alasan yang tercatat.'}
            </div>` : '';

        // ── Tombol Aksi ──
        let actHTML = '';
        if (app.status === 'pending_tahap1') {
            actHTML = `
                <div class="app-card-actions">
                    <button class="btn-action btn-tolak" onclick="tolakApp('${app.id}', 1)"><i class="fa-solid fa-xmark"></i> Tolak & Minta Revisi</button>
                    <button class="btn-action btn-acc1" onclick="accTahap1('${app.id}')"><i class="fa-solid fa-check"></i> Setujui (ACC) — Minta TTD</button>
                </div>`;
        } else if (app.status === 'pending_tahap2') {
            actHTML = `
                <div class="app-card-actions">
                    <button class="btn-action btn-tolak" onclick="tolakApp('${app.id}', 2)"><i class="fa-solid fa-xmark"></i> Tolak TTD</button>
                    <button class="btn-action btn-acc-final" onclick="accFinal('${app.id}')"><i class="fa-solid fa-check-double"></i> Luluskan & Jadwalkan Sidang</button>
                </div>`;
        }

        return `
        <div class="app-card" id="card-${app.id}">
            <div class="app-card-header">
                <div class="app-title-block">
                    <h3>${app.judul_naskah || 'Judul tidak tersedia'}</h3>
                    <div class="app-meta">
                        <span><i class="fa-solid fa-user" style="color:var(--primary);"></i> ${app.nama_lengkap || '-'} ${app.pen_name ? `(${app.pen_name})` : ''}</span>
                        <span class="npm-chip">${npm}</span>
                        <span><i class="fa-regular fa-clock"></i> ${app.timestamp?.toDate ? app.timestamp.toDate().toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'}) : '-'}</span>
                    </div>
                </div>
                ${badge}
            </div>
            <div class="app-card-body">
                <div class="detail-grid">
                    <div class="detail-item"><span class="detail-label">Tempat, Tgl Lahir</span><span class="detail-value">${ttl}</span></div>
                    <div class="detail-item"><span class="detail-label">Asal Komunitas</span><span class="detail-value">${app.instansi || '-'}</span></div>
                    <div class="detail-item"><span class="detail-label">Paket Penerbitan</span><span class="detail-value">${app.paket || '-'}</span></div>
                    <div class="detail-item"><span class="detail-label">Strategi Promosi</span><span class="detail-value">${app.promosi || '-'}</span></div>
                </div>
                ${app.blurb ? `
                <div style="background:#f8fafc; padding:15px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:15px;">
                    <span class="detail-label" style="display:block; margin-bottom:6px;">Sinopsis / Blurb</span>
                    <div style="font-size:0.85rem; color:#475569; line-height:1.6;">${app.blurb}</div>
                </div>
                ` : ''}
                ${berkasHTML}
                ${jadwalHTML}
                ${revHTML}
            </div>
            ${actHTML}
        </div>`;
    }

    // ── AKSI ADMIN ──

    window.accTahap1 = async function(uid) {
        const result = await Swal.fire({
            title: 'Setujui Berkas Awal?',
            html: `<p style="color:#475569; font-size:0.9rem;">Siswa akan menerima pemberitahuan untuk mengunduh dan menandatangani draf dokumen resmi.</p>`,
            icon: 'question', showCancelButton: true,
            confirmButtonColor: '#003366', cancelButtonColor: '#94a3b8',
            confirmButtonText: '<i class="fa-solid fa-check"></i> Ya, Setujui',
            cancelButtonText: 'Batal'
        });
        if (!result.isConfirmed) return;

        Swal.fire({ title: 'Memproses Data...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        await updateDoc(doc(db, 'sidang_applications', uid), { status: 'menunggu_ttd' });
        await Swal.fire({ icon: 'success', title: 'Sukses!', text: 'Status berubah menjadi "Menunggu TTD". Siswa sudah dapat mengunduh draf.', timer: 2500, showConfirmButton: false });
        fetchApplications();
    };

    window.accFinal = async function(uid) {
        const { value: form } = await Swal.fire({
            title: '<i class="fa-solid fa-calendar-check" style="color:#10b981"></i> Luluskan & Jadwalkan',
            html: `
                <div style="text-align:left; display:flex; flex-direction:column; gap:12px; margin-top:10px;">
                    <div>
                        <label style="font-size:0.85rem; font-weight:700; color:#334155; display:block; margin-bottom:6px;">
                            <i class="fa-regular fa-calendar"></i> Jadwal Sidang
                        </label>
                        <input id="swal-jadwal" class="swal2-input" style="width:100%;margin:0; font-size:0.9rem;"
                            placeholder="Contoh: Sabtu, 15 Mei 2026 — 10.00 WIB">
                    </div>
                    <div>
                        <label style="font-size:0.85rem; font-weight:700; color:#334155; display:block; margin-bottom:6px; margin-top:10px;">
                            <i class="fa-solid fa-video"></i> Tautan (Link) Google Meet
                        </label>
                        <input id="swal-meet" type="url" class="swal2-input" style="width:100%;margin:0; font-size:0.9rem;"
                            placeholder="https://meet.google.com/xxx-xxxx-xxx">
                    </div>
                </div>`,
            showCancelButton: true,
            confirmButtonColor: '#10b981', cancelButtonText: 'Batal',
            confirmButtonText: '<i class="fa-solid fa-check-double"></i> Luluskan & Kirim Kartu',
            focusConfirm: false,
            preConfirm: () => {
                const j = document.getElementById('swal-jadwal').value.trim();
                const m = document.getElementById('swal-meet').value.trim();
                if (!j || !m) { Swal.showValidationMessage('Jadwal dan Tautan wajib diisi!'); return false; }
                if (!m.startsWith('http')) { Swal.showValidationMessage('Tautan Meet tidak valid!'); return false; }
                return { jadwal: j, meet: m };
            }
        });

        if (!form) return;
        Swal.fire({ title: 'Memproses Data...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        await updateDoc(doc(db, 'sidang_applications', uid), {
            status: 'approved',
            jadwal_sidang: form.jadwal,
            link_meet: form.meet,
            approved_at: serverTimestamp()
        });
        await Swal.fire({ icon: 'success', title: 'Lulus!', text: 'Kartu Sidang dan jadwal sudah terkirim ke dasbor siswa.', timer: 2500, showConfirmButton: false });
        fetchApplications();
    };

    window.tolakApp = async function(uid, tahap) {
        const { value: reason } = await Swal.fire({
            title: `<i class="fa-solid fa-triangle-exclamation" style="color:#ef4444"></i> Tolak Berkas (Tahap ${tahap})`,
            html: `<p style="font-size:0.85rem;color:#475569;margin-bottom:10px;">Tuliskan catatan khusus yang harus diperbaiki oleh siswa:</p>`,
            input: 'textarea',
            inputPlaceholder: 'Contoh: Foto tidak sesuai dengan ketentuan. Pas foto harus menggunakan latar belakang putih...',
            inputAttributes: { rows: 4 },
            showCancelButton: true,
            confirmButtonColor: '#ef4444', cancelButtonText: 'Batal',
            confirmButtonText: '<i class="fa-solid fa-paper-plane"></i> Kirim Catatan Revisi',
            inputValidator: v => { if (!v?.trim()) return 'Catatan revisi wajib diisi!'; }
        });

        if (!reason) return;
        Swal.fire({ title: 'Memproses Data...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        await updateDoc(doc(db, 'sidang_applications', uid), {
            status: `revisi_tahap${tahap}`,
            reject_reason: reason.trim(),
            rejected_at: serverTimestamp()
        });
        await Swal.fire({ icon: 'success', title: 'Berhasil Terkirim!', text: 'Catatan revisi sudah masuk ke akun siswa.', timer: 2000, showConfirmButton: false });
        fetchApplications();
    };
</script>
</body>
</html>
