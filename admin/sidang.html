<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Redaksi - Sidang Cendekia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root {
            --primary: #003366; --navy-light: #1e3a8a; --accent: #eab308; 
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f8fafc; --text-dark: #334155; --border: #e2e8f0;
        }
        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); padding-bottom: 50px; }
        
        /* NAVBAR */
        .navbar { background: #020617; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000;}
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-brand img { width: 45px; height: 45px; background: white; border-radius: 50%; padding: 2px; }
        .nav-brand h1 { font-family: 'Playfair Display', serif; color: white; font-size: 1.4rem; margin: 0;}
        .nav-brand h1 span { color: var(--accent); }
        .btn-kembali { background: rgba(255,255,255,0.1); color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s;}
        .btn-kembali:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        
        /* HEADER PANEL */
        .panel-header { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;}
        .panel-title h2 { color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; font-family: 'Playfair Display', serif;}
        .panel-title p { color: #64748b; font-size: 0.9rem;}
        
        /* TABS */
        .tabs { display: flex; gap: 10px; background: #e2e8f0; padding: 5px; border-radius: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; border-radius: 8px; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 6px;}
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn:hover:not(.active) { color: var(--primary); }
        .tab-badge { background: var(--danger); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50px; }

        /* DATA GRID & CARDS */
        .data-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .student-card { background: white; border-radius: 16px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 20px; animation: fadeIn 0.4s ease;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px dashed var(--border); padding-bottom: 15px;}
        .student-info h3 { color: var(--primary); font-size: 1.3rem; margin-bottom: 5px;}
        .student-info p { color: #64748b; font-size: 0.85rem; margin: 2px 0; font-weight: 500;}
        .student-info .npm { color: var(--accent); font-family: monospace; font-size: 1rem; font-weight: 700; background: #f8fafc; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);}
        
        .status-badge { padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}

        /* BERKAS & LINK */
        .berkas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border);}
        .berkas-item { display: flex; flex-direction: column; gap: 5px;}
        .berkas-label { font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase;}
        .btn-link { background: white; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; text-decoration: none; color: var(--navy-light); font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s;}
        .btn-link:hover { border-color: var(--navy-light); background: #eff6ff;}
        .btn-link.disabled { opacity: 0.5; pointer-events: none; color: #94a3b8; }
        .btn-link.final-ttd { background: #d1fae5; border-color: #10b981; color: #065f46; }

        /* METADATA TAMBAHAN (SEKARANG LEBIH LENGKAP) */
        .meta-details { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.85rem; color: #475569;}
        .meta-box { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px;}
        .meta-box strong { display: block; color: var(--navy-dark); margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;}
        .meta-box.full { grid-column: 1 / -1; }

        /* ACTION BUTTONS */
        .action-bar { display: flex; gap: 10px; margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 20px;}
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; color: white;}
        .btn-acc { background: var(--success); }
        .btn-acc:hover { background: #059669; transform: translateY(-2px);}
        .btn-reject { background: var(--danger); }
        .btn-reject:hover { background: #dc2626; transform: translateY(-2px);}

        /* EMPTY STATE & LOADING */
        .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 16px; border: 1px dashed #cbd5e1; color: #64748b;}
        .empty-state i { font-size: 3rem; color: #cbd5e1; margin-bottom: 15px;}
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;}
        .spinner { width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .panel-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .tabs { width: 100%; overflow-x: auto; }
            .tab-btn { flex: 1; justify-content: center; white-space: nowrap;}
            .meta-details { grid-template-columns: 1fr; }
            .action-bar { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h3 style="color: var(--primary);">Menarik Data Server...</h3>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <img src="https://imgur.com/5Srjyo4.png" alt="Logo">
            <h1>Panel Redaksi <span>Sidang</span></h1>
        </div>
        <a href="/dashboard/admin.html" class="btn-kembali"><i class="fa-solid fa-arrow-left"></i> Dasbor Utama</a>
    </nav>

    <div class="container">
        <div class="panel-header">
            <div class="panel-title">
                <h2>Validasi Berkas Sidang</h2>
                <p>Kelola evaluasi 2 tahap: Berkas Awal & Dokumen Final (TTD).</p>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('antrean')">
                    <i class="fa-solid fa-inbox"></i> Antrean <span class="tab-badge" id="count-pending">0</span>
                </button>
                <button class="tab-btn" onclick="switchTab('approved')">
                    <i class="fa-solid fa-check-double"></i> Disetujui <span style="margin-left:5px; color:#10b981;" id="count-approved">0</span>
                </button>
                <button class="tab-btn" onclick="switchTab('revisi')">
                    <i class="fa-solid fa-rotate-left"></i> Revisi
                </button>
            </div>
        </div>

        <div class="data-grid" id="data-container">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { db, checkAuth } from "../js/firebase-config.js";
        import { collection, getDocs, doc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let currentUser = null;
        let allApplications = [];
        let currentTab = 'antrean';

        // 1. INISIALISASI
        window.onload = async () => {
            try {
                currentUser = await checkAuth('admin');
                if(!currentUser) {
                    Swal.fire('Akses Ditolak', 'Halaman khusus Redaksi.', 'error').then(()=> window.location.href = '../login.html');
                    return;
                }
                await fetchApplications();
            } catch(e) {
                console.error(e);
                Swal.fire('Error', 'Gagal terhubung ke database.', 'error');
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        };

        // 2. TARIK DATA & NORMALISASI
        async function fetchApplications() {
            try {
                const q = query(collection(db, 'sidang_applications'), orderBy('timestamp', 'desc'));
                const querySnapshot = await getDocs(q);
                
                allApplications = [];
                let pendingCount = 0;
                let approvedCount = 0;

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    data.id = docSnap.id; 
                    
                    // Normalisasi status hantu/lama ke status 2-Tahap baru
                    if(data.status === 'acc') data.status = 'approved';
                    if(data.status === 'pending' || data.status === 'pending_admin') data.status = 'pending_tahap1';
                    if(data.status === 'rejected') data.status = 'revisi_tahap1';
                    
                    // Filter hanya yang berkepentingan
                    if (['pending_tahap1', 'pending_tahap2', 'menunggu_ttd', 'approved', 'revisi_tahap1', 'revisi_tahap2'].includes(data.status)) {
                        allApplications.push(data);
                        
                        if (['pending_tahap1', 'pending_tahap2', 'menunggu_ttd'].includes(data.status)) pendingCount++;
                        if (data.status === 'approved') approvedCount++;
                    }
                });

                document.getElementById('count-pending').innerText = pendingCount;
                document.getElementById('count-approved').innerText = approvedCount;

                renderData();
            } catch (error) {
                console.error("Gagal tarik data:", error);
            }
        }

        // 3. LOGIKA TABS
        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderData();
        }

        // 4. RENDER UI KARTU
        function renderData() {
            const container = document.getElementById('data-container');
            container.innerHTML = '';

            const filteredData = allApplications.filter(app => {
                if(currentTab === 'antrean') return ['pending_tahap1', 'pending_tahap2', 'menunggu_ttd'].includes(app.status);
                if(currentTab === 'approved') return app.status === 'approved';
                if(currentTab === 'revisi') return ['revisi_tahap1', 'revisi_tahap2'].includes(app.status);
            });

            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-folder-open"></i>
                        <h3>Tidak ada data</h3>
                        <p>Belum ada pengajuan untuk kategori ini.</p>
                    </div>`;
                return;
            }

            filteredData.forEach(app => {
                let statusBadge = ''; 
                let actionButtons = '';
                
                // Konfigurasi Badge & Tombol berdasarkan Status
                if(app.status === 'pending_tahap1') {
                    statusBadge = `<span class="status-badge" style="background:#fef3c7; color:#d97706; border:1px solid #fde68a;">Tahap 1: Cek Berkas</span>`;
                    actionButtons = `
                        <div class="action-bar">
                            <button class="btn-action btn-reject" onclick="tolakApplication('${app.id}', 1)"><i class="fa-solid fa-xmark"></i> Tolak Berkas</button>
                            <button class="btn-action btn-acc" onclick="accTahap1('${app.id}')"><i class="fa-solid fa-check"></i> ACC & Minta TTD</button>
                        </div>`;
                } 
                else if(app.status === 'menunggu_ttd') {
                    statusBadge = `<span class="status-badge" style="background:#e0e7ff; color:#1e40af; border:1px solid #bfdbfe;">Menunggu Siswa TTD</span>`;
                }
                else if(app.status === 'pending_tahap2') {
                    statusBadge = `<span class="status-badge" style="background:#fef3c7; color:#d97706; border:1px solid #fde68a;">Tahap 2: Cek Tanda Tangan</span>`;
                    actionButtons = `
                        <div class="action-bar">
                            <button class="btn-action btn-reject" onclick="tolakApplication('${app.id}', 2)"><i class="fa-solid fa-xmark"></i> Tolak TTD</button>
                            <button class="btn-action btn-acc" onclick="accFinal('${app.id}')"><i class="fa-solid fa-check-double"></i> ACC Final & Jadwalkan</button>
                        </div>`;
                }
                else if(app.status === 'approved') {
                    statusBadge = `<span class="status-badge" style="background:#d1fae5; color:#059669; border:1px solid #a7f3d0;">LULUS SIDANG</span>`;
                    actionButtons = `
                        <div style="background:#eff6ff; padding:15px; border-radius:8px; border:1px solid #bfdbfe; margin-top:15px;">
                            <p style="margin:0 0 5px; color:var(--primary); font-weight:700;"><i class="fa-regular fa-calendar-check"></i> Dijadwalkan: ${app.jadwal_sidang}</p>
                            <a href="${app.link_meet}" target="_blank" style="font-size:0.85rem; font-weight:600; color:#2563eb; text-decoration:none;"><i class="fa-solid fa-video"></i> Buka Link Google Meet</a>
                        </div>`;
                }
                else if(app.status.includes('revisi')) {
                    statusBadge = `<span class="status-badge" style="background:#fee2e2; color:#dc2626; border:1px solid #fecaca;">DIKEMBALIKAN</span>`;
                    actionButtons = `
                        <div style="background:#fef2f2; padding:15px; border-radius:8px; border:1px solid #fecaca; margin-top:15px;">
                            <p style="margin:0; font-size:0.85rem; color:#991b1b;"><strong>Alasan Ditolak:</strong><br>${app.reject_reason || 'Tidak ada alasan.'}</p>
                        </div>`;
                }

                // Amankan Tautan Drive
                const linkFoto = app.url_foto ? `<a href="${app.url_foto}" target="_blank" class="btn-link">Foto</a>` : `<span class="btn-link disabled">Kosong</span>`;
                const linkKHS = app.url_khs ? `<a href="${app.url_khs}" target="_blank" class="btn-link">KHS</a>` : `<span class="btn-link disabled">Kosong</span>`;
                const linkKuitansi = app.url_kuitansi ? `<a href="${app.url_kuitansi}" target="_blank" class="btn-link">Kuitansi</a>` : `<span class="btn-link disabled">Kosong</span>`;
                const linkTTD1 = app.url_perjanjian_final ? `<a href="${app.url_perjanjian_final}" target="_blank" class="btn-link final-ttd"><i class="fa-solid fa-signature"></i> Perjanjian (TTD)</a>` : `<span class="btn-link disabled">Perjanjian</span>`;
                const linkTTD2 = app.url_sk_final ? `<a href="${app.url_sk_final}" target="_blank" class="btn-link final-ttd"><i class="fa-solid fa-signature"></i> SK (TTD)</a>` : `<span class="btn-link disabled">SK Sidang</span>`;

                const namaPena = app.pen_name ? `(${app.pen_name})` : '';
                const TTL = (app.tempat_lahir && app.tgl_lahir) ? `${app.tempat_lahir}, ${app.tgl_lahir}` : '-';

                const cardHTML = `
                    <div class="student-card">
                        <div class="card-header">
                            <div class="student-info">
                                <h3>${app.judul_naskah || 'Judul Tidak Tersedia'}</h3>
                                <p><i class="fa-solid fa-user"></i> ${app.nama_lengkap || '-'} ${namaPena} &nbsp;|&nbsp; <span class="npm">${app.npm || app.id.substring(0,8).toUpperCase()}</span></p>
                            </div>
                            <div>${statusBadge}</div>
                        </div>

                        <div class="meta-details">
                            <div class="meta-box"><strong>Tempat, Tgl Lahir:</strong> ${TTL}</div>
                            <div class="meta-box"><strong>Asal Komunitas:</strong> ${app.instansi || '-'}</div>
                            <div class="meta-box"><strong>Paket Penerbitan:</strong> ${app.paket || '-'}</div>
                            <div class="meta-box"><strong>Strategi Promosi:</strong> ${app.promosi || '-'}</div>
                            <div class="meta-box full"><strong>Sinopsis (Blurb):</strong><br><span style="white-space: pre-wrap; line-height: 1.5;">${app.blurb || '-'}</span></div>
                        </div>

                        <div>
                            <p style="font-size:0.85rem; font-weight:700; color:var(--navy-light); margin-bottom:10px;"><i class="fa-brands fa-google-drive"></i> AKSES BERKAS DRIVE:</p>
                            <div class="berkas-grid">
                                ${linkFoto} ${linkKHS} ${linkKuitansi} ${linkTTD1} ${linkTTD2}
                            </div>
                        </div>

                        ${actionButtons}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // ==========================================
        // 5. FUNGSI AKSI ADMIN
        // ==========================================

        window.accTahap1 = async function(uid) {
            Swal.fire({
                title: 'Setujui Berkas Awal?',
                text: "Siswa akan diminta untuk mengunduh dan menandatangani draf PDF.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Ya, ACC'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });
                    await updateDoc(doc(db, 'sidang_applications', uid), { status: 'menunggu_ttd' });
                    Swal.fire('Sukses', 'Status diperbarui ke Menunggu Tanda Tangan.', 'success').then(() => fetchApplications());
                }
            });
        };

        window.accFinal = async function(uid) {
            const { value: formValues } = await Swal.fire({
                title: 'Luluskan & Jadwalkan Sidang',
                html: `
                    <div style="text-align:left;">
                        <label style="font-size:0.9rem; font-weight:600;">Jadwal Sidang Lengkap</label>
                        <input id="swal-jadwal" class="swal2-input" placeholder="Misal: Sabtu, 15 Mei 2026 - 10:00 WIB" style="width:100%; margin:0 0 15px 0;">
                        <label style="font-size:0.9rem; font-weight:600;">Link Google Meet</label>
                        <input id="swal-meet" type="url" class="swal2-input" placeholder="https://meet.google.com/..." style="width:100%; margin:0;">
                    </div>
                `,
                focusConfirm: false, showCancelButton: true, confirmButtonColor: '#10b981', cancelButtonText: 'Batal',
                preConfirm: () => {
                    const j = document.getElementById('swal-jadwal').value; const m = document.getElementById('swal-meet').value;
                    if (!j || !m) { Swal.showValidationMessage('Jadwal & Link wajib diisi!'); return false; }
                    return { jadwal: j, meet: m }
                }
            });

            if (formValues) {
                Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });
                await updateDoc(doc(db, 'sidang_applications', uid), {
                    status: 'approved', jadwal_sidang: formValues.jadwal, link_meet: formValues.meet, approved_at: serverTimestamp()
                });
                Swal.fire('LULUS!', 'Jadwal dan Kartu Sidang telah dikirim ke dasbor siswa.', 'success').then(() => fetchApplications());
            }
        };

        window.tolakApplication = async function(uid, tahap) {
            const { value: reason } = await Swal.fire({
                title: `Tolak Berkas (Tahap ${tahap})`,
                input: 'textarea',
                inputLabel: 'Tuliskan alasan penolakan untuk diperbaiki siswa:',
                inputPlaceholder: 'Contoh: Tanda tangan kurang jelas...',
                showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Kirim Revisi',
                inputValidator: (value) => { if (!value) return 'Wajib menulis alasan!' }
            });

            if (reason) {
                Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });
                await updateDoc(doc(db, 'sidang_applications', uid), {
                    status: `revisi_tahap${tahap}`, reject_reason: reason, rejected_at: serverTimestamp()
                });
                Swal.fire('Terkirim!', 'Permintaan revisi sudah masuk ke akun siswa.', 'success').then(() => fetchApplications());
            }
        };
    </script>
</body>
</html>
