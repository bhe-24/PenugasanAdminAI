<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Redaksi - Sidang Cendekia</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #003366; --navy: #1e3a8a; --accent: #eab308;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f1f5f9; --card: #ffffff; --text: #334155;
            --border: #e2e8f0; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ─── NAVBAR ─── */
        .navbar {
            background: #020617;
            padding: 0 28px;
            height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid var(--accent);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; }
        .nav-brand img { width: 36px; height: 36px; border-radius: 50%; background: white; padding: 2px; }
        .nav-brand h1 { font-family: 'Playfair Display', serif; color: white; font-size: 1.15rem; }
        .nav-brand h1 span { color: var(--accent); }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .btn-nav { background: rgba(255,255,255,0.1); color: white; padding: 7px 14px; border-radius: 7px; text-decoration: none; font-size: 0.82rem; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-nav:hover { background: rgba(255,255,255,0.2); }
        .btn-refresh { cursor: pointer; }

        /* ─── LAYOUT ─── */
        .layout { display: flex; min-height: calc(100vh - 63px); }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 220px; flex-shrink: 0;
            background: white;
            border-right: 1px solid var(--border);
            padding: 20px 0;
            position: sticky; top: 63px; height: calc(100vh - 63px);
            overflow-y: auto;
        }
        .sidebar-section { padding: 6px 16px 4px; font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; }
        .sidebar-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; font-size: 0.88rem; font-weight: 600;
            color: var(--muted); cursor: pointer; transition: 0.15s;
            border-left: 3px solid transparent; position: relative;
        }
        .sidebar-item:hover { background: #f8fafc; color: var(--primary); }
        .sidebar-item.active { background: #eff6ff; color: var(--primary); border-left-color: var(--primary); }
        .sidebar-item i { width: 18px; text-align: center; font-size: 0.9rem; }
        .sidebar-badge {
            margin-left: auto; background: var(--danger); color: white;
            font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
            border-radius: 50px; min-width: 20px; text-align: center;
        }
        .sidebar-badge.green { background: var(--success); }
        .sidebar-badge.yellow { background: var(--warning); color: #020617; }

        /* ─── MAIN CONTENT ─── */
        .main { flex: 1; padding: 24px; overflow: auto; }

        /* ─── STATS BAR ─── */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card {
            background: white; border-radius: 12px; padding: 16px 20px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .stat-icon.orange { background: #fef3c7; color: #d97706; }
        .stat-icon.blue { background: #eff6ff; color: #2563eb; }
        .stat-icon.green { background: #d1fae5; color: #059669; }
        .stat-icon.red { background: #fee2e2; color: #dc2626; }
        .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--primary); line-height: 1; }
        .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

        /* ─── SECTION TITLE ─── */
        .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .section-head h2 { font-size: 1.05rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .section-head .count-pill { background: var(--primary); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 50px; font-weight: 600; }

        /* ─── CARD GRID ─── */
        .card-grid { display: flex; flex-direction: column; gap: 16px; }

        /* ─── PENGAJUAN CARD ─── */
        .app-card {
            background: white; border-radius: 14px; border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            overflow: hidden; animation: fadeUp 0.35s ease;
            transition: box-shadow 0.2s;
        }
        .app-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* Header card */
        .app-card-header {
            padding: 16px 20px 14px;
            display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .app-title-block h3 { font-size: 1.05rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
        .app-title-block .app-meta { font-size: 0.8rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 10px; }
        .app-meta span { display: flex; align-items: center; gap: 4px; }
        .npm-chip { background: #f1f5f9; border: 1px solid var(--border); padding: 1px 8px; border-radius: 4px; font-family: monospace; font-size: 0.82rem; color: var(--primary); font-weight: 700; }

        /* Status badge */
        .s-badge { padding: 5px 12px; border-radius: 50px; font-size: 0.72rem; font-weight: 700; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .s-badge.t1 { background: #fef9c3; color: #a16207; border: 1px solid #fde68a; }
        .s-badge.t2 { background: #e0e7ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .s-badge.ttd { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .s-badge.acc { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .s-badge.rev { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* Body card */
        .app-card-body { padding: 14px 20px; }
        .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
        .detail-item { display: flex; flex-direction: column; gap: 2px; }
        .detail-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; font-weight: 600; }
        .detail-value { font-size: 0.85rem; font-weight: 600; color: #1e293b; }

        /* Blurb */
        .blurb-box {
            background: #f8fafc; border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 14px;
            font-size: 0.82rem; color: #475569; line-height: 1.65;
            margin-bottom: 14px; max-height: 80px; overflow: hidden;
            position: relative;
        }
        .blurb-box.expanded { max-height: none; }
        .blurb-toggle { font-size: 0.75rem; color: var(--navy); cursor: pointer; font-weight: 600; margin-top: 4px; display: inline-block; }

        /* Berkas links */
        .berkas-row {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
            padding: 10px 14px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border);
        }
        .berkas-row-title { width: 100%; font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .btn-berkas {
            padding: 6px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
            border: 1px solid; transition: 0.15s;
        }
        .btn-berkas.normal { background: white; border-color: #cbd5e1; color: var(--navy); }
        .btn-berkas.normal:hover { background: #eff6ff; border-color: var(--navy); }
        .btn-berkas.ttd-ok { background: #d1fae5; border-color: #10b981; color: #065f46; }
        .btn-berkas.kosong { background: #f1f5f9; border-color: #e2e8f0; color: #94a3b8; pointer-events: none; opacity: 0.6; }

        /* Alasan revisi */
        .alasan-box { background: #fef2f2; border: 1px solid #fecaca; border-left: 4px solid var(--danger); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 14px; font-size: 0.82rem; color: #991b1b; }
        .alasan-box strong { display: block; margin-bottom: 3px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; }

        /* Jadwal box (setelah approved) */
        .jadwal-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; }
        .jadwal-box .j-title { font-size: 0.72rem; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .jadwal-box .j-info { font-size: 0.88rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .jadwal-box a { font-size: 0.8rem; color: #2563eb; text-decoration: none; font-weight: 600; }
        .jadwal-box a:hover { text-decoration: underline; }

        /* Action bar */
        .app-card-actions {
            padding: 12px 20px; border-top: 1px solid #f1f5f9;
            display: flex; gap: 10px; background: #fafafa;
        }
        .btn-action {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.88rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            color: white; transition: 0.2s;
        }
        .btn-action:hover { transform: translateY(-1px); }
        .btn-acc1 { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
        .btn-acc1:hover { background: linear-gradient(135deg, #0284c7, #1d4ed8); }
        .btn-acc-final { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-acc-final:hover { background: linear-gradient(135deg, #059669, #047857); }
        .btn-tolak { background: linear-gradient(135deg, #f87171, #ef4444); }
        .btn-tolak:hover { background: linear-gradient(135deg, #ef4444, #dc2626); }

        /* ─── EMPTY STATE ─── */
        .empty { text-align: center; padding: 60px 20px; background: white; border-radius: 14px; border: 1px dashed #cbd5e1; }
        .empty i { font-size: 3rem; color: #cbd5e1; display: block; margin-bottom: 16px; }
        .empty h3 { color: var(--muted); font-size: 1rem; font-weight: 600; }
        .empty p { color: #94a3b8; font-size: 0.85rem; margin-top: 6px; }

        /* ─── LOADING ─── */
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.92);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .spin-ring { width: 52px; height: 52px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .stats-bar { grid-template-columns: 1fr 1fr; }
            .detail-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spin-ring"></div>
    <p style="color:var(--primary); font-weight:600;">Memuat Panel Redaksi...</p>
</div>

<nav class="navbar">
    <div class="nav-brand">
        <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo" onerror="this.style.display='none'">
        <h1>Panel Redaksi <span>Sidang</span></h1>
    </div>
    <div class="nav-right">
        <button class="btn-nav btn-refresh" onclick="fetchApplications()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
        <a href="/dashboard/admin.html" class="btn-nav"><i class="fa-solid fa-arrow-left"></i> Dasbor</a>
    </div>
</nav>

<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-section">Antrean</div>
        <div class="sidebar-item active" onclick="switchTab('t1')" id="tab-t1">
            <i class="fa-solid fa-inbox"></i> Berkas Awal
            <span class="sidebar-badge" id="badge-t1">0</span>
        </div>
        <div class="sidebar-item" onclick="switchTab('t2')" id="tab-t2">
            <i class="fa-solid fa-pen-nib"></i> Final TTD
            <span class="sidebar-badge" id="badge-t2">0</span>
        </div>
        <div class="sidebar-item" onclick="switchTab('ttd_wait')" id="tab-ttd_wait">
            <i class="fa-solid fa-hourglass-half"></i> Tunggu TTD
            <span class="sidebar-badge yellow" id="badge-ttd_wait">0</span>
        </div>
        <div class="sidebar-section" style="margin-top:12px;">Status</div>
        <div class="sidebar-item" onclick="switchTab('acc')" id="tab-acc">
            <i class="fa-solid fa-check-double"></i> Lulus Sidang
            <span class="sidebar-badge green" id="badge-acc">0</span>
        </div>
        <div class="sidebar-item" onclick="switchTab('rev')" id="tab-rev">
            <i class="fa-solid fa-rotate-left"></i> Dikembalikan
            <span class="sidebar-badge" id="badge-rev">0</span>
        </div>
        <div class="sidebar-item" onclick="switchTab('all')" id="tab-all">
            <i class="fa-solid fa-list"></i> Semua Data
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <!-- STATS BAR -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fa-solid fa-inbox"></i></div>
                <div>
                    <div class="stat-num" id="stat-antrean">0</div>
                    <div class="stat-label">Total Antrean</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fa-solid fa-pen-nib"></i></div>
                <div>
                    <div class="stat-num" id="stat-ttd">0</div>
                    <div class="stat-label">Tunggu TTD</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fa-solid fa-graduation-cap"></i></div>
                <div>
                    <div class="stat-num" id="stat-lulus">0</div>
                    <div class="stat-label">Lulus Sidang</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fa-solid fa-rotate-left"></i></div>
                <div>
                    <div class="stat-num" id="stat-revisi">0</div>
                    <div class="stat-label">Dikembalikan</div>
                </div>
            </div>
        </div>

        <!-- DATA CONTAINER -->
        <div class="section-head">
            <h2 id="section-title"><i class="fa-solid fa-inbox"></i> Berkas Awal — Perlu Diperiksa</h2>
            <span class="count-pill" id="section-count">0 pengajuan</span>
        </div>
        <div class="card-grid" id="data-container"></div>
    </main>
</div>

<script type="module">
    import { db, checkAuth } from "../js/firebase-config.js";
    import { collection, getDocs, doc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let currentUser = null;
    let allApps = [];
    let currentTab = 't1';

    const TAB_CONFIG = {
        't1':       { label: 'Berkas Awal — Perlu Diperiksa',     icon: 'fa-inbox',       filter: a => a.status === 'pending_tahap1' },
        't2':       { label: 'Dokumen TTD — Perlu Diverifikasi',   icon: 'fa-pen-nib',     filter: a => a.status === 'pending_tahap2' },
        'ttd_wait': { label: 'Menunggu Tanda Tangan Siswa',        icon: 'fa-hourglass-half', filter: a => a.status === 'menunggu_ttd' },
        'acc':      { label: 'Lulus Sidang',                       icon: 'fa-check-double', filter: a => a.status === 'approved' },
        'rev':      { label: 'Dikembalikan untuk Revisi',          icon: 'fa-rotate-left', filter: a => a.status.startsWith('revisi') },
        'all':      { label: 'Semua Pengajuan',                    icon: 'fa-list',        filter: () => true },
    };

    // ── INIT ──
    window.onload = async () => {
        try {
            currentUser = await checkAuth('admin');
            if (!currentUser) {
                Swal.fire('Akses Ditolak', 'Halaman ini hanya untuk Admin.', 'error')
                    .then(() => window.location.href = '../login.html');
                return;
            }
            await fetchApplications();
        } catch(e) {
            console.error(e);
            Swal.fire('Error', 'Gagal terhubung ke database.', 'error');
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    };

    // ── FETCH DATA ──
    window.fetchApplications = async function() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const q = query(collection(db, 'sidang_applications'), orderBy('timestamp', 'desc'));
            const snap = await getDocs(q);
            allApps = [];

            snap.forEach(d => {
                const app = { ...d.data(), id: d.id };
                // Normalisasi status lama
                if (app.status === 'acc') app.status = 'approved';
                if (app.status === 'pending' || app.status === 'pending_admin') app.status = 'pending_tahap1';
                if (app.status === 'rejected') app.status = 'revisi_tahap1';
                allApps.push(app);
            });

            updateSidebar();
            renderData();
        } catch(err) {
            console.error(err);
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    };

    function updateSidebar() {
        const counts = {
            t1: allApps.filter(a => a.status === 'pending_tahap1').length,
            t2: allApps.filter(a => a.status === 'pending_tahap2').length,
            ttd_wait: allApps.filter(a => a.status === 'menunggu_ttd').length,
            acc: allApps.filter(a => a.status === 'approved').length,
            rev: allApps.filter(a => a.status.startsWith('revisi')).length,
        };
        for (const [key, val] of Object.entries(counts)) {
            const el = document.getElementById(`badge-${key}`);
            if (el) el.innerText = val;
        }
        document.getElementById('stat-antrean').innerText = counts.t1 + counts.t2;
        document.getElementById('stat-ttd').innerText = counts.ttd_wait;
        document.getElementById('stat-lulus').innerText = counts.acc;
        document.getElementById('stat-revisi').innerText = counts.rev;
    }

    // ── TAB SWITCH ──
    window.switchTab = function(tab) {
        currentTab = tab;
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`)?.classList.add('active');
        renderData();
    };

    // ── RENDER ──
    function renderData() {
        const cfg = TAB_CONFIG[currentTab];
        const filtered = allApps.filter(cfg.filter);

        document.getElementById('section-title').innerHTML = `<i class="fa-solid ${cfg.icon}"></i> ${cfg.label}`;
        document.getElementById('section-count').innerText = `${filtered.length} pengajuan`;

        const container = document.getElementById('data-container');
        container.innerHTML = '';

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <i class="fa-solid fa-folder-open"></i>
                    <h3>Tidak ada data di kategori ini</h3>
                    <p>Semua pengajuan sudah diproses atau belum ada yang masuk.</p>
                </div>`;
            return;
        }

        filtered.forEach(app => container.insertAdjacentHTML('beforeend', buildCard(app)));
    }

    function buildCard(app) {
        const npm = app.npm || app.id.substring(0,8).toUpperCase();
        const ttl = [app.tempat_lahir, app.tgl_lahir].filter(Boolean).join(', ') || '-';

        // ── Status badge ──
        const badgeMap = {
            'pending_tahap1': `<span class="s-badge t1"><i class="fa-solid fa-inbox"></i> Tahap 1: Cek Berkas</span>`,
            'menunggu_ttd':   `<span class="s-badge ttd"><i class="fa-solid fa-hourglass-half"></i> Menunggu TTD Siswa</span>`,
            'pending_tahap2': `<span class="s-badge t2"><i class="fa-solid fa-pen-nib"></i> Tahap 2: Cek TTD</span>`,
            'approved':       `<span class="s-badge acc"><i class="fa-solid fa-check-double"></i> Lulus Sidang</span>`,
            'revisi_tahap1':  `<span class="s-badge rev"><i class="fa-solid fa-rotate-left"></i> Revisi T1</span>`,
            'revisi_tahap2':  `<span class="s-badge rev"><i class="fa-solid fa-rotate-left"></i> Revisi T2</span>`,
        };
        const badge = badgeMap[app.status] || `<span class="s-badge rev">${app.status}</span>`;

        // ── Berkas links ──
        const lnk = (url, label, icon, cls='normal') => url
            ? `<a href="${url}" target="_blank" class="btn-berkas ${cls}"><i class="fa-solid ${icon}"></i> ${label}</a>`
            : `<span class="btn-berkas kosong"><i class="fa-solid ${icon}"></i> ${label}</span>`;

        const berkasHTML = `
            <div class="berkas-row">
                <div class="berkas-row-title"><i class="fa-brands fa-google-drive"></i> Akses Berkas Google Drive</div>
                ${lnk(app.url_foto, 'Pas Foto', 'fa-image')}
                ${lnk(app.url_khs, 'KHS', 'fa-file-alt')}
                ${lnk(app.url_kuitansi, 'Kuitansi', 'fa-receipt')}
                ${lnk(app.draf_perjanjian, 'Draf Perjanjian', 'fa-file-contract')}
                ${lnk(app.draf_sk, 'Draf SK', 'fa-file-signature')}
                ${lnk(app.url_perjanjian_final, 'TTD Perjanjian', 'fa-signature', 'ttd-ok')}
                ${lnk(app.url_sk_final, 'TTD SK', 'fa-signature', 'ttd-ok')}
            </div>`;

        // ── Jadwal approved ──
        const jadwalHTML = app.status === 'approved' ? `
            <div class="jadwal-box">
                <div class="j-title"><i class="fa-regular fa-calendar-check"></i> Jadwal Sidang Ditetapkan</div>
                <div class="j-info"><i class="fa-regular fa-clock"></i> ${app.jadwal_sidang || '-'}</div>
                ${app.link_meet ? `<a href="${app.link_meet}" target="_blank"><i class="fa-solid fa-video"></i> ${app.link_meet}</a>` : ''}
            </div>` : '';

        // ── Alasan revisi ──
        const revHTML = app.status?.startsWith('revisi') ? `
            <div class="alasan-box">
                <strong>Alasan Dikembalikan:</strong>
                ${app.reject_reason || 'Tidak ada alasan tercatat.'}
            </div>` : '';

        // ── Action buttons ──
        let actHTML = '';
        if (app.status === 'pending_tahap1') {
            actHTML = `
                <div class="app-card-actions">
                    <button class="btn-action btn-tolak" onclick="tolakApp('${app.id}', 1)"><i class="fa-solid fa-xmark"></i> Tolak & Minta Revisi</button>
                    <button class="btn-action btn-acc1" onclick="accTahap1('${app.id}')"><i class="fa-solid fa-check"></i> ACC — Minta Tanda Tangan</button>
                </div>`;
        } else if (app.status === 'pending_tahap2') {
            actHTML = `
                <div class="app-card-actions">
                    <button class="btn-action btn-tolak" onclick="tolakApp('${app.id}', 2)"><i class="fa-solid fa-xmark"></i> Tolak TTD</button>
                    <button class="btn-action btn-acc-final" onclick="accFinal('${app.id}')"><i class="fa-solid fa-check-double"></i> ACC Final & Jadwalkan Sidang</button>
                </div>`;
        }

        return `
        <div class="app-card" id="card-${app.id}">
            <div class="app-card-header">
                <div class="app-title-block">
                    <h3>${app.judul_naskah || 'Judul tidak tersedia'}</h3>
                    <div class="app-meta">
                        <span><i class="fa-solid fa-user"></i> ${app.nama_lengkap || '-'} ${app.pen_name ? `(${app.pen_name})` : ''}</span>
                        <span class="npm-chip">${npm}</span>
                        <span><i class="fa-regular fa-clock"></i> ${app.timestamp?.toDate ? app.timestamp.toDate().toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'}) : '-'}</span>
                    </div>
                </div>
                ${badge}
            </div>
            <div class="app-card-body">
                <div class="detail-grid">
                    <div class="detail-item"><span class="detail-label">Tempat, Tgl Lahir</span><span class="detail-value">${ttl}</span></div>
                    <div class="detail-item"><span class="detail-label">Asal Komunitas</span><span class="detail-value">${app.instansi || '-'}</span></div>
                    <div class="detail-item"><span class="detail-label">Paket Penerbitan</span><span class="detail-value">${app.paket || '-'}</span></div>
                    <div class="detail-item"><span class="detail-label">Strategi Promosi</span><span class="detail-value">${app.promosi || '-'}</span></div>
                </div>
                ${app.blurb ? `
                <div class="blurb-box" id="blurb-${app.id}">
                    <span class="detail-label" style="margin-bottom:4px; display:block;">Sinopsis / Blurb</span>
                    ${app.blurb}
                </div>
                <span class="blurb-toggle" onclick="toggleBlurb('${app.id}')"><i class="fa-solid fa-chevron-down"></i> Tampilkan selengkapnya</span>
                ` : ''}
                ${berkasHTML}
                ${jadwalHTML}
                ${revHTML}
            </div>
            ${actHTML}
        </div>`;
    }

    window.toggleBlurb = function(id) {
        const box = document.getElementById(`blurb-${id}`);
        const toggle = box?.nextElementSibling;
        if (!box) return;
        const expanded = box.classList.toggle('expanded');
        if (toggle) toggle.innerHTML = expanded
            ? '<i class="fa-solid fa-chevron-up"></i> Sembunyikan'
            : '<i class="fa-solid fa-chevron-down"></i> Tampilkan selengkapnya';
    };

    // ── AKSI ADMIN ──

    window.accTahap1 = async function(uid) {
        const result = await Swal.fire({
            title: 'ACC Berkas Awal?',
            html: `<p style="color:#475569; font-size:0.9rem;">Siswa akan menerima notifikasi untuk mengunduh dan menandatangani draf dokumen resmi.</p>`,
            icon: 'question', showCancelButton: true,
            confirmButtonColor: '#2563eb', cancelButtonColor: '#94a3b8',
            confirmButtonText: '<i class="fa-solid fa-check"></i> Ya, ACC & Minta TTD',
            cancelButtonText: 'Batal'
        });
        if (!result.isConfirmed) return;

        Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        await updateDoc(doc(db, 'sidang_applications', uid), { status: 'menunggu_ttd' });
        await Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Status diubah ke "Menunggu Tanda Tangan". Siswa sudah bisa unduh draf.', timer: 2000, showConfirmButton: false });
        fetchApplications();
    };

    window.accFinal = async function(uid) {
        const { value: form } = await Swal.fire({
            title: '<i class="fa-solid fa-calendar-check" style="color:#10b981"></i> Luluskan & Jadwalkan',
            html: `
                <div style="text-align:left; display:flex; flex-direction:column; gap:12px; margin-top:10px;">
                    <div>
                        <label style="font-size:0.82rem; font-weight:700; color:#334155; display:block; margin-bottom:4px;">
                            <i class="fa-regular fa-calendar"></i> Jadwal Sidang
                        </label>
                        <input id="swal-jadwal" class="swal2-input" style="width:100%;margin:0;"
                            placeholder="Contoh: Sabtu, 15 Mei 2026 — 10.00 WIB">
                    </div>
                    <div>
                        <label style="font-size:0.82rem; font-weight:700; color:#334155; display:block; margin-bottom:4px;">
                            <i class="fa-solid fa-video"></i> Link Google Meet
                        </label>
                        <input id="swal-meet" type="url" class="swal2-input" style="width:100%;margin:0;"
                            placeholder="https://meet.google.com/xxx-xxxx-xxx">
                    </div>
                </div>`,
            showCancelButton: true,
            confirmButtonColor: '#10b981', cancelButtonText: 'Batal',
            confirmButtonText: '<i class="fa-solid fa-check-double"></i> Luluskan & Kirim Kartu',
            focusConfirm: false,
            preConfirm: () => {
                const j = document.getElementById('swal-jadwal').value.trim();
                const m = document.getElementById('swal-meet').value.trim();
                if (!j || !m) { Swal.showValidationMessage('Jadwal dan Link wajib diisi!'); return false; }
                if (!m.startsWith('http')) { Swal.showValidationMessage('Link Meet tidak valid!'); return false; }
                return { jadwal: j, meet: m };
            }
        });

        if (!form) return;
        Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        await updateDoc(doc(db, 'sidang_applications', uid), {
            status: 'approved',
            jadwal_sidang: form.jadwal,
            link_meet: form.meet,
            approved_at: serverTimestamp()
        });
        await Swal.fire({ icon: 'success', title: 'Lulus!', text: 'Kartu Sidang dan jadwal sudah terkirim ke dasbor siswa.', timer: 2500, showConfirmButton: false });
        fetchApplications();
    };

    window.tolakApp = async function(uid, tahap) {
        const { value: reason } = await Swal.fire({
            title: `<i class="fa-solid fa-triangle-exclamation" style="color:#ef4444"></i> Tolak Berkas (Tahap ${tahap})`,
            html: `<p style="font-size:0.85rem;color:#475569;margin-bottom:8px;">Tuliskan catatan spesifik yang harus diperbaiki siswa:</p>`,
            input: 'textarea',
            inputPlaceholder: 'Contoh: Foto tidak sesuai ketentuan. Pas foto harus menggunakan latar putih...',
            inputAttributes: { rows: 4 },
            showCancelButton: true,
            confirmButtonColor: '#ef4444', cancelButtonText: 'Batal',
            confirmButtonText: '<i class="fa-solid fa-paper-plane"></i> Kirim Catatan Revisi',
            inputValidator: v => { if (!v?.trim()) return 'Catatan revisi wajib diisi!'; }
        });

        if (!reason) return;
        Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        await updateDoc(doc(db, 'sidang_applications', uid), {
            status: `revisi_tahap${tahap}`,
            reject_reason: reason.trim(),
            rejected_at: serverTimestamp()
        });
        await Swal.fire({ icon: 'success', title: 'Terkirim!', text: 'Catatan revisi sudah masuk ke akun siswa.', timer: 2000, showConfirmButton: false });
        fetchApplications();
    };
</script>
</body>
</html>
