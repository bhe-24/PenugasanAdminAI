<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Siswa & Nilai - Admin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --primary: #003366; --accent: #28a745; --bg: #f4f7f6; --text: #333; --danger: #dc3545; --warning: #f59e0b; }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 3px solid var(--primary); padding-bottom: 15px; background: #fff; padding: 20px; border-radius: 12px; }
        .page-header h2 { margin: 0; color: var(--primary); font-size: 1.6rem; display: flex; align-items: center; gap: 10px; }

        .search-box { display: flex; gap: 10px; margin-bottom: 25px; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; max-width: 60%; }
        .form-control { width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; }
        .form-control:focus { border-color: var(--primary); }

        #list-siswa { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 25px; align-items: start; }
        .student-card { background: white; border: 1px solid #e0e0e0; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; position: relative; }
        .student-card.inactive { border: 2px solid #fca5a5; background-color: #fef2f2; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .student-name { font-size: 1.25rem; color: var(--primary); margin: 0 0 5px 0; font-weight: 700; }
        
        .ips-badge { background: var(--primary); color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em;}
        .badge-danger { background: var(--danger); font-size: 0.75rem; padding: 4px 10px; }

        .nilai-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 15px; }
        .input-wrapper { display: flex; flex-direction: column; text-align: center; }
        .input-wrapper label { font-size: 0.65rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        .nilai-input { text-align: center; padding: 10px 5px; border: 2px solid #e0e0e0; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1rem; color: #444; }
        
        .ujian { background-color: #f3e5f5; border-color: #e1bee7; color: #4a148c; }
        .naskah { background-color: #f5f3ff; border-color: #c4b5fd; color: #6d28d9; }
        
        .extra-nilai-btn { width: 100%; background: #f8fafc; border: 1px dashed #cbd5e1; padding: 8px; border-radius: 8px; color: #64748b; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        .extra-nilai-container { display: none; background: #fffbeb; padding: 15px; border-radius: 8px; border: 1px solid #fde68a; margin-bottom: 20px; }
        .extra-nilai-container.show { display: block; }
        .nilai-input.tambahan { background-color: #fff; border-color: #fcd34d; color: #b45309; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-secondary { background: #f1f5f9; color: #334155; }
        .btn-primary { background: var(--primary); }
        .card-actions { display: flex; gap: 10px; flex-wrap: wrap;}
        .btn-save { flex: 1; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-khs { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .khs-open { background: var(--accent); } .khs-closed { background: var(--danger); }
        .btn-delete { padding: 12px 15px; background: white; color: var(--danger); border: 2px solid #fca5a5; border-radius: 8px; cursor: pointer; }

        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 20px; background: #fff; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 12px; opacity: 0; animation: slideIn 0.3s forwards; }
        .toast.success { border-left: 5px solid #28a745; color: #333; }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(50px); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h2><i class="fa-solid fa-users-gear"></i> Data Siswa & Nilai</h2>
            <a href="index.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
        </div>
        
        <div class="search-box">
            <input type="text" id="search" class="form-control" oninput="window.searchSiswa()" placeholder="Cari nama siswa..." autocomplete="off">
        </div>

        <div id="list-siswa"></div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
            authDomain: "mading-cf676.firebaseapp.com", 
            projectId: "mading-cf676", 
            storageBucket: "mading-cf676.firebasestorage.app", 
            messagingSenderId: "72175203671", 
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allStudents = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) loadData();
            else signInAnonymously(auth);
        });

        async function loadData() {
            try {
                const q = query(collection(db, 'users'), where('role', '==', 'siswa'));
                const snap = await getDocs(q);
                allStudents = [];
                snap.forEach(d => allStudents.push({id: d.id, ...d.data()}));
                allStudents.sort((a,b) => (a.name || "").localeCompare(b.name || ""));
                render(allStudents);
            } catch(e) {}
        }

        window.searchSiswa = () => {
            const key = document.getElementById('search').value.toLowerCase();
            const filtered = allStudents.filter(s => (s.name && s.name.toLowerCase().includes(key)));
            render(filtered);
        };

        window.updateSemester = async (uid, val) => {
            await updateDoc(doc(db, 'users', uid), { semester: parseInt(val) || 1 });
            loadData(); 
        };

        window.toggleTambahan = (uid) => {
            document.getElementById(`extra-${uid}`).classList.toggle('show');
        };

        // AUTO-SAVE NILAI EXTRA (TANPA OVERWRITE T1-T8 LAGI AGAR NILAI SPESIFIK AI TETAP AMAN)
        window.autoSaveExtra = async (uid, fieldName, value) => {
            try {
                let updateData = {};
                updateData[`nilai_${fieldName}`] = value.trim() === '' ? null : parseFloat(value.trim());
                await updateDoc(doc(db, 'users', uid), updateData);
                showToast(`✓ Tersimpan`, 'success');
            } catch(e) {}
        };

        function render(list) {
            let htmlBuffer = ''; 
            list.forEach(u => {
                const n = u; 
                const ips = parseFloat(u.ips||0).toFixed(2);
                const isSem3 = (u.semester == 3);

                let totalTugasTerisi = 0;
                for(let i=1; i<=8; i++) if (n[`nilai_t${i}`] !== undefined && n[`nilai_t${i}`] !== null) totalTugasTerisi++;
                const isInactive = totalTugasTerisi < 5 && !isSem3;
                
                // LABEL 10 KOMPONEN SPESIFIK AI UNTUK SEMESTER 3
                const lT1 = isSem3 ? 'Ide & Orisinalitas' : 'T1';
                const lT2 = isSem3 ? 'Struktur Alur' : 'T2';
                const lT3 = isSem3 ? 'Karakter' : 'T3';
                const lT4 = isSem3 ? 'Genre & Tone' : 'T4';
                const lT5 = isSem3 ? 'Teknik & Pacing' : 'T5';
                const lT6 = isSem3 ? 'Gaya Bahasa' : 'T6';
                const lT7 = isSem3 ? 'Kekuatan Dialog' : 'T7';
                const lT8 = isSem3 ? 'Plot Hole' : 'T8';
                const lUTS = isSem3 ? 'Resolusi Konflik' : 'UTS';
                const lUAS = isSem3 ? 'PUEBI & Teknis' : 'UAS';
                
                const colClass = isSem3 ? 'naskah' : ''; 
                
                htmlBuffer += `
                    <div class="student-card ${isInactive ? 'inactive' : ''}" id="card-${u.id}">
                        <div class="card-header">
                            <div>
                                <h3 class="student-name">${u.name}</h3>
                                ${isSem3 ? '<span class="ips-badge" style="background:#8b5cf6;"><i class="fa-solid fa-wand-magic-sparkles"></i> Mode Detail Naskah (Sem 3)</span>' : ''}
                            </div>
                            <div style="text-align:right">
                                <span class="ips-badge">IPS: ${ips}</span>
                                <div style="margin-top:5px; font-size:0.85rem; font-weight:bold;">Sem: <input type="number" value="${u.semester||1}" style="width:50px;" onchange="window.updateSemester('${u.id}', this.value)"></div>
                            </div>
                        </div>
                        
                        <div class="nilai-grid">
                            ${renderInput(u.id, 't1', lT1, n.nilai_t1, false, colClass)}
                            ${renderInput(u.id, 't2', lT2, n.nilai_t2, false, colClass)}
                            ${renderInput(u.id, 't3', lT3, n.nilai_t3, false, colClass)}
                            ${renderInput(u.id, 't4', lT4, n.nilai_t4, false, colClass)}
                            ${renderInput(u.id, 't5', lT5, n.nilai_t5, false, colClass)}
                            ${renderInput(u.id, 't6', lT6, n.nilai_t6, false, colClass)}
                            ${renderInput(u.id, 't7', lT7, n.nilai_t7, false, colClass)}
                            ${renderInput(u.id, 't8', lT8, n.nilai_t8, false, colClass)}
                            ${renderInput(u.id, 'uts', lUTS, n.nilai_uts, !isSem3, colClass)}
                            ${renderInput(u.id, 'uas', lUAS, n.nilai_uas, !isSem3, colClass)}
                        </div>

                        <button class="extra-nilai-btn" onclick="window.toggleTambahan('${u.id}')">
                            <i class="fa-solid fa-star" style="color:#f59e0b;"></i> Input Tambahan / Naskah Rata-Rata
                        </button>
                        <div id="extra-${u.id}" class="extra-nilai-container">
                            <div class="nilai-grid" style="grid-template-columns: repeat(3, 1fr);">
                                ${renderInputAuto(u.id, 'extra1', 'Kuis/Keaktifan', n.nilai_extra1)}
                                ${renderInputAuto(u.id, 'extra2', 'Tugas Tambahan', n.nilai_extra2)}
                                ${renderInputAuto(u.id, 'naskah', 'Naskah (Avg)', n.nilai_naskah, true)}
                            </div>
                        </div>

                        <div class="card-actions">
                            <button class="btn-save" onclick="window.save('${u.id}')"><i class="fa-solid fa-calculator"></i> Simpan Nilai & Hitung IPS</button>
                            <button class="btn-khs ${u.akses_khs ? 'khs-open' : 'khs-closed'}" onclick="window.toggleKHS('${u.id}', ${u.akses_khs})">
                                ${u.akses_khs ? 'KHS Terbuka' : 'KHS Terkunci'}
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('list-siswa').innerHTML = htmlBuffer;
        }

        function renderInput(uid, key, label, val, isExam=false, customClass="") {
            return `
                <div class="input-wrapper">
                    <label>${label}</label>
                    <input type="number" id="${key}-${uid}" value="${val!==undefined && val!==null ? val : ''}" class="nilai-input ${isExam ? 'ujian' : ''} ${customClass}">
                </div>
            `;
        }

        function renderInputAuto(uid, key, label, val, isFromNaskah=false) {
            return `
                <div class="input-wrapper">
                    <label>${label}</label>
                    <input type="number" id="${key}-${uid}" value="${val!==undefined && val!==null ? val : ''}" class="nilai-input tambahan ${isFromNaskah ? 'naskah' : ''}" onblur="window.autoSaveExtra('${uid}', '${key}', this.value)">
                </div>
            `;
        }

        window.toggleKHS = async (uid, cur) => {
            await updateDoc(doc(db, 'users', uid), { akses_khs: !cur });
            loadData(); 
        };

        window.save = async (uid) => {
            try {
                let data = {};
                let sumT = 0, countT = 0;
                
                for(let i=1; i<=8; i++) {
                    let val = document.getElementById(`t${i}-${uid}`).value;
                    let num = val ? parseFloat(val) : 0;
                    data[`nilai_t${i}`] = val ? num : null;
                    if(val) { sumT += num; countT++; }
                }
                
                let scoreT = (countT > 0 ? (sumT / countT) : 0) * 0.40;
                let scoreUTS = (parseFloat(document.getElementById(`uts-${uid}`).value) || 0) * 0.25;
                let scoreUAS = (parseFloat(document.getElementById(`uas-${uid}`).value) || 0) * 0.25;

                let ex1 = document.getElementById(`extra1-${uid}`).value ? parseFloat(document.getElementById(`extra1-${uid}`).value) : null;
                let ex2 = document.getElementById(`extra2-${uid}`).value ? parseFloat(document.getElementById(`extra2-${uid}`).value) : null;
                let naskah = document.getElementById(`naskah-${uid}`).value ? parseFloat(document.getElementById(`naskah-${uid}`).value) : null;
                data['nilai_extra1'] = ex1; data['nilai_extra2'] = ex2; data['nilai_naskah'] = naskah;

                let exVals = [ex1, ex2, naskah].filter(v => v !== null);
                let scoreEx = (exVals.length > 0 ? (exVals.reduce((a,b)=>a+b,0) / exVals.length) : 0) * 0.10;

                let final = scoreT + scoreUTS + scoreUAS + scoreEx;
                if(final > 100) final = 100;
                
                data['ips'] = (final / 100) * 4;
                await updateDoc(doc(db,'users',uid), data);
                
                showToast(`Berhasil! IPS: ${data['ips'].toFixed(2)}`, 'success');
                setTimeout(() => loadData(), 500); 
            } catch(e) {
                showToast("Gagal menyimpan.", 'error');
            }
        };

        function showToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
    </script>
</body>
</html>
