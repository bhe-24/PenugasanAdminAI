<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurasi Redaksi - Admin Cendekia</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. GLOBAL & RESET --- */
        :root { --primary: #003366; --accent: #1d4ed8; --bg: #f8fafc; --text: #334155; --danger: #ef4444; --warning: #f59e0b; --ai: #8b5cf6;}
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent;}
        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px; 
            padding-top: 110px; /* Kompensasi header fixed */
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* --- 2. HEADER BRANDED NAVY (FIXED & FULL WIDTH) --- */
        .brand-header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 15px 5%; box-shadow: 0 4px 20px rgba(0, 31, 63, 0.4);
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
            box-sizing: border-box; overflow: hidden;
            border-bottom: 4px solid var(--accent);
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: 0;
            width: 250px; height: 250px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; flex: 1;}

        .header-logo-circle {
            width: 60px; height: 60px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0;
            padding: 10px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite; overflow: hidden;
        }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; flex: 1;}
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.6rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: white;
        }
        .header-greeting { font-size: 0.9rem; opacity: 0.9; margin-top: 2px; font-weight: 400; margin-bottom: 0; color: #bae6fd; }

        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2;
        }
        .btn-back:hover { background: white; color: var(--primary); }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* --- FILTER TABS --- */
        .filter-tabs { display: flex; gap: 15px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: white; border: 1px solid #cbd5e1; padding: 10px 25px; border-radius: 50px; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.3s; white-space: nowrap; font-family: 'Poppins'; }
        .tab-btn:hover { background: #f1f5f9; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(0, 51, 102, 0.2); }

        /* --- GRID ARTIKEL --- */
        .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .art-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.3s; position: relative; overflow: hidden;}
        .art-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-color: #cbd5e1; }
        
        .art-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e2e8f0; }
        .art-author { font-size: 0.85rem; color: #64748b; display: flex; align-items: center; gap: 8px; }
        .art-author i { color: var(--accent); }
        .art-date { font-size: 0.75rem; color: #94a3b8; margin-top: 3px; }
        
        .badge { padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        .badge-pending { background: #fef08a; color: #9a3412; }
        .badge-published { background: #dcfce7; color: #166534; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }

        .art-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--primary); margin: 0 0 10px 0; line-height: 1.3; }
        .art-category { font-size: 0.8rem; font-weight: 600; color: #1d4ed8; background: #eff6ff; padding: 4px 12px; border-radius: 6px; display: inline-block; margin-bottom: 20px; }

        /* ACTION BUTTONS */
        .action-group { display: flex; gap: 10px; margin-top: auto; }
        .btn-action { flex: 1; border: none; padding: 12px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; font-family: 'Poppins'; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .btn-read { background: #f1f5f9; color: #475569; }
        .btn-read:hover { background: #e2e8f0; color: var(--primary); }

        /* --- MODAL WORKSPACE EDITOR (BACA & EDIT ARTIKEL) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 31, 63, 0.7); backdrop-filter: blur(5px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box { background: #f8fafc; width: 95%; max-width: 950px; height: 90vh; border-radius: 20px; display: flex; flex-direction: column; transform: translateY(20px); transition: 0.3s; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.3); border: 1px solid #cbd5e1;}
        .modal-overlay.active .modal-box { transform: translateY(0); }
        
        .modal-header { padding: 20px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: white; }
        .modal-header h3 { margin: 0; color: var(--primary); font-family: 'Playfair Display', serif; font-size: 1.5rem;}
        .btn-close { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; color: #64748b; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        .btn-close:hover { background: #fee2e2; color: var(--danger); }
        
        .modal-body { padding: 30px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        /* Editor Image Preview */
        #prev-image-wrapper { text-align: center; margin-bottom: 15px; }
        #prev-image-wrapper img { max-width: 100%; max-height: 300px; border-radius: 12px; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* Panel AI Editor */
        .ai-toolbox { background: linear-gradient(to right, #f5f3ff, #ede9fe); border: 1px solid #ddd6fe; padding: 20px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.05); }
        .ai-toolbox-title { font-weight: 700; color: #6d28d9; display: flex; align-items: center; gap: 8px; width: 100%; font-size: 1rem;}
        .ai-input { flex: 1; min-width: 250px; padding: 12px 15px; border: 1px solid #c4b5fd; border-radius: 8px; font-family: 'Poppins'; font-size: 0.9rem; outline: none; transition: 0.3s;}
        .ai-input:focus { border-color: var(--ai); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
        .btn-ai { background: var(--ai); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Poppins'; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;}
        .btn-ai:hover { background: #7c3aed; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); }
        .btn-ai:disabled { background: #a78bfa; cursor: not-allowed; }

        /* Content Editable Area */
        .content-editor-wrapper { background: white; border: 1px solid #cbd5e1; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; flex: 1; min-height: 300px; transition: 0.3s;}
        .content-editor-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.1); }
        
        .editor-content { 
            padding: 25px; flex: 1; outline: none; font-size: 1.05rem; line-height: 1.8; color: #334155; 
            overflow-y: auto; background: white; min-height: 300px;
        }
        .editor-content p { margin-bottom: 1.2em; margin-top: 0;}
        .editor-content ul, .editor-content ol { margin-bottom: 1.2em; padding-left: 20px;}
        
        .modal-footer { padding: 20px 30px; border-top: 1px solid #e2e8f0; background: white; display: flex; justify-content: flex-end; gap: 15px; flex-wrap: wrap; }
        
        .btn-foot { padding: 12px 25px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; font-family: 'Poppins'; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center;}
        .btn-publish { background: #10b981; color: white; box-shadow: 0 4px 10px rgba(16,185,129,0.2);}
        .btn-publish:hover { background: #059669; transform: translateY(-2px);}
        .btn-save-draft { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0,51,102,0.2);}
        .btn-save-draft:hover { background: #001f3f; transform: translateY(-2px);}
        .btn-reject { background: #fee2e2; color: var(--danger); border: 1px solid #fca5a5;}
        .btn-reject:hover { background: var(--danger); color: white; }
        
        .btn-foot:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important;}

        /* TOAST & LOADER */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; transform: translateX(120%); opacity: 0; transition: all 0.3s; font-weight: 600; font-size: 0.9rem; border-left: 4px solid var(--accent); }
        .toast.show { transform: translateX(0); opacity: 1; }

        @media (max-width: 768px) {
            body { padding-top: 90px; }
            .brand-header { padding: 12px 20px; gap: 10px; flex-direction: row; align-items: center; }
            .header-logo-circle { width: 45px; height: 45px; padding: 6px;}
            .header-brand-name { font-size: 1.3rem; }
            .header-greeting { display: none; }
            .btn-back { width: 40px; height: 40px; padding: 0; justify-content: center; margin: 0; margin-left: auto; }
            .btn-back span { display: none; }
            .btn-back i { margin: 0; font-size: 1.1rem; }

            .article-grid { grid-template-columns: 1fr; }
            .modal-box { width: 100%; height: 100%; border-radius: 0; max-width: 100%; }
            .modal-body { padding: 15px; }
            .modal-footer { padding: 15px; flex-direction: column; }
            .btn-foot { width: 100%; }
            .ai-toolbox { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <!-- HEADER FIXED Penuh -->
    <header class="brand-header">
        <div class="header-content-wrapper">
            <div class="header-logo-circle">
                <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
            </div>
            <div class="header-info">
                <h1 class="header-brand-name">Kurasi Redaksi</h1>
                <div class="header-greeting">Tinjau, perbaiki (AI), dan terbitkan naskah Mading.</div>
            </div>
        </div>
        <a href="redaksi.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> <span>Pusat Pantau</span>
        </a>
    </header>

    <!-- EDITOR & PREVIEW MODAL -->
    <div id="preview-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="prev-title">Judul Artikel</h3>
                <button class="btn-close" onclick="closePreview()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="modal-body">
                <div id="prev-image-wrapper"></div>
                
                <div class="ai-toolbox">
                    <div class="ai-toolbox-title"><i class="fa-solid fa-wand-magic-sparkles"></i> Asisten Editor AI</div>
                    <input type="text" id="ai-instruction" class="ai-input" placeholder="Perintah (opsional): Perpanjang cerita, buat lebih dramatis...">
                    <button class="btn-ai" id="btn-edit-ai" onclick="enhanceWithAI()">
                        <i class="fa-solid fa-robot"></i> Rombak Naskah
                    </button>
                </div>

                <div class="content-editor-wrapper">
                    <!-- Teks naskah yang bisa diedit manual oleh Admin -->
                    <div id="prev-content" class="editor-content" contenteditable="true"></div>
                </div>
            </div>
            
            <div class="modal-footer" id="prev-actions">
                <!-- Tombol aksi akan dirender via JS -->
            </div>
        </div>
    </div>

    <div class="container">
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="setFilter('pending', this)">Menunggu Kurasi</button>
            <button class="tab-btn" onclick="setFilter('published', this)">Telah Terbit</button>
            <button class="tab-btn" onclick="setFilter('rejected', this)">Ditolak/Turun</button>
        </div>

        <div id="article-grid" class="article-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #94a3b8;">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary);"></i><br><br>Memuat naskah...
            </div>
        </div>
    </div>

    <script type="module">
        import { db, checkAuth } from "../js/firebase-config.js";
        import { collection, query, orderBy, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let allArticles = [];
        let currentFilter = 'pending';
        let activeArticleId = null;

        // --- FUNGSI TOAST ---
        window.showToast = (message, type = "success") => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const iconClass = type === 'error' ? 'fa-xmark' : (type === 'info' ? 'fa-info-circle' : 'fa-check');
            const iconColor = type === 'error' ? '#ef4444' : (type === 'info' ? '#3b82f6' : '#10b981');
            toast.innerHTML = `<i class="fa-solid ${iconClass}" style="color: ${iconColor};"></i> <span>${message}</span>`;
            if(type === 'error') toast.style.borderLeftColor = '#ef4444';
            if(type === 'info') toast.style.borderLeftColor = '#3b82f6';
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr.toDate ? dateStr.toDate() : dateStr);
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
        };

        (async () => {
            const user = await checkAuth('pengajar');
            if(user) {
                loadData();
            } else {
                window.location.href = '../index.html';
            }
        })();

        // --- MEMUAT DATA NASKAH ---
        async function loadData() {
            try {
                const q = query(collection(db, 'articles'), orderBy('timestamp', 'desc'));
                const snap = await getDocs(q);
                allArticles = [];
                snap.forEach(d => allArticles.push({id: d.id, ...d.data()}));
                renderArticles();
            } catch(e) {
                console.error(e);
                document.getElementById('article-grid').innerHTML = '<p style="color:red; text-align:center;">Gagal memuat data draf artikel.</p>';
            }
        }

        // --- FILTERING TABS ---
        window.setFilter = (filterVal, btnElement) => {
            currentFilter = filterVal;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderArticles();
        };

        // --- RENDER GRID ---
        function renderArticles() {
            const container = document.getElementById('article-grid');
            container.innerHTML = '';
            
            const filtered = allArticles.filter(a => a.status === currentFilter);

            if(filtered.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; color: #888; padding: 60px 20px; background:white; border-radius:16px; border:2px dashed #cbd5e1;">
                        <i class="fa-regular fa-folder-open" style="font-size: 4rem; margin-bottom: 15px; color:#cbd5e1;"></i>
                        <h3 style="margin:0; color:#64748b;">Tidak ada naskah</h3>
                    </div>`; 
                return;
            }

            let htmlBuffer = '';

            filtered.forEach(a => {
                let badgeHtml = '';
                if(a.status === 'pending') badgeHtml = `<span class="badge badge-pending">Menunggu Review</span>`;
                if(a.status === 'published') badgeHtml = `<span class="badge badge-published">Terbit</span>`;
                if(a.status === 'rejected') badgeHtml = `<span class="badge badge-rejected">Ditolak</span>`;

                htmlBuffer += `
                    <div class="art-card">
                        <div class="art-header">
                            <div class="art-author">
                                <i class="fa-solid fa-user-pen"></i>
                                <div>
                                    <strong style="color: var(--text-dark);">${a.authorName}</strong>
                                    <div class="art-date">${formatDate(a.timestamp)}</div>
                                </div>
                            </div>
                            ${badgeHtml}
                        </div>
                        
                        <div class="art-category">${a.category}</div>
                        <h3 class="art-title">${a.title}</h3>
                        
                        <div class="action-group">
                            <button onclick="window.previewArticle('${a.id}')" class="btn-action btn-read"><i class="fa-solid fa-pen-nib"></i> Buka Editor</button>
                            <a href="/mading/index.html?id=${a.id}" target="_blank" class="btn-action" style="background:#f1f5f9; color:#475569; flex:0.3;" title="Lihat di Mading Publik"><i class="fa-solid fa-link"></i></a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlBuffer;
        }

        // --- MODAL EDITOR INTERAKTIF ---
        window.previewArticle = (id) => {
            activeArticleId = id;
            const article = allArticles.find(a => a.id === id);
            if(!article) return;

            document.getElementById('prev-title').innerText = article.title;
            
            // Format Gambar
            const imgWrapper = document.getElementById('prev-image-wrapper');
            if(article.imageUrl) {
                imgWrapper.innerHTML = `<img src="${article.imageUrl}" alt="Cover" onerror="this.style.display='none'">`;
            } else {
                imgWrapper.innerHTML = '';
            }

            // Isi Editor Teks
            document.getElementById('prev-content').innerHTML = article.content;
            
            // Reset Input AI
            document.getElementById('ai-instruction').value = '';

            // Tombol Aksi di Modal (Publish / Simpan / Tolak)
            const actionsContainer = document.getElementById('prev-actions');
            actionsContainer.innerHTML = '';

            if (article.status === 'pending' || article.status === 'rejected') {
                actionsContainer.innerHTML += `<button onclick="window.saveChangesAndChangeStatus('published')" class="btn-foot btn-publish"><i class="fa-solid fa-paper-plane"></i> Simpan & Terbitkan</button>`;
            }
            if (article.status === 'published') {
                // Jika sudah terbit, kita bisa update perubahannya saja
                actionsContainer.innerHTML += `<button onclick="window.saveChangesAndChangeStatus('published')" class="btn-foot btn-save-draft"><i class="fa-solid fa-floppy-disk"></i> Update Naskah</button>`;
            }
            if (article.status === 'pending' || article.status === 'published') {
                actionsContainer.innerHTML += `<button onclick="window.saveChangesAndChangeStatus('rejected')" class="btn-foot btn-reject"><i class="fa-solid fa-ban"></i> Tolak / Turunkan</button>`;
            }

            document.getElementById('preview-modal').classList.add('active');
        };

        window.closePreview = () => {
            document.getElementById('preview-modal').classList.remove('active');
            activeArticleId = null;
        };

        // --- FUNGSI EDIT / PERPANJANG CERITA DENGAN AI ---
        window.enhanceWithAI = async () => {
            const article = allArticles.find(a => a.id === activeArticleId);
            const currentContent = document.getElementById('prev-content').innerHTML.trim();
            const instruction = document.getElementById('ai-instruction').value.trim();

            if (!currentContent) return window.showToast("Konten kosong, tidak ada yang bisa diedit.", "error");

            const btnAI = document.getElementById('btn-edit-ai');
            const originalBtnHtml = btnAI.innerHTML;
            
            btnAI.disabled = true;
            btnAI.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Merombak Naskah...';
            window.showToast("AI sedang memproses permintaan Anda...", "info");

            try {
                // Panggil Endpoint AI Vercel
                const response = await fetch('/api/edit-artikel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: currentContent,
                        title: article.title,
                        category: article.category,
                        instruction: instruction
                    })
                });

                if (!response.ok) throw new Error("Gagal terhubung ke sistem AI.");
                
                const apiData = await response.json();
                
                // Perbarui layar editor dengan hasil AI
                document.getElementById('prev-content').innerHTML = apiData.result;
                window.showToast("Naskah berhasil dirombak oleh AI! Silakan periksa kembali.");

            } catch (error) {
                console.error("AI Enhancement Error:", error);
                window.showToast("Gagal memproses dengan AI: " + error.message, "error");
            } finally {
                btnAI.disabled = false;
                btnAI.innerHTML = originalBtnHtml;
            }
        };

        // --- UBAH STATUS DAN SIMPAN PERUBAHAN TEKS ---
        window.saveChangesAndChangeStatus = async (newStatus) => {
            const btnText = newStatus === 'published' ? 'menerbitkan' : (newStatus === 'rejected' ? 'menolak/menurunkan' : 'memperbarui');
            if(!confirm(`Apakah Anda yakin ingin ${btnText} artikel ini?`)) return;

            // Ambil teks terbaru dari Editor
            const updatedContent = document.getElementById('prev-content').innerHTML.trim();

            // Disable all footer buttons to prevent double click
            const footerBtns = document.querySelectorAll('#prev-actions .btn-foot');
            footerBtns.forEach(btn => btn.disabled = true);

            try {
                await updateDoc(doc(db, 'articles', activeArticleId), {
                    status: newStatus,
                    content: updatedContent // Simpan hasil editan admin/AI
                });
                
                window.closePreview();
                window.showToast(newStatus === 'published' ? "Artikel berhasil disimpan & diterbitkan!" : "Artikel ditolak/diturunkan.", newStatus === 'published' ? 'success' : 'error');
                
                // Refresh Data 
                loadData(); 

            } catch (e) {
                alert("Gagal memproses: " + e.message);
                footerBtns.forEach(btn => btn.disabled = false);
            }
        };

    </script>
</body>
</html>
