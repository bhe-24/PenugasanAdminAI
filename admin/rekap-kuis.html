<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Nilai Kuis - Admin CA</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLE GLOBAL --- */
        :root { --primary: #003366; --accent: #4361ee; --bg: #f4f6f9; --text-dark: #1e293b; --text-gray: #64748b;}
        * { box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text-dark); margin: 0; padding-bottom: 50px; }
        
        .container { max-width: 1200px; width: 95%; margin: 0 auto; padding: 25px; }

        /* --- HEADER BRANDED NAVY --- */
        .brand-header {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; }

        .header-logo-circle {
            width: 75px; height: 75px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0;
            padding: 12px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite; overflow: hidden;
        }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: #fbbf24;
        }
        .header-greeting {
            font-size: 0.95rem; opacity: 0.9; margin-top: 5px; font-weight: 400; margin-bottom: 0; color: #e2e8f0;
        }

        /* --- TOMBOL KEMBALI DI HEADER --- */
        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2;
        }
        .btn-back:hover { background: white; color: var(--primary); }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* ACCORDION CARD (REKAP KUIS) */
        .rekap-item { 
            margin-bottom: 20px; border-radius: 16px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; 
            background: white; transition: 0.3s;
        }
        .rekap-item:hover { border-color: #cbd5e1; box-shadow: 0 8px 25px rgba(0,0,0,0.06); transform: translateY(-2px);}
        
        .rekap-head {
            padding: 20px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            background: white; transition: 0.2s; user-select: none;
        }
        .rekap-head:hover { background: #f8fafc; }
        .rekap-head.active { background: #f0fdfa; border-bottom: 1px solid #ccfbf1; }
        
        .rh-info { display: flex; flex-direction: column; gap: 6px; }
        .rh-info h4 { margin: 0; font-size: 1.25rem; color: var(--primary); font-weight: 700; font-family: 'Aleo', serif;}
        .rh-info p { margin: 0; font-size: 0.9rem; color: var(--text-gray); display: flex; align-items: center; gap: 8px; font-weight: 500;}
        .rh-badge { background: #e0f2fe; color: #0284c7; padding: 4px 12px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;}
        
        .fa-chevron-down { transition: transform 0.3s ease; color: #94a3b8; font-size: 1.2rem; }
        .rekap-head.active .fa-chevron-down { transform: rotate(180deg); color: #0d9488; }
        
        /* CONTENT (TABLE AREA) */
        .rekap-body { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, padding 0.4s ease;
            background: #f8fafc; padding: 0 25px; 
        }
        .rekap-body.show { max-height: 1000px; padding: 25px; overflow-y: auto; }

        /* STATS BAR DALAM BODY */
        .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;}
        .stat-box { background: white; border: 1px solid #e2e8f0; padding: 12px 20px; border-radius: 12px; display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--text-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
        .stat-box i { color: #0284c7; font-size: 1.3rem; }

        /* TABEL NILAI */
        .table-container { background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: var(--text-gray); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px;}
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f1f5f9; }
        
        .score-good { color: #166534; font-weight: 700; background: #dcfce7; padding: 6px 14px; border-radius: 50px; display: inline-block;}
        .score-bad { color: #991b1b; font-weight: 700; background: #fee2e2; padding: 6px 14px; border-radius: 50px; display: inline-block;}
        .empty-msg { text-align: center; padding: 40px; color: var(--text-gray); font-size: 1rem; border: 2px dashed #cbd5e1; border-radius: 16px; background: white;}

        @media (max-width: 600px) {
            .brand-header { flex-direction: column; align-items: flex-start; }
            .btn-back { width: 100%; justify-content: center; margin-top: 10px; }
            .header-logo-circle { width: 60px; height: 60px; padding: 10px; }
            .header-brand-name { font-size: 1.4rem; }
            .stats-bar { flex-direction: column; gap: 10px;}
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER BARU -->
        <div class="brand-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-info">
                    <h1 class="header-brand-name">Rekap Nilai Kuis</h1>
                    <p class="header-greeting">Klik pada nama kuis untuk melihat daftar nilai siswa.</p>
                </div>
            </div>
            <!-- TOMBOL KEMBALI MENGARAH KE KUIS.HTML -->
            <a href="kuis.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Kuis</a>
        </div>

        <div id="loading" style="text-align:center; padding:50px; color: var(--text-gray);">
            <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color:var(--primary); margin-bottom: 15px;"></i>
            <p style="font-weight: 500;">Memuat Data Rekapan...</p>
        </div>
        
        <div id="rekap-list"></div>
    </div>

    <script type="module">
        import { db, checkAuth } from "../js/firebase-config.js";
        import { collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        (async () => {
            const user = await checkAuth('pengajar');
            if(user) loadQuizzes();
            else window.location.href = '../index.html';
        })();

        async function loadQuizzes() {
            const container = document.getElementById('rekap-list');
            try {
                const qQuizzes = query(collection(db, 'quizzes'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(qQuizzes);
                
                document.getElementById('loading').style.display = 'none';

                if(snap.empty) {
                    container.innerHTML = '<div class="empty-msg"><i class="fa-solid fa-folder-open fa-3x" style="color:#cbd5e1; margin-bottom:15px;"></i><br>Belum ada kuis yang diterbitkan.</div>';
                    return;
                }

                snap.forEach(d => {
                    const data = d.data();
                    const html = `
                        <div class="rekap-item">
                            <div class="rekap-head" onclick="window.toggleDetail('${d.id}', this)">
                                <div class="rh-info">
                                    <h4>${data.judul}</h4>
                                    <p>
                                        <span class="rh-badge">${data.mapel}</span>
                                        <i class="fa-solid fa-list-check"></i> ${data.questions ? data.questions.length : 0} Butir Soal
                                    </p>
                                </div>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                            
                            <div class="rekap-body" id="body-${d.id}">
                                <div style="text-align:center; padding:30px;"><i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color:#94a3b8;"></i></div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
            } catch(e) { 
                console.error(e); 
                container.innerHTML = '<div class="empty-msg" style="color: #ef4444; border-color: #fca5a5; background: #fef2f2;">Terjadi kesalahan saat memuat data.</div>';
                document.getElementById('loading').style.display = 'none';
            }
        }

        // FUNGSI ANIMASI BUKA TUTUP (ACCORDION)
        window.toggleDetail = async (quizId, headerEl) => {
            const body = document.getElementById(`body-${quizId}`);
            const isClosed = !body.classList.contains('show');
            
            // Tutup semua accordion yang sedang terbuka agar rapi
            document.querySelectorAll('.rekap-body').forEach(el => el.classList.remove('show')); 
            document.querySelectorAll('.rekap-head').forEach(el => el.classList.remove('active'));
            
            // Buka yang diklik
            if(isClosed) {
                headerEl.classList.add('active');
                body.classList.add('show');
                
                // Ambil Data Firestore (Hanya jika belum di-load sebelumnya)
                if(!body.getAttribute('data-loaded')) {
                    try {
                        const q = query(collection(db, 'quiz_results'), where('quizId', '==', quizId));
                        const snap = await getDocs(q);
                        
                        if(snap.empty) {
                            body.innerHTML = '<div style="text-align:center; padding:30px; color:#64748b; font-style:italic;">Belum ada siswa yang mengerjakan kuis ini.</div>';
                        } else {
                            let rows = '';
                            let totalScore = 0;
                            let count = 0;

                            // Sort secara lokal berdasarkan nama siswa A-Z
                            const results = [];
                            snap.forEach(d => results.push(d.data()));
                            results.sort((a,b) => (a.studentName || "").localeCompare(b.studentName || ""));

                            results.forEach(res => {
                                const scoreClass = res.score >= 70 ? 'score-good' : 'score-bad';
                                const date = res.submittedAt ? new Date(res.submittedAt.seconds * 1000).toLocaleString('id-ID', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '-';
                                
                                rows += `
                                    <tr>
                                        <td style="font-weight:600; color:var(--text-dark);">${res.studentName || 'Siswa Tanpa Nama'}</td>
                                        <td style="color:var(--text-gray);"><i class="fa-regular fa-clock"></i> ${date}</td>
                                        <td><span class="${scoreClass}">${res.score}</span></td>
                                    </tr>
                                `;
                                totalScore += parseInt(res.score);
                                count++;
                            });

                            const avgScore = Math.round(totalScore / count);
                            
                            // Render Hasil ke dalam Tabel dan Stats Bar
                            body.innerHTML = `
                                <div class="stats-bar">
                                    <div class="stat-box"><i class="fa-solid fa-users"></i> Total Mengerjakan: ${count} Siswa</div>
                                    <div class="stat-box"><i class="fa-solid fa-star"></i> Nilai Rata-rata: ${avgScore}</div>
                                </div>
                                <div class="table-container">
                                    <table>
                                        <thead><tr><th>Nama Lengkap Siswa</th><th>Waktu Pengumpulan</th><th>Nilai Akhir</th></tr></thead>
                                        <tbody>${rows}</tbody>
                                    </table>
                                </div>
                            `;
                        }
                        body.setAttribute('data-loaded', 'true'); // Tandai agar tidak loading ulang saat dibuka lagi
                    } catch(e) {
                        body.innerHTML = '<p style="color:#ef4444; text-align:center;">Gagal memuat daftar nilai.</p>';
                        console.error(e);
                    }
                }
            }
        }
    </script>
</body>
</html>
