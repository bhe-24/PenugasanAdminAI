<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengajar - Cendekia Aksara</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-pdfmake/browser.js"></script>

    <style>
        :root { --primary: #003366; --accent: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #333; }
        
        /* DIPERLEBAR AGAR FULL LAPTOP */
        .container { width: 95%; max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        .page-header { background: #fff; padding: 25px 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { margin: 0; color: var(--primary); font-family: 'Playfair Display', serif; font-size: 1.8rem;}
        
        .grid-panel { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .grid-panel { grid-template-columns: 1fr; } }

        .panel-card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .panel-title { color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-top: 0; margin-bottom: 25px; font-weight: 600; font-size: 1.4rem; display: flex; align-items: center; gap: 10px;}
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; color: #555; }
        .form-control { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Poppins'; font-size: 1rem;}
        .form-control:focus { border-color: var(--primary); outline: none; }

        .btn { padding: 15px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; color: white; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; justify-content: center; }
        .btn-full { width: 100%; }
        .btn-ai { background: linear-gradient(135deg, #8f00ff, #4a148c); margin-top: 10px; }
        .btn-pdf { background: var(--accent); color: #fff; margin-top: 20px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .btn-primary { background: var(--primary); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.1);}
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none;}

        .ebook-list { margin-top: 30px; background: #f8fafc; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
        .gaji-box { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 25px; border-radius: 8px; margin-top: 30px; text-align: center; }
        .gaji-box h3 { margin: 10px 0; color: #166534; font-size: 2.2rem; }

        /* LOADING SUPERIOR */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.3s;}
        
        /* Area HTML RPP Hasil AI (Tetap Ditampilkan di Layar jika mau, atau disembunyikan) */
        #ai-result-area { font-size: 11pt; line-height: 1.6; margin-top: 30px; padding: 20px; background: white; border-radius: 8px; border: 1px solid #e2e8f0; display: none;}
    </style>
</head>
<body>

    <div id="loading-overlay">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 3rem; color: #003366;"></i>
        <p id="loading-text" style="margin-top: 15px; font-weight: bold; color: #333;">Mengambil Data Guru...</p>
    </div>

    <div class="container">
        <div class="page-header">
            <h2><i class="fa-solid fa-chalkboard-user"></i> Portal Pengajar</h2>
            <a href="index.html" class="btn btn-primary" style="text-decoration:none; width: auto;"><i class="fa-solid fa-arrow-left"></i> Dasbor Admin</a>
        </div>

        <div class="grid-panel">
            <div class="panel-card">
                <h3 class="panel-title"><i class="fa-solid fa-robot"></i> Asisten Modul & RPP AI</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Pilih Semester</label>
                        <select id="input-semester" class="form-control">
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mata Pelajaran / Modul</label>
                        <select id="input-mapel" class="form-control">
                            <option value="Seni Menemukan Cerita">Seni Menemukan Cerita</option>
                            <option value="Seni Menghidupkan Dunia">Seni Menghidupkan Dunia</option>
                            <option value="Seni Menjalin Peristiwa">Seni Menjalin Peristiwa</option>
                            <option value="Seni Memoles Naskah">Seni Memoles Naskah</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Fokus Capaian & Topik Khusus</label>
                    <input type="text" id="input-topik" class="form-control" placeholder="Contoh: Menulis cerpen dengan sudut pandang orang ketiga...">
                </div>

                <button id="btn-generate" class="btn btn-full btn-ai" onclick="generateRPP()">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Susun RPP Detail
                </button>

                <div class="ebook-list">
                    <strong><i class="fa-solid fa-book"></i> Referensi E-Book Semester Ini:</strong>
                    <ul style="padding-left: 20px; margin-bottom: 0; font-size: 1rem; line-height: 1.8;">
                        <li><a href="#">Buku Panduan Pengajar Cendekia (PDF)</a></li>
                        <li><a href="#">Modul Kreatif - Cetakan Berjalan</a></li>
                    </ul>
                </div>

                <div id="ai-result-area"></div>

                <button id="btn-download-pdf" class="btn btn-full btn-pdf" style="display:none;" onclick="unduhRPP()">
                    <i class="fa-solid fa-file-pdf"></i> Unduh Dokumen (PDF)
                </button>
            </div>

            <div class="panel-card">
                <h3 class="panel-title"><i class="fa-solid fa-id-card"></i> Administrasi & Honor</h3>
                
                <div class="form-group">
                    <label>Pilih Guru / Pengajar (@ac.id)</label>
                    <select id="select-pengajar" class="form-control" onchange="hitungGaji(this.value)">
                        <option value="">-- Pilih Guru --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Mata Pelajaran Ampuan</label>
                    <input type="text" id="display-mapel" class="form-control" value="Seni Menemukan Cerita" readonly style="background:#f8fafc;">
                </div>
                
                <div class="gaji-box">
                    <p style="margin:0 0 5px 0; color:#15803d; font-size:1rem; font-weight:bold;">Honorarium (Rp 5.000/Sesi)</p>
                    <h3 id="slip-gaji">Rp 0</h3>
                    <p id="info-sesi" style="margin:5px 0 0 0; font-size:0.9rem; color:#166534;">Total Mengajar: 0 Sesi</p>
                </div>
            </div>
        </div>
    </div>

    <span id="pdf-mapel" style="display:none;"></span>
    <span id="pdf-sem-topik" style="display:none;"></span>
    <span id="pdf-pengajar" style="display:none;">-</span>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
            authDomain: "mading-cf676.firebaseapp.com", 
            projectId: "mading-cf676", 
            storageBucket: "mading-cf676.firebasestorage.app", 
            messagingSenderId: "72175203671", 
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Helper: Convert Image URL to Base64
        async function getBase64ImageFromUrl(imageUrl) {
            try {
                const response = await fetch(imageUrl, { mode: 'cors' });
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                return null;
            }
        }

        // 1. AMBIL GURU REALTIME
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const qGuru = query(collection(db, 'users'), where('role', '==', 'admin'));
                    const snapGuru = await getDocs(qGuru);
                    const select = document.getElementById('select-pengajar');
                    
                    snapGuru.forEach(doc => {
                        const data = doc.data();
                        if(data.email && data.email.includes('@ac.id')) {
                            const option = document.createElement('option');
                            option.value = doc.id; 
                            option.text = data.name || "Guru Tanpa Nama";
                            option.dataset.name = data.name;
                            select.appendChild(option);
                        }
                    });
                    document.getElementById('loading-overlay').style.display = 'none';
                } catch (e) {
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            } else {
                window.location.href = '../index.html';
            }
        });

        document.getElementById('input-mapel').addEventListener('change', function() {
            document.getElementById('display-mapel').value = this.value;
        });

        // 2. HITUNG GAJI DARI PRESENSI
        window.hitungGaji = async (guruUid) => {
            if(!guruUid) {
                document.getElementById('slip-gaji').innerText = "Rp 0";
                document.getElementById('info-sesi').innerText = "Total Mengajar: 0 Sesi";
                document.getElementById('pdf-pengajar').innerText = "-";
                return;
            }

            const select = document.getElementById('select-pengajar');
            document.getElementById('pdf-pengajar').innerText = select.options[select.selectedIndex].dataset.name;
            document.getElementById('slip-gaji').innerText = "Menghitung...";

            try {
                const qSesi = query(collection(db, 'presensi_logs'), where('guruUid', '==', guruUid));
                const snapSesi = await getDocs(qSesi);
                
                const totalSesi = snapSesi.size; 
                const tarifPerSesi = 5000;
                
                document.getElementById('slip-gaji').innerText = "Rp " + (totalSesi * tarifPerSesi).toLocaleString('id-ID');
                document.getElementById('info-sesi').innerText = `Total Mengajar: ${totalSesi} Sesi | Periode Ini`;
            } catch (e) {
                document.getElementById('slip-gaji').innerText = "Belum Ada Presensi";
            }
        };

        // 3. GENERATE RPP
        window.generateRPP = async () => {
            const btn = document.getElementById('btn-generate');
            const btnPdf = document.getElementById('btn-download-pdf');
            const resultArea = document.getElementById('ai-result-area');
            
            const mapel = document.getElementById('input-mapel').value;
            const semester = document.getElementById('input-semester').value;
            const topik = document.getElementById('input-topik').value || "Pendalaman Materi Lanjutan";
            const guruDipilih = document.getElementById('select-pengajar').value;

            if(!guruDipilih) return alert("Pilih nama Pengajar terlebih dahulu agar RPP tercatat atas nama beliau!");

            document.getElementById('pdf-mapel').innerText = mapel;
            document.getElementById('pdf-sem-topik').innerText = `Semester ${semester} - ${topik}`;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyusun RPP Detail...';
            btnPdf.style.display = 'none';
            resultArea.style.display = 'none';

            document.getElementById('loading-text').innerText = "AI sedang menyusun CP, TP, dan Skenario...";
            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                const response = await fetch('/api/generate-rpp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mapel, semester, topik })
                });

                if (!response.ok) throw new Error("Gagal mengambil data dari AI");
                const data = await response.json();

                // Masukkan hasil HTML ke layar
                resultArea.innerHTML = data.htmlRpp; 
                resultArea.style.display = 'block';
                
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Selesai Disusun';
                btnPdf.style.display = 'flex'; 

            } catch (error) {
                alert("Gagal memproses AI. Pastikan file API di Vercel sudah diupdate.");
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Coba Lagi';
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
                setTimeout(() => { if(!btn.disabled) return; btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Susun Ulang RPP'; }, 4000);
            }
        };

        // 4. UNDUH PDF MURNI TEKS (PDFMAKE)
        window.unduhRPP = async () => {
            const btn = document.getElementById('btn-download-pdf');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Membangun PDF...';
            
            try {
                // Konversi logo
                const logoBase64 = await getBase64ImageFromUrl("https://i.imgur.com/5Srjyo4.png");
                
                // Ambil HTML RPP mentah dari AI dan konversi ke PDFMake format
                const rawHtml = document.getElementById('ai-result-area').innerHTML;
                const convertedHtml = htmlToPdfmake(rawHtml);

                const docDefinition = {
                    pageSize: 'A4',
                    pageMargins: [40, 40, 40, 40],
                    content: [
                        // KOP SURAT
                        {
                            table: {
                                widths: ['auto', '*'],
                                body: [
                                    [
                                        logoBase64 ? { image: logoBase64, width: 60, margin: [0, 0, 15, 0], border: [false, false, false, true] } : { text: '', border: [false, false, false, true] },
                                        {
                                            stack: [
                                                { text: 'RANCANGAN PELAKSANAAN PEMBELAJARAN (RPP)', fontSize: 16, bold: true, color: '#003366', margin: [0, 5, 0, 5] },
                                                { text: 'Komunitas Literasi Cendekia Aksara', fontSize: 12, color: '#d4af37', bold: true }
                                            ],
                                            border: [false, false, false, true],
                                            alignment: 'left'
                                        }
                                    ]
                                ]
                            },
                            margin: [0, 0, 0, 20]
                        },
                        // META DATA (Mata Pelajaran, Guru, dll)
                        {
                            table: {
                                widths: [120, 'auto', '*'],
                                body: [
                                    [{ text: 'Mata Pelajaran', bold: true }, ':', document.getElementById('pdf-mapel').innerText],
                                    [{ text: 'Semester / Topik', bold: true }, ':', document.getElementById('pdf-sem-topik').innerText],
                                    [{ text: 'Nama Pengajar', bold: true }, ':', document.getElementById('pdf-pengajar').innerText],
                                    [{ text: 'Durasi Pertemuan', bold: true }, ':', '80 Menit']
                                ]
                            },
                            layout: 'noBorders',
                            margin: [0, 0, 0, 25]
                        },
                        // HASIL AI (Dikonversi dari HTML)
                        convertedHtml
                    ],
                    styles: {
                        // html-to-pdfmake akan mewarisi style default ini
                        html: { fontSize: 11, lineHeight: 1.5, color: '#333' }
                    }
                };

                // Cetak dan Unduh
                pdfMake.createPdf(docDefinition).download(`RPP_${document.getElementById('pdf-mapel').innerText}.pdf`);
            } catch (error) {
                alert("Terjadi kesalahan saat memproses PDF.");
                console.error(error);
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-file-pdf"></i> Unduh Dokumen (PDF)';
            }
        };
    </script>
</body>
</html>
