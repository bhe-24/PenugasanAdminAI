<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pengajar - Cendekia Aksara</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <style>
        :root {
            --primary: #003366;
            --primary-light: #004d99;
            --accent: #d4af37;
            --accent-light: #f0d878;
            --bg: #eef2f7;
            --card: #ffffff;
            --border: #dde3ed;
            --text: #1a2640;
            --text-muted: #5a6a82;
            --success: #16a34a;
            --success-bg: #f0fdf4;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            padding-bottom: 60px;
            color: var(--text);
        }

        /* ── LOADING OVERLAY ── */
        #loading-overlay {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.96);
            z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 16px;
            transition: opacity 0.3s;
        }
        .loader-ring {
            width: 56px; height: 56px;
            border: 5px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text { font-weight: 600; color: var(--primary); font-size: 1rem; }

        /* ── LAYOUT ── */
        .container { width: 95%; max-width: 1600px; margin: 0 auto; padding: 24px; }

        /* ── HEADER ── */
        .page-header {
            background: var(--primary);
            padding: 20px 36px;
            border-radius: 14px;
            margin-bottom: 28px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 24px rgba(0,51,102,0.25);
        }
        .page-header h2 {
            margin: 0; color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem; letter-spacing: 0.3px;
        }
        .page-header h2 span { color: var(--accent); }

        /* ── GRID ── */
        .grid-panel { display: grid; grid-template-columns: 2fr 1fr; gap: 28px; }
        @media (max-width: 960px) { .grid-panel { grid-template-columns: 1fr; } }

        .panel-card {
            background: var(--card);
            padding: 36px;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }

        .panel-title {
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 14px;
            margin: 0 0 28px 0;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex; align-items: center; gap: 10px;
        }
        .panel-title i { color: var(--accent); font-size: 1.1rem; }

        /* ── FORM ── */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 0.82rem;
            font-weight: 600; margin-bottom: 7px;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-control {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-family: 'Poppins'; font-size: 0.95rem;
            color: var(--text);
            background: #fafbfd;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,51,102,0.12);
            outline: none; background: #fff;
        }
        .form-control[readonly] { background: #f1f4f8; color: var(--text-muted); cursor: not-allowed; }

        /* ── BUTTONS ── */
        .btn {
            padding: 14px 24px; border-radius: 9px; border: none;
            font-weight: 600; cursor: pointer; font-size: 0.95rem; color: white;
            display: inline-flex; align-items: center; gap: 9px;
            justify-content: center; transition: all 0.2s;
            letter-spacing: 0.2px;
        }
        .btn-full { width: 100%; }
        .btn-ai {
            background: linear-gradient(135deg, var(--primary) 0%, #005baa 100%);
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(0,51,102,0.3);
        }
        .btn-pdf {
            background: linear-gradient(135deg, #b8860b 0%, var(--accent) 100%);
            margin-top: 22px;
            box-shadow: 0 4px 14px rgba(212,175,55,0.35);
        }
        .btn-nav { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.4); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.07); }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; filter: none; }

        /* ── REFERENSI BUKU ── */
        .ebook-list {
            margin-top: 28px;
            background: #f8fafc;
            padding: 18px 22px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
        }
        .ebook-list strong { font-size: 0.9rem; color: var(--primary); }
        .ebook-list ul { padding-left: 18px; margin: 10px 0 0 0; }
        .ebook-list li { font-size: 0.9rem; line-height: 2; }
        .ebook-list a { color: var(--primary-light); text-decoration: none; }
        .ebook-list a:hover { text-decoration: underline; }

        /* ── HONOR BOX ── */
        .gaji-box {
            background: var(--success-bg);
            border: 1.5px solid #bbf7d0;
            padding: 28px 24px;
            border-radius: 12px;
            margin-top: 28px;
            text-align: center;
        }
        .gaji-box .label { margin: 0 0 8px 0; color: var(--success); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .gaji-box .amount { margin: 0; color: #14532d; font-size: 2.3rem; font-weight: 700; font-family: 'Playfair Display', serif; }
        .gaji-box .info { margin: 10px 0 0 0; font-size: 0.85rem; color: #166534; }

        /* ── AI RESULT (hidden, jadi source untuk PDF) ── */
        #ai-result-area { display: none; }

        /* ── STATUS BADGE ── */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 600;
            background: #eff6ff; color: var(--primary-light);
            border: 1px solid #bfdbfe; margin-top: 10px;
        }
        .status-badge.success { background: var(--success-bg); color: var(--success); border-color: #bbf7d0; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-ring"></div>
        <p id="loading-text">Mengambil Data Pengajar...</p>
    </div>

    <div class="container">
        <div class="page-header">
            <h2><i class="fa-solid fa-chalkboard-user" style="color:var(--accent);margin-right:10px;"></i> Portal <span>Pengajar</span></h2>
            <a href="index.html" class="btn btn-nav" style="text-decoration:none; width:auto;">
                <i class="fa-solid fa-arrow-left"></i> Dasbor Admin
            </a>
        </div>

        <div class="grid-panel">
            <!-- ── KIRI: RPP AI ── -->
            <div class="panel-card">
                <h3 class="panel-title"><i class="fa-solid fa-robot"></i> Asisten Penyusun RPP — Gemini AI</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>Semester</label>
                        <select id="input-semester" class="form-control">
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mata Pelajaran / Modul</label>
                        <select id="input-mapel" class="form-control">
                            <option value="Seni Menemukan Cerita">Seni Menemukan Cerita</option>
                            <option value="Seni Menghidupkan Dunia">Seni Menghidupkan Dunia</option>
                            <option value="Seni Menjalin Peristiwa">Seni Menjalin Peristiwa</option>
                            <option value="Seni Memoles Naskah">Seni Memoles Naskah</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Fokus Capaian & Topik Khusus</label>
                    <input type="text" id="input-topik" class="form-control"
                        placeholder="Contoh: Menulis cerpen dengan sudut pandang orang ketiga...">
                </div>

                <button id="btn-generate" class="btn btn-full btn-ai" onclick="generateRPP()">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Susun RPP Detail
                </button>

                <div id="ai-result-area"></div>

                <button id="btn-download-pdf" class="btn btn-full btn-pdf" style="display:none;" onclick="unduhRPP()">
                    <i class="fa-solid fa-file-pdf"></i> Unduh Dokumen RPP (PDF Resmi)
                </button>

                <div class="ebook-list">
                    <strong><i class="fa-solid fa-book-open" style="color:var(--accent);margin-right:6px;"></i> Referensi E-Book Semester Ini</strong>
                    <ul>
                        <li><a href="#"><i class="fa-regular fa-file-pdf" style="color:#dc2626;margin-right:6px;"></i>Buku Panduan Pengajar Cendekia (PDF)</a></li>
                        <li><a href="#"><i class="fa-regular fa-file-pdf" style="color:#dc2626;margin-right:6px;"></i>Modul Kreatif — Cetakan Berjalan</a></li>
                    </ul>
                </div>
            </div>

            <!-- ── KANAN: ADMIN & HONOR ── -->
            <div class="panel-card">
                <h3 class="panel-title"><i class="fa-solid fa-id-card"></i> Administrasi & Honor</h3>

                <div class="form-group">
                    <label>Pilih Pengajar (akun @ac.id)</label>
                    <select id="select-pengajar" class="form-control" onchange="hitungGaji(this.value)">
                        <option value="">— Pilih Pengajar —</option>
                    </select>
                    <div id="status-pengajar"></div>
                </div>

                <div class="form-group">
                    <label>Mata Pelajaran Ampuan</label>
                    <input type="text" id="display-mapel" class="form-control"
                        value="Seni Menemukan Cerita" readonly>
                </div>

                <div class="gaji-box">
                    <p class="label"><i class="fa-solid fa-coins" style="margin-right:5px;"></i>Honorarium (Rp 5.000 / Sesi)</p>
                    <h3 class="amount" id="slip-gaji">Rp 0</h3>
                    <p class="info" id="info-sesi">Total Mengajar: 0 Sesi</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden metadata untuk PDF -->
    <span id="pdf-mapel" style="display:none;"></span>
    <span id="pdf-sem-topik" style="display:none;"></span>
    <span id="pdf-pengajar" style="display:none;">—</span>
    <span id="pdf-tanggal" style="display:none;"></span>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0",
            authDomain: "mading-cf676.firebaseapp.com",
            projectId: "mading-cf676",
            storageBucket: "mading-cf676.firebasestorage.app",
            messagingSenderId: "72175203671",
            appId: "1:72175203671:web:7a0676a55beb64bc96ba12"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── AMBIL SEMUA USER YANG EMAILNYA MENGANDUNG @ac.id ──
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '../index.html'; return; }

            try {
                // Query: ambil semua dokumen di collection 'users'
                // kemudian filter di sisi klien berdasarkan email @ac.id
                // (Firestore tidak support LIKE / contains pada string)
                const snapAll = await getDocs(collection(db, 'users'));
                const select = document.getElementById('select-pengajar');
                let jumlah = 0;

                snapAll.forEach(doc => {
                    const data = doc.data();
                    const email = data.email || '';
                    // Filter: hanya yang emailnya berakhiran @ac.id atau mengandung @ac.id
                    if (email.toLowerCase().includes('@ac.id')) {
                        const opt = document.createElement('option');
                        opt.value = doc.id;
                        opt.text = (data.name || data.displayName || 'Pengajar') + ` (${email})`;
                        opt.dataset.name = data.name || data.displayName || 'Pengajar';
                        opt.dataset.email = email;
                        select.appendChild(opt);
                        jumlah++;
                    }
                });

                if (jumlah === 0) {
                    const opt = document.createElement('option');
                    opt.disabled = true;
                    opt.text = 'Belum ada pengajar dengan akun @ac.id';
                    select.appendChild(opt);
                }

                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) {
                console.error('Error ambil data pengajar:', e);
                document.getElementById('loading-overlay').style.display = 'none';
            }
        });

        // ── SINKRONISASI MAPEL ──
        document.getElementById('input-mapel').addEventListener('change', function () {
            document.getElementById('display-mapel').value = this.value;
        });

        // ── HITUNG GAJI ──
        window.hitungGaji = async (guruUid) => {
            const statusEl = document.getElementById('status-pengajar');
            if (!guruUid) {
                document.getElementById('slip-gaji').innerText = 'Rp 0';
                document.getElementById('info-sesi').innerText = 'Total Mengajar: 0 Sesi';
                document.getElementById('pdf-pengajar').innerText = '—';
                statusEl.innerHTML = '';
                return;
            }

            const select = document.getElementById('select-pengajar');
            const namaGuru = select.options[select.selectedIndex].dataset.name;
            document.getElementById('pdf-pengajar').innerText = namaGuru;
            document.getElementById('slip-gaji').innerText = 'Menghitung...';
            statusEl.innerHTML = '<span class="status-badge"><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat data sesi...</span>';

            try {
                const qSesi = query(collection(db, 'presensi_logs'), where('guruUid', '==', guruUid));
                const snapSesi = await getDocs(qSesi);
                const totalSesi = snapSesi.size;
                const honor = totalSesi * 5000;

                document.getElementById('slip-gaji').innerText = 'Rp ' + honor.toLocaleString('id-ID');
                document.getElementById('info-sesi').innerText = `Total Mengajar: ${totalSesi} Sesi | Periode Ini`;
                statusEl.innerHTML = `<span class="status-badge success"><i class="fa-solid fa-check"></i> ${namaGuru} — ${totalSesi} sesi tercatat</span>`;
            } catch (e) {
                document.getElementById('slip-gaji').innerText = 'Belum Ada Presensi';
                document.getElementById('info-sesi').innerText = 'Data presensi tidak tersedia';
                statusEl.innerHTML = '<span class="status-badge">Belum ada data presensi</span>';
            }
        };

        // ── GENERATE RPP ──
        window.generateRPP = async () => {
            const btn = document.getElementById('btn-generate');
            const btnPdf = document.getElementById('btn-download-pdf');
            const resultArea = document.getElementById('ai-result-area');

            const mapel = document.getElementById('input-mapel').value;
            const semester = document.getElementById('input-semester').value;
            const topik = document.getElementById('input-topik').value.trim() || 'Pendalaman Materi Lanjutan';
            const guruUid = document.getElementById('select-pengajar').value;

            if (!guruUid) {
                alert('Pilih nama Pengajar terlebih dahulu agar RPP tercatat atas nama beliau!');
                return;
            }

            document.getElementById('pdf-mapel').innerText = mapel;
            document.getElementById('pdf-sem-topik').innerText = `Semester ${semester} — ${topik}`;
            document.getElementById('pdf-tanggal').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyusun RPP Detail...';
            btnPdf.style.display = 'none';
            resultArea.innerHTML = '';

            document.getElementById('loading-text').innerText = 'Gemini AI sedang menyusun RPP...';
            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                const response = await fetch('/api/generate-rpp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mapel, semester, topik })
                });

                if (!response.ok) throw new Error('Respons server tidak OK: ' + response.status);
                const data = await response.json();

                if (!data.rpp) throw new Error('Data RPP kosong dari server');

                // Simpan data terstruktur untuk dirender ke PDF
                window.__rppData = data.rpp;

                btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> RPP Berhasil Disusun';
                btnPdf.style.display = 'flex';

            } catch (error) {
                console.error(error);
                alert('Gagal memproses AI: ' + error.message + '\nPastikan API sudah dikonfigurasi dengan benar.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Susun RPP Detail';
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
                setTimeout(() => {
                    if (btn.disabled) {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-rotate"></i> Susun Ulang RPP';
                    }
                }, 5000);
            }
        };

        // ── HELPER: KONVERSI LOGO KE BASE64 ──
        async function getLogoBase64(url) {
            try {
                const resp = await fetch(url, { mode: 'cors' });
                const blob = await resp.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = () => resolve(null);
                    reader.readAsDataURL(blob);
                });
            } catch { return null; }
        }

        // ── UNDUH PDF PROFESIONAL ──
        window.unduhRPP = async () => {
            const btn = document.getElementById('btn-download-pdf');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Membangun Dokumen PDF...';

            const rpp = window.__rppData;
            if (!rpp) { alert('Data RPP tidak tersedia. Harap susun RPP terlebih dahulu.'); btn.disabled = false; return; }

            const namaGuru = document.getElementById('pdf-pengajar').innerText;
            const mapel = document.getElementById('pdf-mapel').innerText;
            const semTopik = document.getElementById('pdf-sem-topik').innerText;
            const tanggal = document.getElementById('pdf-tanggal').innerText;

            const logoB64 = await getLogoBase64('https://i.imgur.com/5Srjyo4.png');

            // ── WARNA & STYLE ──
            const C = { primary: '#003366', accent: '#d4af37', light: '#f0f4f8', red: '#b91c1c', white: '#ffffff', muted: '#5a6a82' };

            // ── HELPER TABLE ROW ──
            function buildSkenarioRows(sesi) {
                return (sesi || []).map((s, i) => ([
                    { text: [{ text: s.waktu + '\n', bold: true, color: C.primary }, { text: s.fase, fontSize: 9, color: C.muted }], border: [true, true, true, true], fillColor: i % 2 === 0 ? C.light : C.white, alignment: 'center', margin: [6, 8, 6, 8] },
                    { stack: [{ text: 'Menjelaskan:', bold: true, fontSize: 10 }, { text: s.menjelaskan, fontSize: 10, margin: [0, 3, 0, 8] }, { text: 'Memadankan (Analogi):', bold: true, fontSize: 10, color: '#065f46' }, { text: s.memadankan, fontSize: 10, color: '#065f46', margin: [0, 3, 0, 0] }], border: [true, true, true, true], margin: [8, 8, 8, 8] },
                    { text: s.aktivitasSiswa, fontSize: 10, border: [true, true, true, true], margin: [8, 8, 8, 8] },
                    { text: s.poinPenting, fontSize: 10, bold: true, color: C.red, border: [true, true, true, true], margin: [8, 8, 8, 8] }
                ]));
            }

            const docDef = {
                pageSize: 'A4',
                pageMargins: [50, 40, 50, 55],
                footer: (currentPage, pageCount) => ({
                    columns: [
                        { text: 'Komunitas Literasi Cendekia Aksara — Dokumen Resmi', fontSize: 8, color: C.muted, margin: [50, 0, 0, 0] },
                        { text: `Halaman ${currentPage} dari ${pageCount}`, fontSize: 8, color: C.muted, alignment: 'right', margin: [0, 0, 50, 0] }
                    ],
                    margin: [0, 10, 0, 0]
                }),
                content: [
                    // ── KOP SURAT ──
                    {
                        table: {
                            widths: logoB64 ? [65, '*'] : ['*'],
                            body: [[
                                ...(logoB64 ? [{ image: logoB64, width: 60, margin: [0, 5, 10, 5], border: [false, false, false, false] }] : []),
                                {
                                    stack: [
                                        { text: 'KOMUNITAS LITERASI', fontSize: 9, bold: true, color: C.muted, letterSpacing: 2 },
                                        { text: 'CENDEKIA AKSARA', fontSize: 20, bold: true, color: C.primary, margin: [0, 2, 0, 2], font: 'Roboto' },
                                        { text: 'Mendidik Jiwa, Menghidupkan Kata', fontSize: 9, italics: true, color: C.accent }
                                    ],
                                    border: [false, false, false, false],
                                    margin: [0, 4, 0, 0]
                                }
                            ]]
                        },
                        layout: 'noBorders',
                        margin: [0, 0, 0, 0]
                    },
                    // GARIS KOP
                    { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 495, y2: 0, lineWidth: 3, lineColor: C.primary }, { type: 'line', x1: 0, y1: 5, x2: 495, y2: 5, lineWidth: 1, lineColor: C.accent }], margin: [0, 8, 0, 14] },

                    // ── JUDUL DOKUMEN ──
                    { text: 'RANCANGAN PELAKSANAAN PEMBELAJARAN', fontSize: 15, bold: true, color: C.primary, alignment: 'center', margin: [0, 0, 0, 4] },
                    { text: '( R P P )', fontSize: 11, color: C.muted, alignment: 'center', letterSpacing: 4, margin: [0, 0, 0, 18] },

                    // ── TABEL IDENTITAS ──
                    {
                        table: {
                            widths: [140, 10, '*'],
                            body: [
                                [{ text: 'Mata Pelajaran / Modul', bold: true, fontSize: 10 }, { text: ':', fontSize: 10 }, { text: mapel, fontSize: 10 }],
                                [{ text: 'Semester / Topik', bold: true, fontSize: 10 }, { text: ':', fontSize: 10 }, { text: semTopik, fontSize: 10 }],

                    { text: 'C.  Skenario Pembelajaran Rinci (80 Menit)', fontSize: 12, bold: true, color: C.primary, decoration: 'underline', margin: [0, 0, 0, 12] },
                    {
                        table: {
                            widths: [80, '*', 120, 100],
                            headerRows: 1,
                            keepWithHeaderRows: 1,
                            body: [
                                // Header
                                [
                                    { text: 'Waktu & Fase', bold: true, fontSize: 10, color: C.white, fillColor: C.primary, alignment: 'center', margin: [5, 8, 5, 8] },
                                    { text: 'Aktivitas Guru\n(Menjelaskan & Memadankan)', bold: true, fontSize: 10, color: C.white, fillColor: C.primary, alignment: 'center', margin: [5, 8, 5, 8] },
                                    { text: 'Aktivitas Peserta Didik', bold: true, fontSize: 10, color: C.white, fillColor: C.primary, alignment: 'center', margin: [5, 8, 5, 8] },
                                    { text: 'Poin Penting', bold: true, fontSize: 10, color: C.white, fillColor: C.primary, alignment: 'center', margin: [5, 8, 5, 8] }

                                ...buildSkenarioRows(rpp.skenario)

                        table: {
                            widths: ['*', '*', '*'],
                            body: [
                                [
                                    { text: 'Jenis Penilaian', bold: true, fontSize: 10, fillColor: C.light, alignment: 'center', margin: [5, 8, 5, 8] },
                                    { text: 'Teknik', bold: true, fontSize: 10, fillColor: C.light, alignment: 'center', margin: [5, 8, 5, 8] },

                        layout: {

                            hLineColor: () => '#cbd5e1', vLineColor: () => '#cbd5e1'

                        margin: [0, 0, 0, 20]
                    },

                    // ── E. CATATAN REFLEKSI ──
                    { text: 'E.  Catatan Refleksi & Tindak Lanjut', fontSize: 12, bold: true, color: C.primary, decoration: 'underline', margin: [0, 0, 0, 10] },

                    // ── TANDA TANGAN ──
                    { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 495, y2: 0, lineWidth: 0.5, lineColor: '#dde3ed' }], margin: [0, 0, 0, 20] },
                    {
                        columns: [
                            {
                                width: '50%',
                                stack: [
                                    { text: 'Mengetahui,', fontSize: 10 },
                                    { text: 'Koordinator Program', fontSize: 10, bold: true, margin: [0, 2, 0, 0] },

                                    { text: '(____________________________)', fontSize: 9, color: C.muted }
                                ]
                            },
                            {
                                width: '50%',
                                stack: [
                                    { text: `${tanggal || '.....................'}`, fontSize: 10 },
                                    { text: 'Pengajar,', fontSize: 10, bold: true, margin: [0, 2, 0, 0] },
                                    { canvas: [{ type: 'line', x1: 0, y1: 50, x2: 160, y2: 50, lineWidth: 0.8, lineColor: C.primary }] },
                                    { text: namaGuru, fontSize: 9, bold: true, color: C.muted }
                                ]
                            }
                        ]
                    }

                defaultStyle: { font: 'Roboto', fontSize: 11, lineHeight: 1.4 }

            try {
                pdfMake.createPdf(docDef).download(`RPP_${mapel.replace(/\s+/g, '_')}.pdf`);
            } catch (err) {
                console.error(err);
                alert('Gagal membuat PDF: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-file-pdf"></i> Unduh Dokumen RPP (PDF Resmi)';
            }
