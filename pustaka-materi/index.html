<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pustaka Materi - Cendekia Aksara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. VARIABLES & GLOBAL --- */
        :root {
            --navy-dark: #001f3f;
            --navy-light: #003366;
            --accent: #3b82f6;
            --bg: #f4f6f9;
            --text-dark: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            margin: 0; 
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .container-custom { max-width: 1000px; margin: 0 auto; padding: 20px; width: 100%; }

        /* --- 2. HEADER BRANDED --- */
        .brand-header {
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy-light) 100%);
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            margin-bottom: 30px; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none; z-index: 1;
        }

        .header-top-row {
            display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; z-index: 2; width: 100%;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; }

        .header-logo-circle {
            width: 75px; height: 75px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-shrink: 0; padding: 12px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite; overflow: hidden;
        }

        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: #fbbf24; /* text-yellow-400 */
        }
        .header-greeting {
            font-size: 0.95rem; opacity: 0.9; margin-top: 5px; font-weight: 400; color: #e2e8f0;
        }

        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); cursor: pointer;
        }
        .btn-back:hover { background: white; color: var(--navy-light); }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* SCROLL UTILS */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        #search-container { transition: all 0.3s ease-in-out; }

        @media (max-width: 600px) {
            .header-top-row { flex-direction: column; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: flex-start; margin-top: 10px; }
            .btn-back { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Wrapper Utama -->
    <div class="flex-grow pb-10">
        
        <div class="container-custom">
            
            <!-- HEADER BARU (Konsisten dengan halaman lain) -->
            <div class="brand-header">
                <div class="header-top-row">
                    <div class="header-content-wrapper">
                        <div class="header-logo-circle">
                            <img src="https://imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                        </div>
                        <div class="header-info">
                            <h1 class="header-brand-name">Pustaka Materi</h1>
                            <div class="header-greeting">Eksplorasi karya dan materi pembelajaran.</div>
                        </div>
                    </div>
                    
                    <div class="header-actions">
                        <button onclick="toggleSearch()" class="btn-back" style="padding: 10px 15px;">
                            <i class="fas fa-search"></i>
                        </button>
                        <!-- TOMBOL KEMBALI DINAMIS -->
                        <a href="/dashboard/index.html" class="btn-back" id="btn-kembali">
                            <i class="fa-solid fa-arrow-left"></i> <span id="kembali-text">Dashboard</span>
                        </a>
                    </div>
                </div>

                <!-- Search Input Container -->
                <div id="search-container" class="hidden w-full mt-5 z-10 relative">
                    <input type="text" id="search-input" onkeyup="handleSearch(this.value)" 
                        class="w-full px-5 py-3.5 rounded-full border-none focus:ring-4 focus:ring-yellow-400 text-gray-800 placeholder-gray-500 shadow-inner outline-none font-sans font-medium"
                        placeholder="Cari judul buku atau materi...">
                </div>

                <!-- Stats Container -->
                <div class="w-full mt-6 flex justify-around bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/20 z-10 relative">
                    <div class="text-center w-1/2">
                        <h3 class="text-white font-bold text-2xl" id="count-karya">...</h3>
                        <p class="text-gray-200 text-[11px] uppercase tracking-widest mt-1">Karya Siswa</p>
                    </div>
                    <div class="w-px bg-white/30"></div>
                    <div class="text-center w-1/2">
                        <h3 class="text-white font-bold text-2xl" id="count-materi">...</h3>
                        <p class="text-gray-200 text-[11px] uppercase tracking-widest mt-1">Materi Ajar</p>
                    </div>
                </div>
            </div>

            <!-- Error Container -->
            <div id="error-container" class="hidden w-full mb-4">
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative text-sm shadow-sm">
                    <strong class="font-bold">Info:</strong> <span id="error-message"></span>
                </div>
            </div>

            <!-- CONTENT UTAMA -->
            <div id="main-content" class="w-full">
                
                <!-- SECTION 1: KARYA -->
                <div class="mt-2 section-group bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
                    <div class="flex justify-between items-end mb-4 border-b border-gray-100 pb-3">
                        <h2 class="text-blue-900 font-bold text-lg md:text-xl border-l-4 border-yellow-400 pl-3">Karya Terbaru</h2>
                        <a href="list-karya.html" class="text-xs md:text-sm text-gray-500 hover:text-blue-600 font-semibold group flex items-center gap-1">
                            Lihat Semua <i class="fas fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                        </a>
                    </div>
                    <!-- Horizontal Scroll -->
                    <div id="container-karya" class="flex overflow-x-auto hide-scroll gap-4 md:gap-5 pb-2 snap-x min-h-[260px]">
                        <!-- Skeleton Responsive -->
                        <div class="min-w-[130px] h-[200px] md:min-w-[180px] md:h-[260px] bg-gray-200 rounded-xl animate-pulse"></div>
                        <div class="min-w-[130px] h-[200px] md:min-w-[180px] md:h-[260px] bg-gray-200 rounded-xl animate-pulse"></div>
                        <div class="min-w-[130px] h-[200px] md:min-w-[180px] md:h-[260px] bg-gray-200 rounded-xl animate-pulse"></div>
                    </div>
                </div>

                <!-- SECTION 2: MATERI -->
                <div class="section-group bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                    <div class="flex justify-between items-end mb-4 border-b border-gray-100 pb-3">
                        <h2 class="text-blue-900 font-bold text-lg md:text-xl border-l-4 border-yellow-400 pl-3">Materi Pilihan</h2>
                        <a href="list-materi.html" class="text-xs md:text-sm text-gray-500 hover:text-blue-600 font-semibold group flex items-center gap-1">
                            Lihat Semua <i class="fas fa-chevron-right text-[10px] group-hover:translate-x-1 transition"></i>
                        </a>
                    </div>
                    <!-- Horizontal Scroll -->
                    <div id="container-materi" class="flex overflow-x-auto hide-scroll gap-4 md:gap-5 pb-2 snap-x min-h-[260px]">
                        <!-- Skeleton Responsive -->
                        <div class="min-w-[130px] h-[200px] md:min-w-[180px] md:h-[260px] bg-gray-200 rounded-xl animate-pulse"></div>
                        <div class="min-w-[130px] h-[200px] md:min-w-[180px] md:h-[260px] bg-gray-200 rounded-xl animate-pulse"></div>
                        <div class="min-w-[130px] h-[200px] md:min-w-[180px] md:h-[260px] bg-gray-200 rounded-xl animate-pulse"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-gray-900 text-white py-6 mt-auto border-t-4 border-yellow-400">
        <div class="max-w-7xl mx-auto px-5 text-center">
            <div class="flex flex-col items-center justify-center gap-2">
                <div class="flex items-center gap-3">
                    <img src="https://imgur.com/5Srjyo4.png" alt="Logo" class="w-10 h-10 rounded-full border-2 border-white/20 bg-white p-1">
                    <span class="font-bold text-xl font-['Aleo'] tracking-wide text-white">Cendekia Aksara</span>
                </div>
                <p class="text-xs text-gray-400 mt-2 font-medium">© 2026 Hak Cipta Dilindungi Undang-Undang</p>
            </div>
        </div>
    </footer>

    <!-- LOGIKA (FIREBASE + SEARCH + BACK BUTTON) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ============================================================
        // LOGIKA DINAMIS TOMBOL KEMBALI
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const fromInkubasi = urlParams.get('ref') === 'inkubasi';
        
        const btnKembali = document.getElementById('btn-kembali');
        const textKembali = document.getElementById('kembali-text');
        
        if (btnKembali) {
            if (fromInkubasi) {
                btnKembali.href = '/dashboard/inkubasi.html';
                textKembali.innerText = 'Ruang Inkubasi'; 
            } else {
                btnKembali.href = '/dashboard/index.html'; 
                textKembali.innerText = 'Dashboard Utama';
            }
        }
        // ============================================================

        // === CONFIG FIREBASE LAMA (Sesuai kode sumber) ===
        const firebaseConfig = {
            apiKey: "AIzaSyDooErB7K4vFtmC6-PcI30v82Vh6b85fPI",
            authDomain: "berbasis-ai.firebaseapp.com",
            projectId: "berbasis-ai",
            storageBucket: "berbasis-ai.firebasestorage.app",
            messagingSenderId: "962437652324",
            appId: "1:962437652324:web:4426a5efcabf72caebe471"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION_NAME = 'pustaka_materi';
        
        let globalKarya = [];
        let globalMateri = [];

        window.toggleSearch = () => {
            const container = document.getElementById('search-container');
            container.classList.toggle('hidden');
            if(!container.classList.contains('hidden')) {
                document.getElementById('search-input').focus();
            }
        }

        window.handleSearch = (keyword) => {
            const term = keyword.toLowerCase();
            
            const filteredKarya = globalKarya.filter(item => item.judul.toLowerCase().includes(term));
            const filteredMateri = globalMateri.filter(item => item.judul.toLowerCase().includes(term));

            renderScroll(filteredKarya, 'container-karya', 'list-karya.html');
            renderScroll(filteredMateri, 'container-materi', 'list-materi.html');
        }

        async function loadData() {
            try {
                const q = query(collection(db, COLLECTION_NAME));
                const snapshot = await getDocs(q);
                
                let allData = [];
                snapshot.forEach(doc => allData.push(doc.data()));

                allData.sort((a, b) => new Date(b.tanggal || 0) - new Date(a.tanggal || 0));

                globalKarya = allData.filter(item => item.kategori === 'karya');
                globalMateri = allData.filter(item => item.kategori === 'materi');

                document.getElementById('count-karya').innerText = globalKarya.length;
                document.getElementById('count-materi').innerText = globalMateri.length;

                renderScroll(globalKarya, 'container-karya', 'list-karya.html');
                renderScroll(globalMateri, 'container-materi', 'list-materi.html');

            } catch (error) {
                console.error(error);
                document.getElementById('error-container').classList.remove('hidden');
                document.getElementById('error-message').innerText = "Gagal memuat data. Cek koneksi internet.";
            }
        }

        function renderScroll(data, containerId, moreLink) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if(data.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 italic pr-5 whitespace-nowrap self-center py-10">Pencarian tidak ditemukan.</p>';
                return;
            }

            data.slice(0, 10).forEach(item => {
                const card = `
                    <div class="min-w-[130px] w-[130px] md:min-w-[180px] md:w-[180px] snap-start flex flex-col group relative">
                        
                        <!-- Gambar Cover (Ukuran diperkecil di mobile) -->
                        <div class="relative h-[190px] md:h-[260px] rounded-xl overflow-hidden shadow-md mb-3 bg-gray-200 border border-gray-100">
                            <img src="${item.cover}" alt="${item.judul}" 
                                 class="w-full h-full object-cover group-hover:scale-105 transition duration-500"
                                 onerror="this.src='https://via.placeholder.com/160x240?text=No+Cover'">
                        </div>

                        <!-- Judul -->
                        <h3 class="text-gray-800 font-bold text-xs md:text-sm leading-tight line-clamp-2 mb-2 min-h-[35px] md:min-h-[40px]">${item.judul}</h3>
                        
                        <!-- Tombol Unduh -->
                        <a href="${item.link}" class="w-full bg-[#003366] text-yellow-400 text-[10px] md:text-xs font-bold py-2 md:py-2.5 px-3 rounded-lg text-center hover:bg-[#001f3f] transition shadow-sm flex items-center justify-center gap-2 mt-auto">
                            <i class="fas fa-download"></i> UNDUH
                        </a>
                    </div>
                `;
                container.innerHTML += card;
            });

            if(data.length > 10) {
                container.innerHTML += `
                    <a href="${moreLink}" class="min-w-[100px] md:min-w-[120px] flex flex-col items-center justify-center text-blue-900 snap-start hover:bg-blue-50 rounded-xl transition cursor-pointer border-2 border-dashed border-blue-200 ml-2 h-[190px] md:h-[260px]">
                        <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-blue-100 flex items-center justify-center mb-2 shadow-sm">
                            <i class="fas fa-arrow-right text-xs md:text-base text-blue-700"></i>
                        </div>
                        <span class="text-[10px] md:text-xs font-bold">Lihat Semua</span>
                    </a>
                `;
            }
        }

        // Panggil fungsi saat halaman dimuat
        loadData();
    </script>
</body>
</html>
