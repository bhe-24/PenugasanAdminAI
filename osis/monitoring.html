<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisi Monitoring - OSIS Cendekia</title>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #003366; --gold: #d4af37; --bg-color: #f4f7f6; --text-dark: #1e293b; --text-gray: #64748b; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent;}
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); margin: 0; color: var(--text-dark); padding-bottom: 50px; }
        .container { max-width: 1200px; width: 95%; margin: 0 auto; padding: 25px; }

        /* --- HEADER BRANDED NAVY --- */
        .brand-header {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 31, 63, 0.3);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; }

        .header-logo-circle {
            width: 75px; height: 75px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0;
            padding: 12px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite; overflow: hidden;
        }
        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: #fbbf24;
        }
        .header-greeting {
            font-size: 0.95rem; opacity: 0.9; margin-top: 5px; font-weight: 400; margin-bottom: 0;
        }

        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; z-index: 2;}
        .btn-back { background: rgba(255,255,255,0.15); color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; border: 1px solid rgba(255,255,255,0.3); display: inline-flex; align-items: center; gap: 8px;}
        .btn-back:hover { background: white; color: var(--primary); }
        
        /* Tombol Pintasan Aspirasi */
        .btn-aspirasi { background: #dc2626; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; border: 1px solid #fca5a5; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(220,38,38,0.3);}
        .btn-aspirasi:hover { background: #b91c1c; transform: translateY(-2px);}

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* --- KONTROL PENCARIAN --- */
        .control-panel {
            background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .control-panel input {
            padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Poppins'; font-size: 0.95rem; flex: 1; outline: none; transition: 0.3s;
        }
        .control-panel input:focus { border-color: #166534; box-shadow: 0 0 0 3px rgba(22, 101, 52, 0.1);}
        .active-tasks-info { font-size: 0.9rem; color: #166534; font-weight: 600; background: #dcfce7; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 8px;}

        /* --- KARTU SISWA (RADAR) --- */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .student-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s;
            border: 1px solid #e2e8f0; position: relative; display: flex; flex-direction: column;
        }
        .student-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: #cbd5e1;}
        .student-card.alert { border-color: #fca5a5; background: #fef2f2; }

        .student-info h3 { margin: 0 0 5px 0; font-size: 1.15rem; color: var(--primary); font-family: 'Aleo', serif;}
        .student-info p { margin: 0 0 15px 0; font-size: 0.85rem; color: var(--text-gray); }

        /* KOTAK-KOTAK TUGAS (TRACKER DINAMIS) */
        .task-tracker { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
        .task-box {
            width: 35px; height: 35px; border-radius: 6px; display: flex; justify-content: center; align-items: center;
            font-size: 0.75rem; font-weight: bold; color: white; cursor: help; flex-shrink: 0;
        }
        .task-done { background: #22c55e; box-shadow: 0 2px 5px rgba(34, 197, 94, 0.3); } 
        .task-miss { background: #ef4444; box-shadow: 0 2px 5px rgba(239, 68, 68, 0.3); animation: pulse 2s infinite; } 
        .task-wait { background: #cbd5e1; color: #475569; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* TOMBOL WHATSAPP */
        .btn-wa {
            width: 100%; background: #25D366; color: white; border: none; padding: 12px;
            border-radius: 8px; font-family: 'Poppins'; font-weight: bold; font-size: 0.95rem;
            cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; text-decoration: none;
            margin-top: auto;
        }
        .btn-wa:hover { background: #1ebe57; }

        /* --- LAPORAN GRUP SECTION --- */
        .report-section {
            margin-top: 40px; padding: 30px; background: white; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0;
            text-align: center;
        }
        .report-title { font-family: 'Aleo', serif; color: var(--primary); font-size: 1.4rem; margin-bottom: 10px;}
        .report-desc { color: var(--text-gray); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6;}
        
        .report-actions { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;}
        .btn-report {
            background: linear-gradient(135deg, var(--primary), #0f4c81); color: white;
            border: none; padding: 12px 25px; border-radius: 10px; font-family: 'Poppins';
            font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-report:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 51, 102, 0.2);}

        /* --- MODAL LAPORAN --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: white; width: 90%; max-width: 500px; border-radius: 16px;
            transform: translateY(20px); transition: 0.3s; overflow: hidden; display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        
        .modal-header { padding: 20px 25px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;}
        .modal-header h3 { margin: 0; color: var(--primary); font-size: 1.2rem; font-family: 'Aleo', serif;}
        .btn-close { background: none; border: none; font-size: 1.2rem; color: #64748b; cursor: pointer; }
        .btn-close:hover { color: #ef4444; }
        
        .modal-body { padding: 20px; }
        .modal-body textarea {
            width: 100%; height: 250px; padding: 15px; border-radius: 8px;
            border: 1px solid #cbd5e1; font-family: inherit; font-size: 0.9rem;
            line-height: 1.6; resize: none; outline: none; background: #f8fafc; color: var(--text-dark);
        }
        .modal-body textarea:focus { border-color: var(--primary); background: white;}
        
        .modal-footer { padding: 15px 20px; border-top: 1px solid #e2e8f0; background: #f8fafc;}

        /* LOADING */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #166534; transition: 0.4s; }

        @media (max-width: 600px) {
            .container { padding: 15px; width: 100%; } 
            .brand-header { padding: 20px; flex-direction: column; align-items: flex-start; gap: 15px; }
            .header-content-wrapper { width: 100%; align-items: flex-start;}
            .header-brand-name { font-size: 1.4rem; }
            .header-logo-circle { width: 55px; height: 55px; padding: 10px;}
            
            .header-actions { width: 100%; flex-direction: column; gap: 10px; }
            .btn-back, .btn-aspirasi { width: 100%; justify-content: center; }
            .report-actions { flex-direction: column; }
            .btn-report { justify-content: center; }
            
            .control-panel { flex-direction: column; align-items: stretch;}
            .control-panel input { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <i class="fa-solid fa-radar fa-spin" style="font-size: 3rem; margin-bottom: 15px;"></i>
        <h3 style="font-family: 'Poppins'; font-size: 1rem; color: #64748b;">Memuat Radar Siswa...</h3>
    </div>

    <!-- MODAL LAPORAN GRUP -->
    <div id="report-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fa-solid fa-file-lines"></i> Draf Laporan WhatsApp</h3>
                <button class="btn-close" onclick="closeModal('report-modal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <textarea id="report-text" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-wa" onclick="copyReportText()"><i class="fa-regular fa-copy"></i> Salin Teks Laporan</button>
            </div>
        </div>
    </div>

    <div class="container" style="display: none;" id="main-content">
        
        <!-- HEADER BARU (SAMA SEPERTI HALAMAN LAIN) -->
        <header class="brand-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-info">
                    <h1 class="header-brand-name">Divisi Monitoring</h1>
                    <div class="header-greeting">Pantau keterlambatan tugas harian siswa.</div>
                </div>
            </div>
            
            <div class="header-actions">
                <a href="aspirasi.html" class="btn-aspirasi"><i class="fa-solid fa-box-open"></i> Buka Kotak Aspirasi</a>
                <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Dasbor OSIS</a>
            </div>
        </header>

        <div class="control-panel">
            <div class="active-tasks-info" id="task-info"><i class="fa-solid fa-spinner fa-spin"></i> Menghitung tugas aktif...</div>
            <input type="text" id="search-student" placeholder="Cari nama siswa..." onkeyup="renderRadar()">
        </div>

        <div id="radar-container" class="student-grid">
            <!-- Kartu Siswa Dirender JS -->
        </div>

        <!-- SECTION LAPORAN GRUP -->
        <div class="report-section">
            <h3 class="report-title"><i class="fa-solid fa-paper-plane"></i> Laporan Cepat ke Grup Mading</h3>
            <p class="report-desc">Hasilkan daftar otomatis siswa yang belum mengumpulkan tugas untuk dilaporkan ke dalam grup WhatsApp.</p>
            
            <div class="report-actions">
                <button class="btn-report" onclick="generateReport(1)"><i class="fa-brands fa-whatsapp"></i> Buat Laporan Semester 1</button>
                <button class="btn-report" onclick="generateReport(2)"><i class="fa-brands fa-whatsapp"></i> Buat Laporan Semester 2</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { db, checkAuth } from "/js/firebase-config.js";
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let allStudents = [];
        let activeTasks = [];
        let allSubmissions = [];
        let pengurusName = "";

        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        (async () => {
            const userData = await checkAuth('siswa');
            
            if(userData) {
                if (userData.is_osis !== true) {
                    alert("Akses Ditolak! Hanya Pengurus OSIS yang diizinkan.");
                    window.location.href = '/dashboard/index.html';
                    return;
                }

                pengurusName = userData.name.split(' ')[0];

                try {
                    // 1. AMBIL DATA SISWA
                    const qSiswa = query(collection(db, 'users'), where('role', '==', 'siswa'));
                    const snapSiswa = await getDocs(qSiswa);
                    snapSiswa.forEach(d => {
                        const data = d.data();
                        if(data.is_osis !== true) {
                            allStudents.push({id: d.id, ...data});
                        }
                    });
                    allStudents.sort((a,b) => (a.name || "").localeCompare(b.name || ""));

                    // 2. AMBIL DATA TUGAS DARI KOLEKSI ADMIN
                    const qTasks = query(collection(db, 'assignments'), orderBy('createdAt', 'asc'));
                    const snapTasks = await getDocs(qTasks);
                    snapTasks.forEach(d => activeTasks.push({id: d.id, ...d.data()}));
                    
                    // 3. AMBIL DATA PENGUMPULAN SISWA
                    const snapSubs = await getDocs(collection(db, 'submissions'));
                    snapSubs.forEach(d => allSubmissions.push({id: d.id, ...d.data()}));

                    // Update Info Panel
                    document.getElementById('task-info').innerHTML = `<i class="fa-solid fa-list-check"></i> Terdapat total ${activeTasks.length} Tugas Aktif`;
                    
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                        renderRadar(); 
                    }, 400);

                } catch (e) {
                    console.error(e);
                    alert("Gagal memuat data radar dari server.");
                }
            }
        })();

        // --- FUNGSI UTAMA RENDER RADAR ---
        window.renderRadar = () => {
            const searchKey = document.getElementById('search-student').value.toLowerCase();
            const container = document.getElementById('radar-container');
            container.innerHTML = '';

            let htmlBuffer = '';
            let validCount = 0;

            allStudents.forEach(s => {
                // Filter Pencarian
                if(searchKey && !(s.name && s.name.toLowerCase().includes(searchKey))) return;

                // FILTER WA: Jangan tampilkan jika tidak ada nomor HP
                let noWA = s.no_hp || s.noHp || s.no_wa || s.phone || s.telepon || s.no_telp || s.whatsapp || "";
                let waClean = noWA.replace(/\D/g, ''); 
                
                // Jika tidak ada nomor WA sama sekali, sembunyikan dari radar.
                if (waClean.length < 9) return; 

                if (waClean.startsWith('08')) waClean = '628' + waClean.substring(2);

                let trackerHtml = '';
                let missingTasks = []; 
                let hasRedAlert = false;

                // Ambil semester siswa
                let studentSemester = parseInt(s.semester) || 1;
                let studentTasks = activeTasks.filter(t => parseInt(t.semester || 1) === studentSemester);

                if (studentTasks.length === 0) {
                    trackerHtml = `<div style="font-size:0.8rem; color:#94a3b8; font-style:italic;">Belum ada tugas untuk Semester ${studentSemester}.</div>`;
                } else {
                    studentTasks.forEach((task, index) => {
                        let taskName = task.judul || `Tugas ${index + 1}`;
                        let taskLabel = `T${index + 1}`;

                        let isSubmitted = allSubmissions.some(sub => sub.studentUid === s.id && sub.assignmentId === task.id);

                        let isPastDeadline = false;
                        if (task.deadline) {
                            const deadlineDate = new Date(task.deadline);
                            if (new Date() > deadlineDate) isPastDeadline = true;
                        }

                        if (isSubmitted) {
                            trackerHtml += `<div class="task-box task-done" title="${taskName} (Selesai)">${taskLabel}</div>`;
                        } else if (!isSubmitted && isPastDeadline) {
                            trackerHtml += `<div class="task-box task-miss" title="${taskName} (Terlambat!)">${taskLabel}</div>`;
                            missingTasks.push(taskName);
                            hasRedAlert = true;
                        } else {
                            trackerHtml += `<div class="task-box task-wait" title="${taskName} (Belum Deadline)">${taskLabel}</div>`;
                        }
                    });
                }

                // FILTER ARSIP OTOMATIS: Jika tugas yang bolong >= 4, anggap hilang kontak & sembunyikan.
                if (missingTasks.length >= 4) return;

                validCount++;

                // GENERATE PESAN WHATSAPP PRIBADI
                let btnWaHtml = '';
                if (hasRedAlert) {
                    const jam = new Date().getHours();
                    let sapaan = "Selamat Pagi";
                    if (jam >= 10 && jam < 15) sapaan = "Selamat Siang";
                    else if (jam >= 15 && jam < 18) sapaan = "Selamat Sore";
                    else if (jam >= 18) sapaan = "Selamat Malam";

                    let pesan = `${sapaan} kak *${s.name}*, perkenalkan aku ${pengurusName} dari Divisi Monitoring OSIS Cendekia Aksara. 👋\n\nBerdasarkan pantauan sistem, kamu belum mengumpulkan tugas berikut:\n- *${missingTasks.join('*\n- *')}*\n\nApakah ada kendala? Yuk segera diselesaikan agar nilainya aman ya kak! Semangat! 🚀`;
                    
                    let urlWa = `https://wa.me/${waClean}?text=${encodeURIComponent(pesan)}`;
                    btnWaHtml = `<a href="${urlWa}" target="_blank" class="btn-wa"><i class="fa-brands fa-whatsapp"></i> Ingatkan via WA Pribadi</a>`;
                } else {
                    if (studentTasks.length === 0) {
                        btnWaHtml = `<button class="btn-wa" style="background:#f1f5f9; color:#64748b;" disabled><i class="fa-solid fa-mug-hot"></i> Belum Ada Tugas</button>`;
                    } else {
                        btnWaHtml = `<button class="btn-wa" style="background:#f1f5f9; color:#64748b;" disabled><i class="fa-solid fa-check-double"></i> Pengumpulan Aman</button>`;
                    }
                }

                // Susun Kartu
                const cardAlertClass = hasRedAlert ? 'alert' : '';
                htmlBuffer += `
                    <div class="student-card ${cardAlertClass}">
                        <div class="student-info">
                            <h3>${s.name}</h3>
                            <p><i class="fa-solid fa-phone"></i> ${noWA} &nbsp;|&nbsp; Sem: ${studentSemester}</p>
                        </div>
                        <div class="task-tracker">
                            ${trackerHtml}
                        </div>
                        ${btnWaHtml}
                    </div>
                `;
            });

            if (validCount === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#94a3b8; background:white; border-radius:12px; border:2px dashed #cbd5e1;">Tidak ada data siswa yang perlu dipantau.</div>`;
            } else {
                container.innerHTML = htmlBuffer;
            }
        };

        // --- FUNGSI GENERATE LAPORAN GRUP ---
        window.generateReport = (semester) => {
            let reportText = `*LAPORAN PENGUMPULAN TUGAS MADING*\n*SEMESTER ${semester}*\n\nMohon perhatian bagi nama-nama berikut untuk SEGERA menyelesaikan tanggungan tugasnya yang terlambat:\n\n`;
            let count = 1;
            let totalTerlambat = 0;
            
            allStudents.forEach(s => {
                let studentSemester = parseInt(s.semester) || 1;
                if (studentSemester !== semester) return;

                // Abaikan jika tidak ada WA (tidak aktif)
                let noWA = s.no_hp || s.noHp || s.no_wa || s.phone || s.telepon || s.no_telp || s.whatsapp || "";
                let waClean = noWA.replace(/\D/g, ''); 
                if (waClean.length < 9) return;

                let studentTasks = activeTasks.filter(t => parseInt(t.semester || 1) === studentSemester);
                let missingTasks = [];

                studentTasks.forEach(task => {
                    let isSubmitted = allSubmissions.some(sub => sub.studentUid === s.id && sub.assignmentId === task.id);
                    let isPastDeadline = false;
                    if (task.deadline) {
                        if (new Date() > new Date(task.deadline)) isPastDeadline = true;
                    }
                    if (!isSubmitted && isPastDeadline) {
                        missingTasks.push(task.judul || "Tugas");
                    }
                });

                if (missingTasks.length > 0) {
                    // Abaikan jika tugas kosong >= 4 (Siswa diarsipkan)
                    if(missingTasks.length >= 4) return;

                    reportText += `${count}. ${s.name} (Kurang ${missingTasks.length} Tugas)\n`;
                    count++;
                    totalTerlambat++;
                }
            });

            if(totalTerlambat === 0) {
                reportText += `_Tidak ada siswa yang menunggak tugas. Semua aman!_\n`;
            } else {
                // Tambahkan peringatan atau ancaman administratif
                reportText += `\n⚠️ *PERINGATAN KERAS* ⚠️\nBagi nama-nama di atas, harap segera menyelesaikan tugasnya. Kelalaian dalam mengerjakan tugas dapat berakibat pada sanksi administratif, penundaan pencetakan sertifikat, hingga pencabutan hak penerbitan karya di akhir semester.\n\nJangan diremehkan! Segera selesaikan dan lapor jika ada kendala. 🚀\n- Divisi Monitoring OSIS`;
            }

            document.getElementById('report-text').value = reportText;
            document.getElementById('report-modal').classList.add('active');
        };

        // --- FUNGSI COPY TEKS LAPORAN ---
        window.copyReportText = () => {
            const reportText = document.getElementById('report-text');
            reportText.select();
            reportText.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(reportText.value).then(() => {
                const btn = document.querySelector('.btn-wa');
                const oriHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Teks Disalin!';
                btn.style.background = '#059669';
                
                setTimeout(() => {
                    btn.innerHTML = oriHtml;
                    btn.style.background = '#25D366';
                    closeModal('report-modal');
                }, 2000);
            });
        };

    </script>
</body>
</html>
