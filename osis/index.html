<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markas OSIS - Cendekia Aksara</title>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; padding-bottom: 50px;}
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* --- HEADER BRANDED --- */
        .brand-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); /* Warna gelap elegan untuk OSIS */
            color: white; padding: 25px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.3);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 25px; position: relative; overflow: hidden;
        }
        
        .brand-header::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 300px; height: 300px; background: rgba(212, 175, 55, 0.1); /* Efek cahaya Gold */
            border-radius: 50%; pointer-events: none;
        }

        .header-content-wrapper { display: flex; align-items: center; gap: 20px; z-index: 2; }

        .header-logo-circle {
            width: 75px; height: 75px;
            background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-shrink: 0; padding: 12px; box-sizing: border-box;
            animation: floatLogo 3s ease-in-out infinite;
        }

        .header-logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .header-info { display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .header-brand-name {
            font-family: 'Aleo', serif; font-size: 1.8rem; font-weight: 700;
            margin: 0; line-height: 1.1; letter-spacing: 0.5px; color: #d4af37; /* Teks Gold */
        }
        .header-greeting {
            font-family: 'Poppins', sans-serif; font-size: 1rem; opacity: 0.9;
            margin-top: 5px; font-weight: 400; color: #f8fafc;
        }

        .badge-osis {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 20px; margin-top: 10px;
            font-size: 0.8rem; font-weight: 600; font-family: 'Poppins';
            background: linear-gradient(135deg, #d4af37, #f59e0b); color: white; 
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4); border: 1px solid #fef08a;
            width: fit-content;
        }

        /* --- TOMBOL KEMBALI DI HEADER --- */
        .btn-back {
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            padding: 10px 18px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(5px);
            transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
            white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); z-index: 2;
        }
        .btn-back:hover { background: white; color: #0f172a; }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* --- PAPAN PEMBERITAHUAN --- */
        .announcement-box {
            background: white; border-left: 5px solid #d4af37; padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px;
            display: flex; align-items: center; gap: 15px; color: #475569; font-size: 0.95rem;
        }
        .announcement-box i { font-size: 2rem; color: #d4af37; }

        /* --- GRID MENU (GAYA DASHBOARD) --- */
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;
        }
        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: repeat(3, 1fr); gap: 25px; }
        }
        
        .dashboard-card {
            background: white; border-radius: 12px; padding: 20px 15px;
            text-align: center; text-decoration: none; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.3s ease;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 120px; cursor: pointer; position: relative; overflow: hidden;
        }
        
        .dashboard-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); filter: brightness(1.1); }
        .dashboard-card i { font-size: 2rem; margin-bottom: 10px; opacity: 0.9; transition: 0.3s;}
        .dashboard-card h3 { font-size: 0.95rem; font-weight: 600; margin: 0; transition: 0.3s;}

        /* WARNA KARTU DIVISI SOLID */
        .card-bph { background-color: #d4af37; } /* Gold */
        .card-kominfo { background-color: #0ea5e9; } /* Biru */
        .card-akademik { background-color: #8b5cf6; } /* Ungu */
        .card-motivasi { background-color: #ef4444; } /* Merah */
        .card-monitoring { background-color: #10b981; } /* Hijau */

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #0f172a; transition: 0.4s;
        }

        @media (max-width: 480px) {
            .brand-header { padding: 20px; gap: 15px; flex-direction: column; align-items: flex-start; }
            .btn-back { width: 100%; justify-content: center; margin-top: 10px; }
            .header-logo-circle { width: 60px; height: 60px; }
            .header-brand-name { font-size: 1.4rem; }
            .header-greeting { font-size: 0.85rem; }
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .dashboard-card { min-height: 110px; padding: 15px 10px;}
            .dashboard-card i { font-size: 1.8rem; }
            .dashboard-card h3 { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 3rem; margin-bottom: 15px; color: #d4af37;"></i>
        <h3 style="font-family: 'Poppins', sans-serif; font-size: 1rem; color: #64748b;">Memverifikasi Akses OSIS...</h3>
    </div>

    <div class="container" style="display: none;" id="main-content">
        
        <div class="brand-header">
            <div class="header-content-wrapper">
                <div class="header-logo-circle">
                    <img src="https://i.imgur.com/5Srjyo4.png" alt="Logo Cendekia Aksara">
                </div>
                <div class="header-info">
                    <h1 class="header-brand-name">Markas OSIS</h1>
                    <div id="greeting-text" class="header-greeting"><i class="fa-solid fa-spinner fa-spin"></i> Memuat...</div>
                    <div class="badge-osis"><i class="fa-solid fa-crown"></i> Akses Eksekutif</div>
                </div>
            </div>
            <!-- ID DITAMBAHKAN PADA TOMBOL KEMBALI DI HEADER -->
            <a href="/dashboard/index.html" class="btn-back" id="btn-kembali">
                <i class="fa-solid fa-arrow-left"></i> <span id="kembali-text">Kembali</span>
            </a>
        </div>

        <div class="announcement-box">
            <i class="fa-solid fa-bullhorn"></i>
            <div>Silakan pilih ruangan divisi Anda untuk mulai bertugas. Pantau terus laporan masuk dan pastikan program kerja berjalan lancar.</div>
        </div>

        <div class="dashboard-grid">
            
            <a href="bph.html" class="dashboard-card card-bph">
                <i class="fa-solid fa-file-signature"></i> 
                <h3>Kesekretariatan</h3>
            </a>

            <a href="kominfo.html" class="dashboard-card card-kominfo">
                <i class="fa-solid fa-newspaper"></i> 
                <h3>Meja Redaksi</h3>
            </a>

            <a href="akademik.html" class="dashboard-card card-akademik">
                <i class="fa-solid fa-book-open-reader"></i> 
                <h3>Divisi Akademik</h3>
            </a>

            <a href="motivasi.html" class="dashboard-card card-motivasi">
                <i class="fa-solid fa-fire-flame-curved"></i> 
                <h3>Divisi Motivasi</h3>
            </a>

            <a href="monitoring.html" class="dashboard-card card-monitoring">
                <!-- Ikon Radar (Berbayar) diganti ke Satellite Dish (Gratis & Sama Maknanya) -->
                <i class="fa-solid fa-satellite-dish"></i> 
                <h3>Radar & Laporan</h3>
            </a>
            
        </div>
    </div>

    <script type="module">
        import { db, auth, checkAuth } from "/js/firebase-config.js";
        
        // ============================================================
        // LOGIKA DINAMIS TOMBOL KEMBALI
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const fromInkubasi = urlParams.get('ref') === 'inkubasi';
        
        const btnKembali = document.getElementById('btn-kembali');
        const textKembali = document.getElementById('kembali-text');
        
        if (btnKembali && textKembali) {
            if (fromInkubasi) {
                // Jika asalnya dari Inkubasi
                btnKembali.href = '/dashboard/inkubasi.html';
                textKembali.innerText = 'Kembali ke Ruang Inkubasi'; 
            } else {
                // Jika tidak, default arahkan ke Dashboard
                btnKembali.href = '/dashboard/index.html'; 
                textKembali.innerText = 'Kembali ke Dashboard Utama';
            }
        }
        // ============================================================

        (async () => {
            // 1. Cek Login Siswa
            const userData = await checkAuth('siswa');
            
            if(userData) {
                // 2. VERIFIKASI KEAMANAN TINGKAT TINGGI
                if (userData.is_osis !== true) {
                    alert("⚠️ AKSES DITOLAK!\nHalaman ini khusus untuk Pengurus OSIS.");
                    // Redirect juga disesuaikan
                    window.location.href = fromInkubasi ? '/dashboard/inkubasi.html' : '/dashboard/index.html';
                    return;
                }

                // 3. JIKA LOLOS
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                        
                        // Setup Sapaan Waktu
                        const jam = new Date().getHours();
                        let sapaan = "Selamat Pagi"; let icon = "⛅";
                        if (jam >= 10 && jam < 15) { sapaan = "Selamat Siang"; icon = "☀️"; }
                        else if (jam >= 15 && jam < 18) { sapaan = "Selamat Sore"; icon = "🌇"; }
                        else if (jam >= 18) { sapaan = "Selamat Malam"; icon = "🌙"; }

                        // Sapaan khusus menggunakan Nickname
                        const nickName = userData.name.split(' ')[0];
                        document.getElementById('greeting-text').innerHTML = `${sapaan}, Kak ${nickName} ${icon}`;
                    }, 400);
                }, 800);
            }
        })();
    </script>
</body>
</html>
